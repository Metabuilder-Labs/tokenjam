# ─── OpenAI ────────────────────────────────────────────────────────────────
# Current GPT-5 family (July 2026). Source: https://developers.openai.com/api/docs/pricing
# Keys are the literal API model IDs (dotted, e.g. `gpt-5.5`) exactly as they
# arrive in the `gen_ai.request.model` span attribute — TOML dotted names must
# be quoted so the `.` isn't read as table nesting.
# `cache_read_per_mtok` is OpenAI's "cached input" rate (~0.1x input). OpenAI
# does not publish a separate cache-write rate for these, so cache_write is
# left at its 0.0 default (billed as normal input by calculate_cost).
[openai."gpt-5.5"]
input_per_mtok = 5.00
output_per_mtok = 30.00
cache_read_per_mtok = 0.50

[openai."gpt-5.5-pro"]
input_per_mtok = 30.00
output_per_mtok = 180.00

[openai."gpt-5.4"]
input_per_mtok = 2.50
output_per_mtok = 15.00
cache_read_per_mtok = 0.25

[openai."gpt-5.4-mini"]
input_per_mtok = 0.75
output_per_mtok = 4.50
cache_read_per_mtok = 0.075

[openai."gpt-5.4-nano"]
input_per_mtok = 0.20
output_per_mtok = 1.25
cache_read_per_mtok = 0.02

[openai."gpt-5.4-pro"]
input_per_mtok = 30.00
output_per_mtok = 180.00

