# tokenjam/pricing/models.toml
# Prices in USD per million tokens.
# Submit a PR when provider prices change.
#
# ─── 1M-context / [1m] variants ────────────────────────────────────────────
# Claude's 1M-context models surface in telemetry as `claude-opus-4-8[1m]`,
# `claude-sonnet-4-6[1m]`, etc. There are intentionally NO separate `[1m]` rows
# in this file: as of Anthropic's 2026-03-13 pricing change the 1M context window
# bills at STANDARD per-token rates — the old long-context premium (historically
# ~2x input / ~1.5x output for requests over 200K tokens) was removed, so a
# 900K-token request bills at the same per-token rate as a 9K-token one.
# `get_rates` strips the trailing `[...]` context tag (core/pricing.py
# `_strip_context_tag`), so `claude-opus-4-8[1m]` resolves to the base
# `claude-opus-4-8` rates. Source:
# https://platform.claude.com/docs/en/about-claude/pricing → "Long context pricing".

# Claude Fable 5 — Anthropic's most capable widely released model.
# See https://platform.claude.com/docs/en/pricing (cache_write = 5-minute write).
[anthropic.claude-fable-5]
input_per_mtok = 10.00
output_per_mtok = 50.00
cache_read_per_mtok = 1.00
cache_write_per_mtok = 12.50

[anthropic.claude-opus-4-8]
input_per_mtok = 5.00
output_per_mtok = 25.00
cache_read_per_mtok = 0.50
cache_write_per_mtok = 6.25

[anthropic.claude-opus-4-7]
input_per_mtok = 5.00
output_per_mtok = 25.00
cache_read_per_mtok = 0.50
cache_write_per_mtok = 6.25

[anthropic.claude-opus-4-5]
