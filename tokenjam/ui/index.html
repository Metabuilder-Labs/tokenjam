}

// ---- Optimize detail screen ----
function OptimizeFinding({ name, opt, framing }) {
  const meta = ANALYZER_META[name] || { title: capitalize(name) };
  let body = null;
  if (name === 'downsize') {
    const dg = opt.downgrade;
    // Always render the section — a null typed slot means the analyzer ran and
    // found no candidates, not that it's missing (issue #126).
    if (!dg) {
      return html`<section class="opt-section" id="opt-downsize">
        <div class="opt-title">Downsize</div>
        <div class="opt-line dim">No downsize candidates in this window — sessions don't match the smaller-model shape (small input/output, few tool calls).</div>
      </section>`;
    }
    body = html`
      <div class="opt-line">${dg.percent_of_sessions}% of sessions match a smaller-model candidate shape (${dg.candidate_sessions} of ${dg.total_sessions}).</div>
      ${dg.suggestions && Object.keys(dg.suggestions).length ? html`<div class="opt-line dim">Pattern: ${Object.entries(dg.suggestions).map(([k, v]) => k + ' → ' + v).join(', ')}</div>` : null}
      ${(dg.examples || []).length ? html`<div class="opt-sub">Examples</div>
        <table class="opt-table"><tbody>${dg.examples.map(ex => html`<tr><td class="mono">${(ex.trace_id || '').slice(0, 8)}…</td><td>${ex.tool_calls} tools</td><td class="mono">${ex.model}</td></tr>`)}</tbody></table>` : null}
      ${dg.caveat ? html`<div class="opt-caveat">! ${dg.caveat}</div>` : null}`;
  } else {
    const fd = (opt.findings || {})[name];
    if (!fd) return null;
    if (name === 'cache') {
      body = html`
        ${(fd.flagged || []).length ? html`<div class="opt-line">${fd.flagged.length} (provider, model) row(s) below the efficacy threshold.</div>` : null}
        <table class="opt-table"><thead><tr><th>Provider/Model</th><th>Efficacy</th><th>Input</th><th>Cache</th></tr></thead>
          <tbody>${(fd.rows || []).map(r => html`<tr class=${r.flagged ? 'flagged' : ''}><td class="mono">${r.provider}/${r.model}</td><td>${(r.efficacy * 100).toFixed(0)}%</td><td>${fmtTokens(r.input_tokens)}</td><td>${fmtTokens(r.cache_tokens)}</td></tr>`)}</tbody></table>`;
    } else if (name === 'cache-recommend') {
      body = !fd.enabled ? html`<div class="opt-line dim">${fd.hint || 'Disabled. Set [capture] prompts = true to run this analyzer.'}</div>`
        : (fd.candidates || []).length ? html`<div class="opt-line">${fd.candidates.length} prefix candidate(s) for cache_control:</div>
          <table class="opt-table"><tbody>${fd.candidates.map(c => html`<tr><td class="mono">${(c.prefix_hash || '').slice(0, 8)}…</td><td>${c.occurrences}× shared</td><td>~${fmtTokens(c.estimated_cacheable_tokens)} cacheable</td></tr>`)}</tbody></table>`
        : html`<div class="opt-line dim">No stable prefixes shared across ≥3 Anthropic calls.</div>`;
    } else if (name === 'script') {
      body = (fd.clusters || []).length ? html`
        <div class="opt-line">${fd.clusters.length} deterministic-pattern cluster(s).</div>
        <table class="opt-table"><thead><tr><th>Instances</th><th>Signature</th><th>Avg cost</th></tr></thead>
          <tbody>${fd.clusters.map(c => html`<tr><td>${c.instances}×</td><td class="mono">${(c.signature || []).map(s => s.tool).join(' → ').slice(0, 60)}</td><td>${fmtPerItemCost(c.avg_cost_usd, c.avg_tokens, framing)}</td></tr>`)}</tbody></table>
        ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`
        : html`<div class="opt-line dim">No clusters above threshold (≥20 identical signatures).</div>`;
    } else if (name === 'trim') {
      body = !fd.enabled ? html`<div class="opt-line dim">${fd.hint || 'Disabled — needs [capture] prompts = true and tokenjam[bloat].'}</div>`
        : (fd.per_prompt || []).length ? html`
          <div class="opt-line">${fd.prompts_scored} prompt(s) scored; ${fd.total_bloat_chars} of ${fd.total_chars} chars flagged.</div>
          <table class="opt-table"><thead><tr><th>Agent</th><th>Bloat</th><th>~Tokens</th></tr></thead>
            <tbody>${fd.per_prompt.slice(0, 5).map(p => html`<tr><td class="mono">${p.agent_id}</td><td>${p.bloat_chars}/${p.prompt_chars}</td><td>~${p.estimated_token_reduction}</td></tr>`)}</tbody></table>`
        : html`<div class="opt-line dim">No bloat regions above threshold.</div>`;
    }
  }
  // Recoverable estimate line (when present)
  const fd = name === 'downsize' ? opt.downgrade : (opt.findings || {})[name];
  const recUsd = fd ? fd.estimated_recoverable_usd : null;
  const recTok = fd ? fd.estimated_recoverable_tokens : null;
  const rec = (recUsd != null || recTok != null) ? fmtFramedSavings(recUsd, recTok, framing) : null;

  return html`<section class="opt-section" id=${'opt-' + name}>
    <div class="opt-title">${meta.title}
      ${rec ? html`<span class="opt-rec">${rec} <span class="estimated-tag" title=${fd && fd.estimate_basis}>estimated recoverable</span></span>` : null}
    </div>
    ${body}
  </section>`;
}

function OptimizeView({ params }) {
  const DEFAULTS = { since: '30d', agent_id: '', compare: '', finding: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const agentId = readParam(params, 'agent_id', DEFAULTS.agent_id);
  const compare = readParam(params, 'compare', DEFAULTS.compare, v => ['previous', 'last-week', 'last-month', 'last-7d', 'last-30d'].includes(v));
  const focus = readParam(params, 'finding', DEFAULTS.finding);
  const setFilter = (k, v) => navigate('optimize', { since, agent_id: agentId, compare, finding: focus, [k]: v }, DEFAULTS);

  const [st, setSt] = useState({ loading: true, error: null, opt: null, cmp: null, comp: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: !s.opt, error: null }));
    try {
      const opt = await api('/optimize', { since, agent_id: agentId || undefined });
      let cmp = null;
      if (compare) cmp = await api('/cost/compare', { since, compare, agent_id: agentId || undefined }).catch(() => null);
      // Cost-by-component + recoverable-waste overlay (#211). Best-effort: a
      // failure must not blank the Optimize screen.
      const comp = await api('/cost/components', { since, agent_id: agentId || undefined }).catch(() => null);
      setSt({ loading: false, error: null, opt, cmp, comp });
    } catch (e) { setSt(s => ({ ...s, loading: false, error: e.message || String(e) })); }
  }, [since, agentId, compare]);

  useEffect(() => { load(); }, [load]);

  // Scroll the focused finding into view + highlight it (deep-link from Overview).
  useEffect(() => {
    if (!focus || st.loading) return;
    const el = document.getElementById('opt-' + focus);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); el.classList.add('opt-focus'); }
  }, [focus, st.loading, st.opt]);

  const framing = st.opt ? st.opt.framing : null;
  const order = ['downsize', 'cache', 'cache-recommend', 'script', 'trim'];
  const compFraming = st.comp ? st.comp.framing : framing;
  const useTokens = !!compFraming && (compFraming.pricing_mode === 'subscription' || compFraming.pricing_mode === 'local');
  const waste = buildComponentWaste(st.comp, useTokens);
  const wasteFmtY = useTokens ? fmtTokens : fmtCost;
  const wasteDominant = waste ? dominantSplit(waste.costSegs) : null;

  return html`
    <div class="page-title" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      Optimize <${PlanBadge} framing=${framing} />
    </div>
    <div class="filters">
      <select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="90d">Last 90d</option>
      </select>
      <select value=${compare} onChange=${e => setFilter('compare', e.target.value)}>
        <option value="">No comparison</option>
        <option value="previous">vs previous</option>
        <option value="last-week">vs last week</option>
        <option value="last-month">vs last month</option>
      </select>
      ${agentId ? html`<button class="btn" onClick=${() => setFilter('agent_id', '')}>agent: ${agentId} ✕</button>` : null}
      <button class="btn" onClick=${load}>Refresh</button>
    </div>

    ${st.error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load: ${st.error}</div><button class="btn" onClick=${load}>Retry</button></div>` : null}
    ${st.loading ? html`<div class="shimmer" style="height:200px"></div>` : null}

    ${!st.loading && st.opt ? html`
      ${framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}
      ${waste ? html`
        <div class="chart-card">
          <div class="chart-head">
            <div class="chart-title">Cost by component + recoverable waste ${useTokens ? '(tokens)' : ''}</div>
            <div class="chart-meta">
              <span class="chart-total">${useTokens ? (fmtTokens(st.comp.total_tokens || 0) + ' tokens') : fmtFramedDollar(st.comp.total_cost_usd || 0, compFraming)}</span>
            </div>
          </div>
          <${ComponentWasteChart} costSegs=${waste.costSegs} recSegs=${waste.recSegs} fmtY=${wasteFmtY} height=${220} />
          <div class="chart-foot">
            <span class="dim">Left bar = measured spend split by token component. Right bar = <b>estimated recoverable</b> waste, stacked by analyzer — a heuristic estimate to review before acting, not a realized cost reduction.</span>
          </div>
          ${waste.recSegs.length ? html`
            <div class="waste-list">
              ${waste.recSegs.map(r => html`
                <div class="waste-row">
                  <span class="waste-name">${r.title} <span class="dim">→ ${r.component === 'call' ? 'whole-call' : r.component.replace('_', '-')}</span></span>
                  <span class="waste-rec">${fmtFramedSavings(r.usd, r.tokens, compFraming)} <span class="estimated-tag" title=${r.caveat || r.basis}>estimated recoverable</span></span>
                </div>
                ${(r.caveat || r.basis) ? html`<div class="waste-caveat dim">${r.caveat || r.basis}</div>` : null}
              `)}
            </div>` : html`<div class="waste-none"><span class="check">✓</span> Nothing recoverable in this window — no estimated waste from any analyzer.</div>`}
          ${wasteDominant ? html`<div class="waste-split">${wasteDominant.label} is ${wasteDominant.pct}% of measured ${useTokens ? 'tokens' : 'spend'} this window.</div>` : null}
        </div>` : null}
      ${st.cmp ? html`<div class="chart-card"><div class="chart-title">Window comparison (${compare})</div>
        <div class="opt-line">Cost ${st.cmp.cost_delta_usd >= 0 ? '▲' : '▼'} ${fmtFramedDollar(Math.abs(st.cmp.cost_delta_usd), framing)} ${st.cmp.cost_delta_pct != null ? '(' + st.cmp.cost_delta_pct.toFixed(1) + '%)' : ''} · Tokens ${st.cmp.tokens_delta >= 0 ? '▲' : '▼'} ${fmtTokens(Math.abs(st.cmp.tokens_delta))}</div></div>` : null}
      ${order.map(n => html`<${OptimizeFinding} name=${n} opt=${st.opt} framing=${framing} />`)}
      ${(st.opt.budgets || []).length ? html`<section class="opt-section"><div class="opt-title">Budget projection</div>
        ${st.opt.budgets.map(b => html`<div class="opt-line">${b.provider}: run rate ${fmtFramedDollar(b.monthly_run_rate_usd, framing)}/mo vs ${fmtFramedDollar(b.budget_usd, framing)}/cycle ${b.over_budget ? html`<span style="color:var(--error)">— projected over by ${fmtFramedDollar(b.projected_overage_usd, framing)}</span>` : '— within budget'}</div>`)}
      </section>` : null}
    ` : null}
  `;
}

// ============================
// Analytics explorer (#210)
// ============================
// The single explorable pivot: metric × group_by × optional stack × chart-type,
// filters, KPI tiles, presets, URL state, CSV export. Renders entirely from the
// /api/v1/analytics response + its framing block (single compute path — the UI
// never re-derives plan-tier rules). Subsumes the cost-by-model / spend-over-
// time / leaderboard charts as presets (#214/#216).
const ANALYTICS_METRICS = [
  ['spend', 'Spend'], ['tokens', 'Tokens'], ['sessions', 'Sessions'], ['events', 'Events'],
];
const ANALYTICS_DIMENSIONS = [
  ['model', 'Model'], ['agent', 'Agent'], ['provider', 'Provider'], ['tool', 'Tool'],
  ['tool_category', 'Tool category'], ['kind', 'Span kind'], ['request_type', 'Request type'],
  ['day', 'Day'],
];
const ANALYTICS_CHARTS = [['bar', 'Bars'], ['line', 'Lines'], ['hbar', 'Leaderboard']];
// Built-in presets (close #214 leaderboard + #216 multi-series as preset views).
const ANALYTICS_PRESETS = [
  { id: 'spend-by-model', label: 'Spend by model', q: { metric: 'spend', group_by: 'model', chart: 'line', stack: '' } },
  { id: 'leaderboard', label: 'Cost leaderboard', q: { metric: 'spend', group_by: 'model', chart: 'hbar', stack: '' } },
  { id: 'tokens-over-time', label: 'Tokens over time', q: { metric: 'tokens', group_by: 'day', chart: 'bar', stack: '' } },
  { id: 'tool-usage', label: 'Tool usage', q: { metric: 'events', group_by: 'tool_category', chart: 'hbar', stack: '' } },
];

// Pivot the analytics rows into a uPlot [xs, ...ys] time-series, one ys per
// top-N group (+ "other"), zero-filled across the window (reuses _windowGrid so
// the x-axis spans the full selected window, #133). `valueOf` picks cost vs
// tokens per plan-tier framing.
function buildAnalyticsSeries(resp, useTokens) {
  if (!resp || !resp.rows) return null;
  const grid = _windowGrid({ ...resp, series: resp.rows });
  if (!grid) return null;
  const { xs, idx, step, bucket, coarsened } = grid;
  const valueOf = r => (useTokens ? (r.tokens || 0) : (r.value || 0));
  // When group_by IS the time dimension (Day), time is already the x-axis, so
  // coloring by the day-bucket key produces a meaningless rainbow with raw epoch
  // legend labels (#227). The colored SERIES then come from stack_by (g2) if
  // present, otherwise a SINGLE series — never one-per-day-bucket.
  const timeGroup = resp.group_by === 'day';
  const keyOf = timeGroup ? (r => r.stack) : (r => r.group);
  const seriesKeys = timeGroup ? (resp.stacks || []) : (resp.groups || []);
  if (!seriesKeys.length) {
    const ys = xs.map(() => 0);
    resp.rows.forEach(r => {
      const b = Math.floor(r.bucket / step) * step;
      if (b in idx) ys[idx[b]] += valueOf(r);
    });
    return { data: [xs, ys], labels: ['Total'], bucket, coarsened, requestedBucket: grid.reqBucket };
  }
  const top = seriesKeys.slice(0, 5);
  const topSet = new Set(top);
  const hasOther = seriesKeys.length > top.length;
  const labels = hasOther ? [...top, 'other'] : [...top];
  const yss = labels.map(() => xs.map(() => 0));
  resp.rows.forEach(r => {
    const b = Math.floor(r.bucket / step) * step; if (!(b in idx)) return;
    const k = keyOf(r);
    const li = topSet.has(k) ? labels.indexOf(k) : (hasOther ? labels.length - 1 : -1);
    if (li >= 0) yss[li][idx[b]] += valueOf(r);
  });
  return { data: [xs, ...yss], labels, bucket, coarsened, requestedBucket: grid.reqBucket };
}

// Collapse the time dimension into per-group totals for the leaderboard (#214):
// sorted desc, each with a fraction-of-max for the inline magnitude bar.
function buildLeaderboard(resp, useTokens) {
  if (!resp || !resp.rows) return null;
  const totals = {};
  resp.rows.forEach(r => { totals[r.group] = (totals[r.group] || 0) + (useTokens ? (r.tokens || 0) : (r.value || 0)); });
  const entries = Object.keys(totals).map(g => ({ group: g, value: totals[g] }))
    .sort((a, b) => b.value - a.value);
  const max = entries.length ? Math.max(...entries.map(e => e.value), 0) : 0;
  entries.forEach(e => { e.frac = max > 0 ? e.value / max : 0; });
  return entries;
}

// CSV from the current pivot — built client-side from the response (offline,
// no server round-trip), downloaded via a Blob object URL.
function analyticsCsv(resp) {
  const head = ['bucket_epoch', 'bucket_iso', resp.group_by, resp.stack_by || 'stack', resp.metric, 'tokens'];
  const lines = [head.join(',')];
  (resp.rows || []).forEach(r => {
    const iso = new Date(r.bucket * 1000).toISOString();
    const cell = v => { const s = String(v == null ? '' : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
    lines.push([r.bucket, iso, cell(r.group), cell(r.stack), r.value, r.tokens].join(','));
  });
  return lines.join('\n');
}

function downloadCsv(filename, text) {
  const blob = new Blob([text], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// `route` lets the pivot live on another screen (the merged Dashboard preview
// reuses it under #/dashboard); `embedded` drops the standalone title + window
// picker so the host screen owns those. Default args preserve the standalone
// #/analytics behavior exactly.
function AnalyticsView({ params, route = 'analytics', embedded = false, kpiCaption = null }) {
  const DEFAULTS = { since: '30d', metric: 'spend', group_by: 'model', stack: '', chart: 'bar',
    agent_id: '', provider: '', model: '', tool: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const metric = readParam(params, 'metric', DEFAULTS.metric, v => ANALYTICS_METRICS.some(m => m[0] === v));
  const groupBy = readParam(params, 'group_by', DEFAULTS.group_by, v => ANALYTICS_DIMENSIONS.some(d => d[0] === v));
  const stack = readParam(params, 'stack', DEFAULTS.stack, v => v === '' || ANALYTICS_DIMENSIONS.some(d => d[0] === v));
  const chart = readParam(params, 'chart', DEFAULTS.chart, v => ANALYTICS_CHARTS.some(c => c[0] === v));
  const fAgent = readParam(params, 'agent_id', '');
  const fProvider = readParam(params, 'provider', '');
  const fModel = readParam(params, 'model', '');
  const fTool = readParam(params, 'tool', '');
  const cur = { since, metric, group_by: groupBy, stack, chart, agent_id: fAgent, provider: fProvider, model: fModel, tool: fTool };
  const setFilter = (k, v) => navigate(route, { ...cur, [k]: v }, DEFAULTS);
  const applyPreset = (q) => navigate(route, { ...cur, ...q }, DEFAULTS);

  // #295: Stack only makes sense on the multi-series charts (bar/line). The
  // Leaderboard (hbar) collapses the time dimension into a single per-group
  // total and ignores stack entirely, so a stale stack there just strands the
  // view on an empty cross-tab ("No data"). Gate it: hide the Stack control AND
  // drop stack_by from the query for non-stacking charts. The chosen stack stays
  // in the URL, so it returns when the user switches back to a bar/line chart.
  const stackApplies = chart === 'bar' || chart === 'line';
  const effStack = stackApplies ? stack : '';

  const [st, setSt] = useState({ loading: true, error: null, resp: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: !s.resp, error: null }));
    try {
      const resp = await api('/analytics', {
        metric, group_by: groupBy, stack_by: effStack || undefined, since,
        agent_id: fAgent || undefined, provider: fProvider || undefined,
        model: fModel || undefined, tool: fTool || undefined,
      });
      setSt({ loading: false, error: null, resp });
    } catch (e) { setSt(s => ({ ...s, loading: false, error: e.message || String(e) })); }
  }, [metric, groupBy, stack, chart, since, fAgent, fProvider, fModel, fTool]);

  useEffect(() => { load(); }, [load]);

  const { loading, error, resp } = st;
  const framing = resp ? resp.framing : null;
  // Plan-tier framing: the spend metric switches to token volume for
  // subscription/local (dollars suppressed) — single source, never re-derived.
  const isSpend = metric === 'spend';
  const useTokens = isSpend && !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const valueIsDollars = isSpend && !useTokens;
  const fmtV = valueIsDollars ? fmtCost : fmtTokens;
  const fmtVal = v => (metric === 'sessions' || metric === 'events') ? fmtTokens(v).replace(/ tokens$/, '') : fmtV(v);
  const axisFmt = valueIsDollars ? fmtAxisUsd : fmtTokens;

  const series = (chart === 'line' || chart === 'bar') ? buildAnalyticsSeries(resp, useTokens) : null;
  const board = chart === 'hbar' ? buildLeaderboard(resp, useTokens) : null;
  const kpis = resp ? resp.kpis : null;
  const filterChips = [['agent_id', fAgent], ['provider', fProvider], ['model', fModel], ['tool', fTool]].filter(x => x[1]);

  const metricSuffix = isSpend ? (useTokens ? ' (tokens)' : '') : '';

  // Tool spans carry no tokens/cost, so grouping spend/tokens BY tool (or tool
  // category) is structurally all-zeros (#268). Rather than render a wall of
  // zeros, show a helpful empty state with a one-click switch to Events.
  const toolDimNoMetric = (groupBy === 'tool' || groupBy === 'tool_category')
    && (metric === 'spend' || metric === 'tokens');

  // #295: a stacked breakdown can be structurally empty even when the metric has
  // plenty of data — e.g. Model × Tool category, since a span is either an LLM
  // call or a tool call, never both. Detect that so we can prompt the user to
  // clear the stack instead of stranding them on a bare "No data" chart. (Only
  // bar/line carry a stack — effStack is '' for the leaderboard.)
  const noRows = !!resp && Array.isArray(resp.rows) && resp.rows.length === 0;
  const emptyFromStack = !!effStack && noRows;
  const labelOf = dim => (ANALYTICS_DIMENSIONS.find(d => d[0] === dim) || [, dim])[1];

  // #313: surface the leaderboard's own total + item count (a ranked list with
  // no sum is confusing), and reconcile the gap when grouping by a PARTIAL
  // dimension — only some spans carry it (e.g. a tool), so the breakdown subtotal
  // is legitimately smaller than the all-events KPI and otherwise looks
  // contradictory. Purely additive: only the leaderboard (hbar) branch reads
  // these; nothing else changes.
  const boardTotal = board ? board.reduce((s, e) => s + (e.value || 0), 0) : 0;
  const boardCount = board ? board.length : 0;
  const dimName = (ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1].toLowerCase();
  const dimNamePlural = (/y$/.test(dimName) && !/[aeiou]y$/.test(dimName)) ? dimName.slice(0, -1) + 'ies' : dimName + 's';
  const countMetric = (metric === 'events' || metric === 'sessions') ? metric : null;
  const kpiCount = (countMetric && kpis) ? kpis[countMetric] : null;
  const boardGap = kpiCount != null && boardTotal > 0 && boardTotal < kpiCount;

  return html`
    ${embedded ? null : html`<div class="page-title" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      Analytics <${PlanBadge} framing=${framing} />
    </div>`}

    <div class="filters">
      <label class="ctl">Metric
        <select value=${metric} onChange=${e => setFilter('metric', e.target.value)}>
          ${ANALYTICS_METRICS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      <label class="ctl">By
        <select value=${groupBy} onChange=${e => setFilter('group_by', e.target.value)}>
          ${ANALYTICS_DIMENSIONS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      ${stackApplies ? html`<label class="ctl">Stack
        <select value=${stack} onChange=${e => setFilter('stack', e.target.value)}>
          <option value="">none</option>
          ${ANALYTICS_DIMENSIONS.filter(d => d[0] !== groupBy).map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>` : null}
      <label class="ctl">Chart
        <select value=${chart} onChange=${e => setFilter('chart', e.target.value)}>
          ${ANALYTICS_CHARTS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      ${embedded ? null : html`<select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="24h">Last 24h</option><option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option><option value="90d">Last 90d</option>
      </select>`}
      <button class="btn" onClick=${load}>Refresh</button>
      <button class="btn" onClick=${() => resp && downloadCsv('tokenjam-analytics.csv', analyticsCsv(resp))}>Export CSV</button>
    </div>

    <div class="filters preset-row">
      <span class="dim" style="font-size:12px">Presets:</span>
      ${ANALYTICS_PRESETS.map(p => html`<button class="btn preset-btn" onClick=${() => applyPreset(p.q)}>${p.label}</button>`)}
      ${filterChips.map(([k, v]) => html`<button class="btn" onClick=${() => setFilter(k, '')}>${k.replace('_id', '')}: ${v} ✕</button>`)}
    </div>

    ${error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load analytics: ${error}</div><button class="btn" onClick=${load}>Retry</button></div>` : null}

    ${!error && framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${!error && kpis ? (() => {
      // The Spend tile follows the server framing block (single source, never
      // re-derived). Under SUBSCRIPTION it shows an implied-value MULTIPLIER
      // ("43.5× plan value", #262) — NOT "% of cycle" and NOT raw tokens (which
      // duplicated the Tokens tile, #247). Its sparkline/delta still track SPEND
      // (cost_usd), since the multiplier is just spend rescaled by the plan fee
      // — so the trend/shape are identical to spend, never raw $. LOCAL / a
      // subscription with no declared fee have no denominator → the tile is
      // dropped rather than duplicate Tokens.
      const deltas = resp.kpi_deltas || {};
      const spend = spendTileDisplay(kpis.spend, framing);
      // A prior window with almost no activity makes period-over-period % a
      // misleading sliver (the ▲1682% on a fresh backfill, #262). Use the prior
      // window's session count as the universal "did anything happen" proxy.
      const prevThin = !!resp.kpi_prev && (resp.kpi_prev.sessions || 0) < 2;
      const onMetric = (k) => setFilter('metric', k);
      // #318: the ACTIVE count-metric tile shows the breakdown subtotal next to
      // the window total when grouping by a PARTIAL dimension (only some spans
      // carry it, e.g. tool), so the window-wide tile reconciles with the smaller
      // chart subtotal. Count metrics only (events/sessions — spend/tokens framing
      // is more complex); only when there's an actual gap.
      const breakdownTotal = (resp.rows || []).reduce((s, r) => s + (r.value || 0), 0);
      const breakdownDim = (ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1].toLowerCase();
      const activeSub = ((metric === 'events' || metric === 'sessions')
        && breakdownTotal > 0 && breakdownTotal < (kpis[metric] || 0))
        ? { value: fmtCount(breakdownTotal), label: `by ${breakdownDim}` } : null;
      const tiles = [];
      if (spend) {
        tiles.push({ key: 'spend', label: spend.label, cost: true, value: spend.value,
          series: kpiSparkValues(resp, 'spend'), delta: deltas.spend });
      }
      tiles.push({ key: 'tokens', label: 'Tokens', cost: false, value: fmtTokens(kpis.tokens),
        series: kpiSparkValues(resp, 'tokens'), delta: deltas.tokens });
      tiles.push({ key: 'sessions', label: 'Sessions', cost: false, value: fmtCount(kpis.sessions),
        series: kpiSparkValues(resp, 'sessions'), delta: deltas.sessions });
      tiles.push({ key: 'events', label: 'Events', cost: false, value: fmtCount(kpis.events),
        series: kpiSparkValues(resp, 'events'), delta: deltas.events });
      return html`
        <div class="kpi-row">
          ${tiles.map(t => html`<${KpiTile} label=${t.label} value=${t.value} active=${t.key === metric}
              series=${t.series} delta=${t.delta == null ? null : t.delta} cost=${t.cost}
              sub=${t.key === metric ? activeSub : null}
              prevThin=${prevThin} onSelect=${() => onMetric(t.key)} />`)}
        </div>
        ${kpiCaption ? html`<div class="kpi-caption">${kpiCaption}</div>` : null}`;
    })() : null}

    ${!error ? html`
      <div class="chart-card">
        <div class="chart-head">
          <div class="chart-title">${(ANALYTICS_METRICS.find(m => m[0] === metric) || [, metric])[1]} by ${(ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1]}${metricSuffix}</div>
        </div>
        ${toolDimNoMetric ? html`
          <div class="empty" style="padding:32px 16px;text-align:center">
            <div style="font-size:13px;margin-bottom:12px">Tools don't carry ${metric === 'spend' ? 'cost' : 'tokens'} — those live on the LLM-call spans, not tool spans.</div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
              <button class="btn" onClick=${() => setFilter('metric', 'events')}>Switch to Events</button>
              <button class="btn" onClick=${() => setFilter('group_by', 'model')}>Group by Model</button>
              <button class="btn" onClick=${() => setFilter('group_by', 'agent')}>Group by Agent</button>
            </div>
          </div>`
          : loading ? html`<div class="shimmer" style="height:200px"></div>`
          : emptyFromStack ? html`
            <div class="empty" style="padding:32px 16px;text-align:center">
              <div style="font-size:13px;margin-bottom:12px">No rows for ${labelOf(groupBy)} × ${labelOf(effStack)}. That breakdown is empty because a span carries only one of these — e.g. an LLM call has a model but no tool, a tool span has a tool but no model.</div>
              <button class="btn" onClick=${() => setFilter('stack', '')}>Clear stack</button>
            </div>`
          : chart === 'hbar'
            ? (board && board.length ? html`
              <div class="dim" style="font-size:12px;margin:2px 0 8px">Total: ${fmtVal(boardTotal)} · ${boardCount} ${boardCount === 1 ? dimName : dimNamePlural}</div>
              <div class="leaderboard">
                ${board.map((e, i) => {
                  const label = formatGroupLabel(e.group, groupBy);
                  return html`
                  <div class="lb-row">
                    <span class="lb-rank">${i + 1}</span>
                    <span class="lb-name" title=${label}>${label}</span>
                    <span class="lb-bar"><span class="lb-fill" style=${'width:' + (e.frac * 100).toFixed(1) + '%;background:' + colorFor(e.group)}></span></span>
                    <span class="lb-val">${fmtVal(e.value)}</span>
                  </div>`;
                })}
              </div>
              ${boardGap ? html`<div class="chart-foot"><span class="dim">Only ${fmtCount(boardTotal)} of ${fmtCount(kpiCount)} ${countMetric} have a ${dimName} — the rest aren't in this breakdown.</span></div>` : null}
              ` : html`<div class="empty" style="padding:32px 0">No data in this window.</div>`)
            : (series ? html`
              ${chart === 'line'
                ? html`<${SpendChart} data=${series.data} labels=${series.labels} height=${220} fmtY=${fmtV} axisFmtY=${axisFmt} showLegend=${series.labels.length > 1} bucket=${series.bucket} />`
                : html`<${StackedBarChart} data=${series.data} labels=${series.labels} height=${220} fmtY=${fmtV} axisFmtY=${axisFmt} bucket=${series.bucket} />`}
              ${series.coarsened ? html`<div class="chart-foot"><span class="dim">Showing ${series.bucket} buckets — this range is too long for ${series.requestedBucket}ly detail.</span></div>` : null}
            ` : html`<div class="empty" style="padding:32px 0">No data in this window.</div>`)}
      </div>` : null}
  `;
}

// ============================
// Merged Dashboard (PREVIEW, #/dashboard) — prototype for design review.
// ============================
// Composes the Overview triage front-door (spend hero + run-rate, compact
// recoverable-waste + health bands) with the Analytics pivot explorer as the
// hero canvas. Purely additive: a NEW route that reuses the existing helpers /
// components (SpendChart, recoverableTiles, HealthTile, AnalyticsView) — it does
// NOT touch the standalone Overview/Analytics screens or the default landing.
// One window selector (header) drives BOTH the triage fetch and the embedded
// explorer (which reads `since` from the same URL params).
function DashboardView({ params }) {
  const since = readParam(params, 'since', '30d', validSince);
  // Preserve the explorer's params (metric/group_by/stack/chart/filters) when
  // only the window changes, so the hero keeps its slice across window switches.
  const setWin = v => navigate('dashboard', { ...Object.fromEntries(params.entries()), since: v }, { since: '30d' });
  const [d, setD] = useState({ loading: true, empty: false, error: null });

  // Triage fetch — same parallel fast=true pattern as Overview (#124): /cost is
  // load-bearing (no .catch), the rest degrade individually. The Analytics hero
  // fetches independently, so a triage failure never blanks the explorer.
  const load = useCallback(async () => {
    try {
      const status = await api('/status');
      if (!status.agents || status.agents.length === 0) {
        setD({ loading: false, empty: true, error: null });
        return;
      }
      const [cost, compare, opt, al, drift, traces] = await Promise.all([
        api('/cost', { since, group_by: 'day' }),
        api('/cost/compare', { since, compare: 'previous' }).catch(() => null),
        api('/optimize', { since, fast: 'true' }).catch(() => null),
        api('/alerts', { since, unread: 'true' }).catch(() => ({ alerts: [] })),
        api('/drift').catch(() => ({ agents: [] })),
        api('/traces', { since, limit: 6 }).catch(() => ({ traces: [] })),
      ]);
      setD({ loading: false, empty: false, error: null, cost, compare, opt,
        alerts: al.alerts || [], drift, traces: traces.traces || [] });
    } catch (e) {
      setD(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, [since]);

  useEffect(() => {
    load();
    const timer = setInterval(() => { if (document.visibilityState === 'visible') load(); }, 30000);
    const onVis = () => { if (document.visibilityState === 'visible') load(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { clearInterval(timer); document.removeEventListener('visibilitychange', onVis); };
  }, [load]);

  const winPicker = html`
    <select value=${since} onChange=${e => setWin(e.target.value)}>
      <option value="24h">Last 24h</option>
      <option value="7d">Last 7d</option>
      <option value="30d">Last 30d</option>
      <option value="90d">Last 90d</option>
    </select>`;

  const cost = d.cost || {};
  const framing = cost.framing || null;
  const useTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  // Series only used to gate the run-rate projection (the chart itself is the
  // explorer's now — spend de-dup); window total drives the run-rate caption.
  const series = (!d.loading && !d.empty && !d.error) ? buildCostSeries(cost, 'total', useTokens) : null;
  const cyc = cycleRemaining(cost.cycle);
  let projection = null;
  if (series && series.data[1] && series.data[1].length) {
    const windowTotal = useTokens ? (cost.total_tokens || 0) : (cost.total_cost_usd || 0);
    const projected = runRateProjection(windowTotal, since, 1) * cyc.days;
    projection = useTokens ? (fmtTokens(Math.round(projected)) + ' tokens') : fmtFramedDollar(projected, framing);
  }

  const tiles = (!d.loading && !d.empty && !d.error) ? recoverableTiles(d.opt) : [];
  const budgets = (d.opt && d.opt.budgets) || [];
  const budgetAttn = budgets.filter(b => b.over_budget || (b.budget_usd > 0 && b.projected_cycle_total / b.budget_usd > 0.8)).length;
  const driftN = driftSignalCount(d.drift);
  const errTraces = (d.traces || []).filter(t => t.status_code === 'error').length;

  // Run-rate projection folded into a one-line caption under the explorer's KPI
  // row — the dashboard's single spend headline lives there, not as a separate
  // chart (de-dup). Framed (tokens for subscription/local), never raw $.
  const kpiCaption = (!d.loading && !d.empty && !d.error && projection && projection !== '—')
    ? ('At this pace, ~' + projection + ' by ' + cyc.label + ' — linear run-rate, not a forecast')
    : null;

  return html`
    <div class="ov-head">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="page-title" style="margin:0">Dashboard</div>
        <${PlanBadge} framing=${framing} />
      </div>
      <div class="filters" style="margin:0">${winPicker}</div>
    </div>
    ${framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${d.empty ? html`<div class="card" style="max-width:560px"><div class="card-header">No data yet — TokenJam is listening.</div><p style="color:var(--text-dim);font-size:13px;margin:8px 0 0">Run an agent (or <code>tj demo retry-loop</code>) and your spend, waste, and health show up here.</p></div>`
      : html`
        <!-- Triage band: recoverable waste + health. Spend is NOT shown here —
             it lives once, in the explorer's Spend KPI tile + chart below. -->
        ${d.error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:8px">Couldn't load triage: ${d.error}</div><button class="btn" onClick=${load}>Retry</button></div>`
          : d.loading ? html`<div class="shimmer" style="height:90px"></div>`
          : html`
            <div class="dash-triage">
              <div class="dash-col">
                <div class="band-label">Recoverable waste <span class="estimated-tag" title="Heuristic estimates — review before acting">estimated</span></div>
                <div class="tile-grid compact">
                  ${tiles.length === 0 ? html`<div class="empty">No recoverable candidates.</div>`
                    : tiles.map(t => {
                      const meta = ANALYZER_META[t.name] || { title: capitalize(t.name), hint: '' };
                      // In-place drill-through: stays on #/dashboard and updates the
                      // hero explorer's slice via URL state (#229 slice map) — never
                      // navigates away to the standalone #/analytics screen.
                      const href = analyzerSliceHref(t.name, since, 'dashboard');
                      const amount = t.state === 'actionable' ? fmtFramedSavings(t.usd, t.tokens, framing)
                        : t.state === 'at_ceiling' ? ('✓ ' + t.metric)
                        : t.state === 'no_findings' ? 'No candidates' : 'Not ready';
                      const cls = t.state === 'actionable' ? 'rec-tile' : (t.state === 'at_ceiling' ? 'rec-tile ok' : 'rec-tile muted');
                      const amtCls = t.state === 'actionable' ? 'rec-amount' : (t.state === 'at_ceiling' ? 'rec-amount ok' : 'rec-amount dim');
                      return html`<a class=${cls} href=${href}>
                        <div class="rec-name">${meta.title}</div>
                        <div class=${amtCls}>${amount}</div>
                      </a>`;
                    })}
                </div>
              </div>
              <div class="dash-col">
                <div class="band-label">Health at a glance</div>
                <div class="tile-grid compact">
                  <${HealthTile} label="Unread alerts" value=${d.alerts.length} attention=${d.alerts.length > 0}
                    href="#/alerts?unread=true" sub=${d.alerts.length ? d.alerts[0].severity : 'all clear'} />
                  <${HealthTile} label="Agents drifting" value=${driftN} attention=${driftN > 0} href="#/drift"
                    sub=${driftN ? 'review baselines' : 'within baseline'} />
                  <${HealthTile} label="Budgets at risk" value=${budgetAttn} attention=${budgetAttn > 0} href="#/budget"
                    sub=${budgets.length ? (budgetAttn ? 'over / near ceiling' : 'within ceiling') : 'none configured'} />
                  <${HealthTile} label="Recent activity" value=${(d.traces || []).length} attention=${errTraces > 0} href=${tracesHrefForWindow(since)}
                    sub=${errTraces ? (errTraces + ' with errors') : 'last sessions'} />
                </div>
              </div>
            </div>`}

        <!-- The HERO: the embedded Analytics pivot explorer. Spend lives here
             once (Spend KPI tile + chart); the run-rate projection is the caption. -->
        <div class="band-label" style="margin-top:18px">Explore <span class="band-window">· metric × dimension × chart, the full pivot</span></div>
        <${AnalyticsView} params=${params} route="dashboard" embedded=${true} kpiCaption=${kpiCaption} />`}
  `;
}

// ============================
// App Router
// ============================
function App() {
  const [route, setRoute] = useState(getRoute());

  useEffect(() => {
    const handler = () => setRoute(getRoute());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // Reflect the default route in the URL bar without a render-time redirect.
  // getRoute() already defaults to 'dashboard', so the first render shows the
  // Dashboard; this just makes the address bar say so (replaceState = no extra
  // history entry, no hashchange race that left the view blank — #132).
  useEffect(() => {
    if (!location.hash || location.hash === '#/') {
      history.replaceState(null, '', '#/dashboard');
    }
  }, []);

  // Update active nav link
  useEffect(() => {
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.view === route.view);
    });
  }, [route.view]);

  const p = route.params;
  switch (route.view) {
    // Overview retired — the Dashboard's triage band subsumes it. Lingering
    // #/overview bookmarks/links fall through to the Dashboard.
    case 'overview':
    case 'dashboard': return html`<${DashboardView} params=${p} />`;
    case 'status': return html`<${StatusView} params=${p} />`;
    case 'traces':
      if (route.param) return html`<${TraceDetailView} traceId=${route.param} />`;
      return html`<${TracesListView} params=${p} />`;
    case 'cost': return html`<${CostView} params=${p} />`;
    case 'analytics': return html`<${AnalyticsView} params=${p} />`;
    case 'alerts': return html`<${AlertsView} params=${p} />`;
    case 'drift': return html`<${DriftView} params=${p} />`;
    case 'optimize': return html`<${OptimizeView} params=${p} />`;
    case 'budget': return html`<${BudgetView} params=${p} />`;
    default: return html`<div class="empty">Page not found.</div>`;
  }
}

render(html`<${App} />`, document.getElementById('app'));

// Footer version — fetched from /api/v1/version (same-origin, offline-safe).
fetch('/api/v1/version')
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    const el = document.getElementById('tj-version');
    if (el && d && d.version) el.textContent = 'v' + d.version;
  })
  .catch(() => {});
</script>
<script>
  // Theme toggle: cycles dark → light → system
  (function () {
    var KEY = 'tj-theme';
    var ICONS = { dark: '☾', light: '☀', system: '⊙' };  // ☾ ☀ ⊙
    var LABELS = { dark: 'Dark', light: 'Light', system: 'System' };
    var btn = document.getElementById('theme-toggle');
    var iconEl = document.getElementById('theme-icon');
    var labelEl = document.getElementById('theme-label');
    var mql = window.matchMedia('(prefers-color-scheme: light)');
    function apply(pref) {
      var isLight = pref === 'light' || (pref === 'system' && mql.matches);
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
      if (iconEl) iconEl.textContent = ICONS[pref];
      if (labelEl) labelEl.textContent = LABELS[pref];
      if (btn) btn.title = 'Theme: ' + pref + ' (click to cycle)';
    }
    var pref = localStorage.getItem(KEY) || 'system';
    apply(pref);
    if (btn) btn.addEventListener('click', function () {
      pref = pref === 'system' ? 'light' : pref === 'light' ? 'dark' : 'system';
      localStorage.setItem(KEY, pref);
      apply(pref);
    });
    mql.addEventListener('change', function () { if (pref === 'system') apply(pref); });
  })();
</script>
