        <div class="wm-milestone-head ${hasDetail ? 'clickable' : ''}" onClick=${hasDetail ? (() => setOpen(o => !o)) : null}>
          <span class="wm-chat" title=${prompt}>you: ${promptShort}${headline ? ' — ' + headline : ''}</span>
          <span class="wm-ask-meta">${tokenTag}</span>
        </div>
        ${open && hasDetail ? html`<div class="wm-ask-body"><div class="wm-detail"><span class="k">full</span>${ask.outcome}</div></div>` : null}
      </div>
    `;
  }

  const outcomeShort = headline || '(did work — no narration)';
  return html`
    <div class="wm-milestone ${cls}">
      <span class="wm-dot-spine ${cls}">${icon}</span>
      <div class="wm-milestone-head ${hasDetail ? 'clickable' : ''}" onClick=${hasDetail ? (() => setOpen(o => !o)) : null}>
        <span class="wm-ask-did" title=${ask.outcome || ''}>${outcomeShort}</span>
        <span class="wm-ask-meta">
          ${tokenTag}
          ${subCount ? html`<span class="wm-subs">${subShown} sub${subShown === 1 ? '' : 's'}</span>` : null}
          ${ask.flagged ? html`<span class="wm-flag">${ask.flagged} flagged</span>` : null}
          ${hasDetail ? html`<span class="wm-ask-caret">${open ? '▾' : '▸'}</span>` : null}
        </span>
      </div>
      <div class="wm-ask-ctx" title=${prompt}>you: ${promptShort}</div>
      ${phases.length ? html`
        <div class="wm-phases">
          ${(phasesOpen ? phases : phases.slice(0, PHASE_PREVIEW)).map(p => p.omitted
            ? html`<div class="wm-phase wm-phase-omitted">⋯ ${p.omitted} more phase${p.omitted === 1 ? '' : 's'}</div>`
            : html`<div class="wm-phase"><span class="wm-phase-title" title=${p.title}>↳ ${p.title || '(tool step)'}</span>${p.tool_count ? html`<span class="wm-phase-tools">${phaseTools(p)}</span>` : null}${p.error_count ? html`<span class="wm-phase-err" title=${p.error_count + ' failed'}>${p.error_count}✗</span>` : null}</div>`)}
          ${phases.length > PHASE_PREVIEW ? html`<div class="wm-phase wm-phase-toggle" onClick=${() => setPhasesOpen(o => !o)}>${phasesOpen ? '▾ fewer phases' : '▸ show all ' + phaseTotalLabel + ' phases'}</div>` : null}
        </div>
      ` : null}
      ${branchTop.length ? html`
        <div class="wm-branch">
          ${branchTop.map((s, i) => {
            const flagged = s.flags && s.flags.length;
            const lead = i === branchTop.length - 1 && branchMore <= 0 ? '└ ' : '├ ';
            return html`<div class="wm-branch-row ${flagged ? 'flagged' : ''}"><span>${lead}${flagged ? '⚠ ' : ''}${s.name}</span>${s.tokens != null ? html`<span class="wm-branch-tok">${fmtTokens(s.tokens)} tok</span>` : null}</div>`;
          })}
          ${branchMore > 0 ? html`<div class="wm-branch-row"><span class="wm-branch-more" onClick=${hasDetail ? (() => setOpen(o => !o)) : null}>└ +${branchMore} more</span></div>` : null}
        </div>
      ` : null}
      ${open && hasDetail ? html`
        <div class="wm-ask-body">
          ${ask.outcome && ask.outcome.length > 160 ? html`<div class="wm-detail"><span class="k">outcome</span>${ask.outcome}</div>` : null}
          ${files.length ? html`<div class="wm-detail"><span class="k">files</span>${files.map((f, i) => html`<span title=${f}>${shortPath(f)}</span>${i < files.length - 1 ? ', ' : ''}`)}${a.file_count > files.length ? ' +' + (a.file_count - files.length) + ' more' : ''}</div>` : null}
          ${subs.length ? html`<div class="wm-tree">${subs.map(c => html`<${WorkMapNode} node=${c} />`)}</div>` : null}
        </div>
      ` : null}
    </div>
  `;
}

// A run of 2+ consecutive no-work "chat" asks, collapsed to a single divider so
// the storyline isn't drowned by quick exchanges. Sits as a dim milestone on the
// spine; click to expand into the individual chat-ask milestones. (A lone chat
// ask renders as a normal WorkMapAsk.)
function WorkMapChatRun({ asks, sessionSubs, distilled }) {
  const [open, setOpen] = useState(false);
  if (open) {
    return html`
      <${Fragment}>
        <div class="wm-milestone idle">
          <span class="wm-dot-spine idle">·</span>
          <div class="wm-chat-divider" onClick=${() => setOpen(false)}>▾ hide ${asks.length} quick exchanges</div>
        </div>
        ${asks.map(ask => html`<${WorkMapAsk} ask=${ask} sessionSubs=${sessionSubs} distilled=${distilled} />`)}
      </${Fragment}>
    `;
  }
  return html`
    <div class="wm-milestone idle">
      <span class="wm-dot-spine idle">·</span>
      <div class="wm-chat-divider" onClick=${() => setOpen(true)}>⋯ ${asks.length} quick exchanges</div>
    </div>
  `;
}

// Group a chronological asks list into render segments: each work ask stays on
// its own; a run of 2+ consecutive no-work chat asks collapses into one
// WorkMapChatRun; a lone chat ask renders as a normal WorkMapAsk.
function groupAsks(asks) {
  const out = [];
  let run = [];
  const flushRun = () => {
    if (run.length >= 2) out.push({ kind: 'chat-run', asks: run });
    else run.forEach(a => out.push({ kind: 'ask', ask: a }));
    run = [];
  };
  asks.forEach(ask => {
    if (askStatus(ask).hasWork) { flushRun(); out.push({ kind: 'ask', ask }); }
    else run.push(ask);
  });
  flushRun();
  return out;
}

// Glyph for a worker session's status in the run card (descriptive only).
function runWorkerGlyph(status) {
  if (status === 'active') return '⏳';
  if (status === 'closed' || status === 'completed') return '✓';
  return '·';  // idle / stale
}

// Launcher -> run breadcrumb. `run` is the workmap's `launched_run` block:
// { run_id, source, session_count, total_cost_usd, tool_call_count,
//   sessions: [{session_id, label, status, is_self}] }. `source: "inferred"`
// is marked as a best-effort guess (honesty — it was scraped from the
// transcript, not declared by the harness).
function WorkMapRunCard({ run }) {
  if (!run || !run.run_id) return null;
  const inferred = run.source === 'inferred';
  const count = run.session_count || (run.sessions ? run.sessions.length : 0);
  const goRun = () => { location.hash = '#/runs/' + run.run_id; };
  return html`
    <div class="wm-run-card ${inferred ? 'inferred' : ''}">
      <div class="wm-run-head">
        <div class="wm-run-title">↳ Launched run <span class="wm-run-id">${run.run_id}</span>${inferred ? html`<span class="wm-run-src" title="Scraped from this session's transcript and matched to a real run — best-effort, not declared by the harness.">inferred</span>` : null}</div>
        <span class="wm-run-view" onClick=${goRun}>View run →</span>
      </div>
      <div class="wm-run-meta">${count} worker${count === 1 ? '' : 's'} · ${fmtCost(run.total_cost_usd)} · ${run.tool_call_count || 0} tool calls</div>
      <div class="wm-run-workers">
        ${(run.sessions || []).map(s => s.is_self
          ? html`<span class="wm-run-chip self" title="this session">${runWorkerGlyph(s.status)} ${s.label || s.session_id.slice(0, 8)}</span>`
          : html`<span class="wm-run-chip" title=${'Open ' + s.session_id} onClick=${() => { location.hash = '#/sessions/' + s.session_id; }}>${runWorkerGlyph(s.status)} ${s.label || s.session_id.slice(0, 8)}</span>`)}
      </div>
    </div>
  `;
}

function WorkMapSection({ sessionId }) {
  const [map, setMap] = useState(null);
  // On-demand LLM-distilled titles (the Distill titles button). `distilled` is
  // the applied titles map (or null = deterministic titles in use). `distillState`
  // drives the button + note: idle | running | applied | nothing | failed.
  const [distilled, setDistilled] = useState(null);
  const [distillState, setDistillState] = useState('idle');
  const [distillFlash, setDistillFlash] = useState(false);

  // Poll like the Timeline so a live session's map fills in as it runs. On a
  // transient failure keep the last good map; only fall back to unavailable on
  // the first load.
  const load = useCallback(() => {
    api('/sessions/' + sessionId + '/workmap')
      .then(d => setMap(d))
      .catch(() => setMap(prev => prev || { available: false }));
  }, [sessionId]);

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, [load]);

  // Auto-apply an already-distilled session on load (cache-only — never calls
  // claude, zero cost), so a press sticks across reloads/navigation.
  useEffect(() => {
    let cancelled = false;
    setDistilled(null); setDistillState('idle');
    api('/sessions/' + sessionId + '/distill', { cached_only: 1 })
      .then(r => {
        if (cancelled) return;
        if (r && r.titles && Object.keys(r.titles).length) {
          setDistilled(r.titles); setDistillState('applied');
        }
      })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [sessionId]);

  // Distill crisp titles via the user's local claude CLI (~10-40s; cached).
  // Distinguish a real failure from "nothing long enough to distill" so the note
  // never lies. A successful apply briefly flashes the headlines.
  const distill = useCallback(() => {
    setDistillState('running');
    api('/sessions/' + sessionId + '/distill')
      .then(r => {
        const titles = (r && r.titles) || {};
        if (Object.keys(titles).length) {
          setDistilled(titles); setDistillState('applied');
          setDistillFlash(true); setTimeout(() => setDistillFlash(false), 1300);
        } else if (r && r.candidate_count === 0) {
          setDistillState('nothing');
        } else {
          setDistillState('failed');
        }
      })
      .catch(() => setDistillState('failed'));
  }, [sessionId]);

  if (!map) return null;

  if (!map.available) {
    return html`
      <div class="page-title" style="font-size:14px;margin-top:24px">Map</div>
      <div class="story-unavailable">No transcript on disk — the work map is available for Claude Code sessions.</div>
    `;
  }

  // The API returns asks newest-first; the Map reads as a STORY, so show it
  // chronologically (oldest first) — distinct from the Timeline's live tail.
  const asks = (map.asks || []).slice().reverse();
  const n = map.ask_count != null ? map.ask_count : asks.length;
  const sub = map.subagent_count || 0;
  const flagged = map.flagged || 0;
  const meta = n + ' ask' + (n === 1 ? '' : 's')
    + ' · ' + sub + ' subagent' + (sub === 1 ? '' : 's')
    + (flagged ? ' · ' + flagged + ' flagged for right-sizing' : '')
    + (map.session_tokens != null ? ' · ' + fmtTokens(map.session_tokens) + ' tok total' : '');

  // 5-second read: totals + the biggest fan-outs (asks that spawned the most
  // subagents). Sort a copy by subagent_count desc; keep the top 2 with any subs.
  const topFanouts = asks.slice()
    .sort((x, y) => askStatus(y).subCount - askStatus(x).subCount)
    .filter(a => askStatus(a).subCount > 0)
    .slice(0, 2);

  // Note under the button — distinct states so it never conflates failure with
  // "nothing to distill".
  const distillNote =
    distillState === 'running' ? html`<span class="wm-distill-note">✨ distilling with your local Claude… (~10s)</span>`
    : distillState === 'applied' ? html`<span class="wm-distill-note">titles distilled by your local Claude · haiku · cached</span>`
    : distillState === 'nothing' ? html`<span class="wm-distill-note">titles already concise — nothing to distill</span>`
    : distillState === 'failed' ? html`<span class="wm-distill-note">couldn't reach your local claude — showing raw titles</span>`
    : null;
  const distillBusy = distillState === 'running';
  const distillBtnLabel = distillBusy ? '✨ Distilling…'
    : distillState === 'applied' ? '✨ Distilled ✓' : '✨ Distill titles';

  return html`
    <div class="wm-map-head">
      <div class="page-title" style="font-size:14px;margin-top:24px">Map</div>
      <button class="btn wm-distill-btn" onClick=${distill} disabled=${distillBusy} title="Crunch each headline into a crisp title via your local Claude (cached).">
        ${distillBtnLabel}
      </button>
    </div>
    <div style="font-size:12px;color:var(--text-dim);margin:-14px 0 12px;font-family:'Geist Mono',monospace">What happened, ask by ask (oldest first) — bold line is what the agent did, dim line is your prompt. ${meta}.${distillNote ? html` ${distillNote}` : null}</div>
    ${map.launched_run ? html`<${WorkMapRunCard} run=${map.launched_run} />` : null}
    ${asks.length === 0 ? null : html`
      <div class="wm-summary-band">
        <div class="wm-summary-stats">
          <span>${map.session_tokens != null ? fmtTokens(map.session_tokens) : '-'} tok</span>
          <span>${n} ask${n === 1 ? '' : 's'}</span>
          <span>${sub} subagent${sub === 1 ? '' : 's'}</span>
          <span>${flagged} flagged</span>
        </div>
        ${topFanouts.length ? html`<div class="wm-summary-fanouts">
          ${topFanouts.map(a => html`<div class="wm-summary-fanout" title=${a.outcome || ''}>${Math.min(askStatus(a).subCount, sub || askStatus(a).subCount)}×: ${firstSentence(a.outcome || a.summary || '') || '(did work — no narration)'}</div>`)}
        </div>` : null}
      </div>
    `}
    <div class="wm-legend"><span><span style="color:var(--brand)">●</span> did work</span><span><span style="color:#f5a623">⚠</span> flagged</span><span><span style="color:var(--error)">✗</span> error</span><span>· chat</span></div>
    ${asks.length === 0
      ? html`<div class="story-unavailable">Transcript found but no asks.</div>`
      : html`<div class="wm-spine ${distillFlash ? 'wm-flash' : ''}">${groupAsks(asks).map(seg => seg.kind === 'chat-run'
          ? html`<${WorkMapChatRun} asks=${seg.asks} sessionSubs=${sub} distilled=${distilled} />`
          : html`<${WorkMapAsk} ask=${seg.ask} sessionSubs=${sub} distilled=${distilled} />`)}</div>`}
    ${map.unmapped_count ? html`<div style="font-size:11px;color:var(--text-dim);margin-top:8px;font-family:'Geist Mono',monospace">+ ${map.unmapped_count} more subagent${map.unmapped_count === 1 ? '' : 's'} with recorded usage not attributed to an ask (deep/budget-capped)${map.unmapped_tokens ? ' · ' + fmtTokens(map.unmapped_tokens) + ' tok' : ''}.</div>` : null}
    <div style="font-size:11px;color:var(--text-dim);margin-top:8px;font-family:'Geist Mono',monospace">Each ask is one thing you asked; structure + activity from the transcript, tokens from spans. Descriptive only — tj reports what happened, you judge the approach.</div>
  `;
}

/* ==================== Approach/Map presentation helpers ====================
   Text-hygiene + layout helpers shared by the Approach spine and Map board:
   mojibake scrub, inline markdown, label truncation, chat-run detection,
   verify-flavored delegation detection, phase-title cleanup. */

// strip UTF-8-as-Latin-1 mojibake ("Â " / "Â " artifacts), collapse
// doubled spaces, trim. Applied to task/outcome/labels/quotes at data-load time.
function stripMojibake(s) {
  if (typeof s !== 'string') return s;
  return s
    .replace(/Â /g, ' ')
    .replace(/Â /g, ' ')
    .replace(/ /g, ' ')
    .replace(/  +/g, ' ')
    .trim();
}
// Deep-sanitize an approach payload in place-of a copy (immutable): task, outcome,
// every move label/quote, delegation task, nested spines, agent names.
// Same scrub for the Timeline's /story payload — asks and step narration come
// off the same mis-decoded transcript text as the approach spine.
function sanitizeStoryPayload(d) {
  if (!d || typeof d !== 'object') return d;
  return {
    ...d,
    task: stripMojibake(d.task),
    outcome: stripMojibake(d.outcome),
    steps: (d.steps || []).map((s) => ({
      ...s,
      text: stripMojibake(s.text),
      ask: s.ask != null ? stripMojibake(s.ask) : s.ask,
    })),
  };
}

function sanitizeApproachPayload(d) {
  if (!d || typeof d !== 'object') return d;
  const move = (m) => ({
    ...m,
    label: stripMojibake(m.label),
    quote: stripMojibake(m.quote),
    evidence: (m.evidence || []).map((e) => ({ ...e, label: stripMojibake(e.label), name: stripMojibake(e.name) })),
    delegations: (m.delegations || []).map(deleg),
  });
  function deleg(x) {
    return { ...x, name: stripMojibake(x.name), task: stripMojibake(x.task), spine: (x.spine || []).map(move) };
  }
  return {
    ...d,
    task: stripMojibake(d.task),
    outcome: stripMojibake(d.outcome),
    name: stripMojibake(d.name),
    spine: (d.spine || []).map(move),
    cross_terminal: (d.cross_terminal || []).map((c) => ({ ...c, name: stripMojibake(c.name), spine: (c.spine || []).map(move) })),
    agents: (d.agents || []).map((a) => ({ ...a, name: stripMojibake(a.name) })),
  };
}

// tiny inline-markdown → vnode renderer for **bold**, *italic*, `code`. No
// HTML injection risk: text runs become preact text nodes (auto-escaped), markers
// become <strong>/<em>/<code> vnodes. No links, no headings.
function mdInline(text) {
  if (typeof text !== 'string') return text;
  const re = /(\*\*([^*]+?)\*\*|\*([^*\s][^*]*?)\*|`([^`]+?)`)/g;
  const out = [];
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push(text.slice(last, m.index));
    if (m[2] != null) out.push(h('strong', null, m[2]));
    else if (m[3] != null) out.push(h('em', null, m[3]));
    else if (m[4] != null) out.push(h('code', { class: 'md-code' }, m[4]));
    last = re.lastIndex;
  }
  if (last < text.length) out.push(text.slice(last));
  return out;
}

// split a quote into a headline sentence (up to first '. '/'! '/'? ' or 160
// chars, word-boundary) + the remaining text.
function splitLeadSentence(q) {
  const s = (q || '').trim();
  const m = s.match(/^.*?[.!?](?=\s)/);
  if (m && m[0].length <= 160) {
    return { head: m[0].trim(), rest: s.slice(m[0].length).trim() };
  }
  if (s.length <= 160) return { head: s, rest: '' };
  const slice = s.slice(0, 160);
  const sp = slice.lastIndexOf(' ');
  const cut = sp > 0 ? sp : 160;
  return { head: slice.slice(0, cut).replace(/[.!?,;:]+$/, '') + '…', rest: s.slice(cut).trim() };
}
// Strip a label's trailing truncation marker so it can be prefix-matched against
// the full quote.
const labelCore = (label) => (label || '').replace(/\s*(…|\.\.\.)\s*$/, '').trim();

// a delegation is "verify-flavored" when its name or task reads as a
// review/verification/audit step.
const VERIFY_NAME_RE = /\b(review|verif\w*|audit|validate|check)\b/i;
const isVerifyDeleg = (d) => !!d && (VERIFY_NAME_RE.test(d.name || '') || VERIFY_NAME_RE.test(d.task || ''));

// is this move part of a plain conversational run (agent narration, no tool
// evidence, no delegation, not a failure/retry)?
const isChatMove = (m) =>
  (m.kind || 'act') === 'act' && m.source === 'agent_words'
  && !(m.evidence && m.evidence.length) && !(m.delegations && m.delegations.length)
  && !m.failed && !m.is_retry;

// middle-truncate a label ("first8…last6") so both ends stay legible.
function mbMidTrunc(s, head = 8, tail = 6) {
  if (typeof s !== 'string' || s.length <= head + tail + 1) return s;
  return s.slice(0, head) + '…' + s.slice(-tail);
}
// strip leading conversational pleasantries from a phase title, uppercase the
// first surviving letter; fall back to the original if stripping empties it.
// The (?![A-Za-z]) guard stops a pleasantry from matching a longer word it
// prefixes (e.g. "Love the moment" must not chop "Love the momentum" → "um").
const MB_PLEASANTRY_RE = /^\s*(Good question|Great question|Totally fair|Fair question|Happy to|Got it|Yes[!,—]|You're right|Love the moment|My apologies|OK[,—]|Okay[,—])(?![A-Za-z])[\s,!.—–-]*/i;
function mbCleanPhase(name) {
  if (typeof name !== 'string') return name;
  let s = name.replace(MB_PLEASANTRY_RE, '').trim();
  if (!s) return name;
  return s.charAt(0).toUpperCase() + s.slice(1);
}
const mbNormTitle = (s) => String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();

// the ✓ outcome block — 3-line clamp with a click-to-toggle "show all".
function ApproachOutcome({ text }) {
  const [open, setOpen] = useState(false);
  return html`
    <div class="ap-outcome">
      <div class="ap-outcome-body ${open ? '' : 'clamp'}">✓ ${mdInline(text)}</div>
      <span class="ap-outcome-more" onClick=${() => setOpen((o) => !o)}>${open ? '⌃ collapse' : '⌄ more'}</span>
    </div>`;
}

// render a method spine, collapsing any run of >4 consecutive conversational
// moves into first + a click-to-expand "· N conversational steps" row + last.
function ApproachSpine({ moves }) {
  const [open, setOpen] = useState({});
  const rows = [];
  let i = 0, runId = 0;
  while (i < moves.length) {
    let j = i;
    while (j < moves.length && isChatMove(moves[j])) j++;
    const runLen = j - i;
    if (runLen > 4) {
      const id = 'run' + (runId++);
      const mid = runLen - 2;
      rows.push(html`<${ApproachMove} move=${moves[i]} key=${'a' + i} />`);
      if (open[id]) {
        for (let k = i + 1; k < j - 1; k++) rows.push(html`<${ApproachMove} move=${moves[k]} key=${'m' + k} />`);
        rows.push(html`<div class="ap-collapse" key=${id} onClick=${() => setOpen((o) => ({ ...o, [id]: false }))}>· collapse ${mid} conversational steps ⌃</div>`);
      } else {
        rows.push(html`<div class="ap-collapse" key=${id} onClick=${() => setOpen((o) => ({ ...o, [id]: true }))}>· ${mid} conversational steps ⌄</div>`);
      }
      rows.push(html`<${ApproachMove} move=${moves[j - 1]} key=${'z' + (j - 1)} />`);
      i = j;
    } else {
      rows.push(html`<${ApproachMove} move=${moves[i]} key=${'s' + i} />`);
      i++;
    }
  }
  return html`<div class="ap-spine">${rows}</div>`;
}
/* ================== end Approach/Map presentation helpers ================= */

// Small text/emoji marker per move kind (offline — no icon font).
const APPROACH_ICONS = { delegate: '⑂', dead_end: '✗', verify: '✅', act: '•' };

// One move on the Approach spine. A `delegate` move renders one rich card per
// entry in `move.delegations` (ApproachDelegation), each expanding into the
// child's own method spine — so the recursion runs through the delegation, not
// a flat children list. Source is reported honestly as the agent's own words or
// a structural inference — never an invented "distilled".
function ApproachMove({ move }) {
  const kind = move.kind || 'act';
  const isDead = kind === 'dead_end' || move.failed;
  const isRetry = !!move.is_retry;
  const icon = APPROACH_ICONS[kind] || '•';
  const srcWords = move.source === 'agent_words';
  const ev = move.evidence || [];
  const delegations = move.delegations || [];
  // a delegate move that carries its own delegation card(s) — suppress the
  // redundant label + "Agent <name>" evidence line, keep the ⑂ marker + cards.
  const isDelegateCard = kind === 'delegate' && delegations.length > 0;
  // when the quote just re-states the truncated label, drop the separate
  // italic line and un-truncate the headline to the quote's first sentence;
  // spill the remainder into the italic line.
  const rawLabel = move.label || '';
  const quote = move.quote || '';
  const core = labelCore(rawLabel);
  const isDupe = quote && core && core.length > 8 && quote.startsWith(core);
  const split = isDupe ? splitLeadSentence(quote) : null;
  const headline = isDupe ? split.head : rawLabel;
  const italic = isDupe ? split.rest : quote;
  return html`
    <div class="ap-move ap-${kind} ${isDead ? 'dead' : ''} ${isRetry ? 'retry' : ''}">
      <div class="ap-ic">${icon}</div>
      <div class="ap-top">
        <span class="ap-kind">${kind.replace('_', ' ')}</span>
        ${isDelegateCard ? null : html`<span class="ap-label">${mdInline(headline)}</span>`}
        ${(isDead || isRetry) ? html`<span class="ap-revert">${kind === 'dead_end' ? 'reverted · dead-end' : 'retry'}</span>` : null}
        ${isDelegateCard ? null : html`<span class="ap-src ${srcWords ? 'words' : 'struct'}">${srcWords ? "agent's words" : 'structural'}</span>`}
      </div>
      ${!isDelegateCard && italic ? html`<div class="ap-quote">${mdInline(italic)}</div>` : null}
      ${!isDelegateCard && ev.length ? html`<div class="ap-ev">▸ ${ev.map((e, i) => html`<span class="ap-ev-item">${i > 0 ? ' · ' : ''}${e.name} ${e.label}${e.status === 'error' ? html` <span class="ap-ev-st err">✗</span>` : null}</span>`)}</div>` : null}
      ${delegations.map(d => html`<${ApproachDelegation} deleg=${d} />`)}
    </div>
  `;
}

// A single delegation card: `↳ name · depth N · tokens · $cost · status`. Click
// to expand a nested block — the child's "how it solved its piece" sub-header,
// its mandate, and its own method spine (rendered by ApproachMove, recursively).
// A `capped` delegation shows a "not expanded — reason" note and never expands.
function ApproachDelegation({ deleg }) {
  const [open, setOpen] = useState(false);
  const capped = deleg.capped;
  const spine = deleg.spine || [];
  // verify-flavored delegation → ✅ accent + a 'verify' chip.
  const isVerify = isVerifyDeleg(deleg);
  const verifyChip = isVerify ? html`<span class="ap-verify-chip">✅ verify</span>` : null;
  const stats = [
    deleg.tokens != null ? fmtTokens(deleg.tokens) : null,
    deleg.cost_usd != null ? fmtCost(deleg.cost_usd) : null,
    deleg.status || (capped ? 'capped' : 'ended'),
  ].filter(Boolean).join(' · ');
  if (capped) {
    return html`
      <div class="ap-deleg capped ${isVerify ? 'ap-verify-deleg' : ''}">
        <span class="ap-caret">▶</span>
        <div class="ap-deleg-main">
          <div class="ap-deleg-name">↳ ${deleg.name} <span class="ap-depthtag">depth ${deleg.depth}</span>${verifyChip}</div>
          <div class="ap-deleg-note">not expanded — ${capped}</div>
        </div>
      </div>`;
  }
  return html`
    <div class="ap-deleg ${open ? 'open' : ''} ${isVerify ? 'ap-verify-deleg' : ''}" onClick=${() => setOpen(o => !o)}>
      <span class="ap-caret">▶</span>
      <div class="ap-deleg-main">
        <div class="ap-deleg-name">↳ ${deleg.name} <span class="ap-depthtag">depth ${deleg.depth}</span>${verifyChip}</div>
      </div>
      <span class="ap-deleg-stats">${stats}</span>
    </div>
    ${open ? html`
      <div class="ap-nested">
        <div class="ap-chead">↳ <b>${deleg.name}</b> · how the subagent solved its piece</div>
        ${deleg.task ? html`<div class="ap-cmandate">mandate: <i>${mdInline(deleg.task)}</i></div>` : null}
        ${spine.length
          ? html`<${ApproachSpine} moves=${spine} />`
          : html`<div class="ap-cmandate"><i>no moves reconstructed for this subagent</i></div>`}
      </div>` : null}
  `;
}

// A spliced cross-terminal child (M2b): a separate run-linked session the harness
// spawned in another terminal. Rendered amber (↗) under the "cross-terminal
// children" divider, expanding into the child's OWN method spine — the same
// recursive ApproachMove styling an in-session delegation uses.
function ApproachCrossTerminal({ child }) {
  const [open, setOpen] = useState(false);
  const spine = child.spine || [];
  return html`
    <div class="ap-deleg ap-xterm ${open ? 'open' : ''}" onClick=${() => setOpen(o => !o)}>
      <span class="ap-caret">▶</span>
      <div class="ap-deleg-main">
        <div class="ap-deleg-name">↗ ${child.name} <span class="ap-depthtag">cross-terminal</span></div>
        <div class="ap-prov">cross-terminal child · run-linked</div>
      </div>
    </div>
    ${open ? html`
      <div class="ap-nested ap-xterm-nested">
        <div class="ap-chead">↗ <b>${child.name}</b> · how the child session solved its piece</div>
        ${spine.length
          ? html`<${ApproachSpine} moves=${spine} />`
          : html`<div class="ap-cmandate"><i>no moves reconstructed for this child</i></div>`}
      </div>` : null}
  `;
}

// The left delegation-tree rail: every agent in the spawn tree (data.agents),
// indented by depth, with a status dot, a meta line, a status badge, and a
// provenance sub-line for in-session subagents.
function ApproachRail({ agents }) {
  return html`
    <div class="ap-rail">
      <h4 class="ap-rail-h">Delegation tree</h4>
      <div class="ap-rail-sub">indent = spawn depth · each agent's method is rebuilt below</div>
      ${agents.map(a => {
        const isMain = a.depth === 0;
        // A cross-terminal child (M2b) is a separate run-linked session, not an
        // in-session sidechain — amber, honestly marked by capture_completeness.
        const isCross = a.provenance === 'cross_terminal_child';
        const isCapped = a.capture_completeness !== 'full';
        const dotClass = isMain ? 'is-main' : ((isCross || isCapped) ? 'is-term' : 'is-sub');
        const dCls = a.depth ? ('d' + Math.min(a.depth, 3)) : '';
        const meta = (a.tokens != null ? fmtTokens(a.tokens) + ' tok' : ('depth ' + (a.depth || 0)))
          + (a.cost_usd != null ? ' · ' + fmtCost(a.cost_usd) : '');
        let badgeCls = '', badgeTxt;
        if (isMain) { badgeCls = a.status === 'active' ? 'live' : ''; badgeTxt = a.status === 'active' ? '● live' : (a.status || 'completed'); }
        else if (isCross) { badgeCls = 'partial'; badgeTxt = a.capture_completeness === 'full' ? '⏏ ended · method kept' : 'session-level'; }
        else if (isCapped) { badgeCls = 'partial'; badgeTxt = '⏏ ' + (a.status || 'capped'); }
        else { badgeTxt = '⏏ ended · method kept'; }
        const provLine = isMain ? null
          : (isCross ? 'cross-terminal child · run-linked' : 'in-session subagent · from transcript');
        // a plain in-session subagent's badge ("⏏ ended · method kept") and
        // provenance ("in-session subagent · from transcript") are the defaults for
        // every killed sidechain — pure noise repeated down the rail. Hide both and
        // fold them into the node's title=; keep badges only for the exceptions
        // (main/live, cross-terminal, capped/killed).
        const isPlainSub = !isMain && !isCross && !isCapped;
        const showBadge = !isPlainSub;
        const showProv = provLine && !isPlainSub;
        const nodeTitle = isPlainSub ? (badgeTxt + ' · ' + provLine) : '';
        return html`
          <div class="ap-node ${dCls}" title=${nodeTitle}>
            <div class="ap-dot ${dotClass}"></div>
            <div>
              <div class="ap-nname">${a.name || '(unnamed)'}</div>
              <div class="ap-nmeta">${meta}</div>
              ${showBadge ? html`<span class="ap-badge ${badgeCls}">${badgeTxt}</span>` : null}
              ${showProv ? html`<div class="ap-prov">${provLine}</div>` : null}
            </div>
          </div>`;
      })}
      <div class="ap-railcap">Nodes below main were <b>killed</b> when done — their context is gone, so tokenjam rebuilds <b>how each one solved its piece</b> from the captured transcript. The badge never claims more than tokenjam actually has.</div>
    </div>
  `;
}

// The Approach tab: HOW the agent attempted the work. Mirrors WorkMapSection's
// fetch idiom (poll the dedicated endpoint; keep the last good payload on a
// transient failure). Two columns: the delegation-tree rail + the focused method
// panel (a bordered header card with mandate/outcome/stats, the spine, a legend).
function ApproachSection({ sessionId }) {
  const [data, setData] = useState(null);

  const load = useCallback(() => {
    api('/sessions/' + sessionId + '/approach')
      .then(d => setData(sanitizeApproachPayload(d)))   // de-mojibake at load
      .catch(() => setData(prev => prev || { available: false }));
  }, [sessionId]);

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, [load]);

  if (!data) return null;

  if (!data.available) {
    return html`
      <div class="page-title" style="font-size:14px;margin-top:24px">Approach</div>
      <div class="story-unavailable">${data.reason || 'No transcript or snapshot for this session — Approach is available for Claude Code sessions.'}</div>
    `;
  }

  const spine = data.spine || [];
  const agents = data.agents || [];
  const crossTerminal = data.cross_terminal || [];
  const counts = data.counts || { moves: 0, delegations: 0, dead_ends: 0, verifies: 0 };
  // the backend reports verifies:0 — recompute client-side by counting
  // verify-flavored delegations across the spine (and cross-terminal children).
  let verifyCount = 0;
  const countVerify = (moves) => (moves || []).forEach((m) => {
    (m.delegations || []).forEach((d) => { if (isVerifyDeleg(d)) verifyCount++; });
  });
  countVerify(spine);
  crossTerminal.forEach((c) => countVerify(c.spine));
  const meta = data.meta || {};
  const statLine = (meta.cost_usd != null ? fmtCost(meta.cost_usd) : '$0.0000')
    + ' · ' + (meta.tokens != null ? fmtTokens(meta.tokens) : '-') + ' tok';
  return html`
    <div class="page-title" style="font-size:14px;margin-top:24px">Approach</div>
    <div style="font-size:12px;color:var(--text-dim);margin:-14px 0 12px;font-family:'Geist Mono',monospace">How the agent attempted it — the method spine, rebuilt for every agent and kept after each is killed; expand any delegation to recurse into the child's own method${data.from_snapshot ? ' · from snapshot' : ''}.</div>
    <div class="ap-grid">
      <${ApproachRail} agents=${agents} />
      <div class="ap-panel">
        <div class="ap-head">
          <div>
            ${data.name ? html`<div class="ap-who">${data.name}</div>` : null}
            ${data.task ? html`<div class="ap-mandate">mandate: <b>${mdInline(data.task)}</b></div>` : null}
            ${data.outcome ? html`<${ApproachOutcome} text=${data.outcome} />` : null}
          </div>
          <div class="ap-rt"><b>${counts.moves}</b> moves<br/><b>${counts.delegations}</b> delegations<br/><b>${counts.dead_ends}</b> dead-ends<br/><b>${verifyCount}</b> verifies<br/>${statLine}</div>
        </div>
        ${spine.length === 0
          ? html`<div class="story-unavailable">Transcript found but no moves reconstructed.</div>`
          : html`<${ApproachSpine} moves=${spine} />`}
        ${crossTerminal.length ? html`
          <div class="ap-xterm-divider">cross-terminal children</div>
          ${crossTerminal.map(c => html`<${ApproachCrossTerminal} child=${c} />`)}
        ` : null}
        <div class="ap-legend">
          <span><b>source of each line:</b></span>
          <span><span class="ap-src words">agent's words</span> narration / TodoWrite</span>
          <span><span class="ap-src struct">structural</span> revert / retry / spawn</span>
          <span><span class="ap-src distill">distilled</span> LLM, opt-in</span>
        </div>
      </div>
    </div>
  `;
}

// --- Map board (① synchronized swimlanes + ③ codebase territory) ------------- //
// Event category → theme color var (offline; no hardcoded hexes — Rule 18).
const MB_CAT_COLOR = {
  read: '--chart-1', search: '--chart-4', edit: '--chart-2', bash: '--chart-3',
  task: '--chart-5', web: '--chart-6', other: '--text-dim', error: '--error',
};
// Subtle phase-band tints, cycled across phase spans.
const MB_PHASE_TINTS = ['--chart-1', '--chart-4', '--chart-2', '--chart-3', '--chart-6', '--chart-5'];
const MB_GUTTER = 78; // px — keep in sync with .mb-gutter width so the crosshair lands in the plot.
const MB_PHASE_LABEL_MIN = 60; // px — only print a phase-band label when the band is at least this wide.
const MB_EVLAB_MAX = 72;       // px — keep in sync with .mb-evlab max-width (caps a label's box; used to clamp inside the lane).
const MB_EVLAB_GAP = 80;       // px — min center-to-center spacing between two printed tool labels; must exceed MB_EVLAB_MAX so two kept (center-anchored) labels can never touch.
const MB_SUBBAR_MIN = 1.2;     // % — minimum subagent-bar width so a short window stays visible (labels are px-gated separately).
const MB_SUBBAR_GAP = 0.6;     // % — gap required before two bars share a row (else they stack).
const MB_SUB_MAX_ROWS = 8;     // max stacked rows in the sub-agents lane (overflow falls onto the least-loaded row, label-less).
const MB_SUB_ROW_H = 16;       // px — vertical pitch per stacked subagent row.
const MB_SUBLAB_MIN_PX = 40;   // px — print a subagent bar's label only when the bar is at least this wide (narrower bars keep the hover title, so text never collides; labels are middle-truncated so this can sit low).
const MB_BREAK_LAB_W = 74;     // px — break-label box width, used to clamp it inside the board.
const MB_BREAK_LAB_GAP = 52;   // px — min spacing between printed idle-gap labels (rules still draw for all).

const mbColor = (cat) => 'var(' + (MB_CAT_COLOR[cat] || '--text-dim') + ')';
// A theme color at a given alpha, via color-mix (no rgba(hex) — keeps theming live).
const mbTint = (cssVarName, pct) => 'color-mix(in srgb, var(' + cssVarName + ') ' + pct + '%, transparent)';
const mbEsc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
function mbFmtTime(sec) {
  if (sec == null || isNaN(sec)) return '0s';
  if (sec < 60) return Math.round(sec) + 's';
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return s ? (m + 'm ' + s + 's') : (m + 'm');
}
// Compact duration for an idle-gap break label: seconds → minutes → hours, one
// unit only (e.g. "45s", "12m", "1.5h", "30h") so the marker stays terse.
function mbFmtGap(sec) {
  if (sec == null || isNaN(sec)) return '0s';
  if (sec < 90) return Math.round(sec) + 's';
  const m = sec / 60;
  if (m < 90) return Math.round(m) + 'm';
  const h = m / 60;
  return (h < 10 ? h.toFixed(1) : Math.round(h)) + 'h';
}

// --- Tools-lane density histogram (time mode) ------------------------------- //
// Human display name per category (for bucket tooltips + the legend echo).
const MB_CAT_LABEL = {
  read: 'Read', search: 'Grep/Glob', edit: 'Edit/Write', bash: 'Bash',
  task: 'Task', web: 'WebFetch', other: 'Other', error: 'error',
};
// Stack order, bottom → top; error last so failures sit on top of each bar.
const MB_STACK_ORDER = ['read', 'search', 'edit', 'bash', 'task', 'web', 'other', 'error'];
// Preferred bin widths (ACTIVE seconds) the auto-resolver tries first.
const MB_BIN_LADDER = [60, 300, 900, 3600];
const MB_HIST_MAX_PX = 44;     // px — tallest histogram bar (tools lane is 52px; leaves headroom).
const MB_HIST_TARGET = 80;     // Auto aims for ~this many bars across the active span.
// Nice bin widths (seconds) Auto falls back to when no ladder step lands in-range.
const MB_NICE_SECONDS = [1, 2, 5, 10, 15, 20, 30, 60, 120, 300, 600, 900, 1800, 3600, 7200, 10800, 21600, 43200, 86400];
// Auto bin width: prefer the smallest ladder step that yields ~60–100 bars for
// this active span; else the smallest nice width targeting ~80 bars.
function mbAutoBinWidth(activeDur) {
  if (!(activeDur > 0)) return 60;
  for (const w of MB_BIN_LADDER) {
    const bars = activeDur / w;
    if (bars >= 60 && bars <= 100) return w;
  }
  const ideal = activeDur / MB_HIST_TARGET;
  for (const w of MB_NICE_SECONDS) if (w >= ideal) return w;
  return MB_NICE_SECONDS[MB_NICE_SECONDS.length - 1];
}
// Terse label for a bin width in seconds: 3600→"1h", 300→"5m", 30→"30s".
function mbFmtBin(w) {
  if (w == null) return '';
  if (w % 3600 === 0) return (w / 3600) + 'h';
  if (w % 60 === 0) return (w / 60) + 'm';
  return w + 's';
}

// A path outside the workspace that agents use as scratch: OS temp dirs,
// screenshot staging, trash. Reads there are process noise, not "where the work
// landed" — the treemap demotes them into one collapsed card instead of letting
// a dozen one-off screenshot reads swamp the real files.
const MB_SCRATCH_RE = /(^\/(private\/)?(tmp|var\/folders)\/)|\/TemporaryItems\/|\/\.Trash\/|\/scratchpad\//;
const mbIsScratchPath = (p) => MB_SCRATCH_RE.test(p);

// Aggregate the event stream into a codebase-territory treemap: read/edit events
// carry a file-path `label`; count touches per file, track first-touch order (min
// ordinal) and whether the file was ever edited, then group files by directory.
// Files with no usable path label are skipped; scratch/temp paths are demoted to
// one collapsed card (and excluded from the common-prefix root, so workspace dir
// labels stay relative + readable). Cards and files are weighted by EDITS over
// reads — edits are where the work landed. Returns null when nothing maps.
function mbBuildTerritory(events) {
  const files = new Map();
  (events || []).forEach((e) => {
    if (e.category !== 'read' && e.category !== 'edit') return;
    const path = (e.label || '').trim();
    if (!path || path.indexOf('://') >= 0) return;            // skip URLs / empty
    if (path.indexOf('/') < 0 && path.indexOf('.') < 0) return; // not a usable path label
    const ord = e.ordinal != null ? e.ordinal : 0;
    let f = files.get(path);
    if (!f) { f = { path, reads: 0, edits: 0, touches: 0, firstOrd: ord, edited: false }; files.set(path, f); }
    f.touches++;
    if (e.category === 'edit') { f.edits++; f.edited = true; } else { f.reads++; }
    if (ord < f.firstOrd) f.firstOrd = ord;
  });
  const all = [...files.values()];
  if (!all.length) return null;
  // Global first-touch rank → the order badge on each file (scratch included,
  // so ranks stay honest about what happened when).
  all.slice().sort((a, b) => a.firstOrd - b.firstOrd).forEach((f, i) => { f.rank = i + 1; });
  // Demote scratch/temp paths into one collapsed card; everything below builds
  // from the workspace files only (prefix, grouping, intensity).
  const scratchFiles = all.filter((f) => mbIsScratchPath(f.path));
  let list = all.filter((f) => !mbIsScratchPath(f.path));
  if (!list.length) { list = scratchFiles.splice(0); } // all-scratch session: show them normally
  const dirOf = (p) => { const i = p.lastIndexOf('/'); return i < 0 ? '' : p.slice(0, i); };
  const baseOf = (p) => { const i = p.lastIndexOf('/'); return i < 0 ? p : p.slice(i + 1); };
  // Longest common path-segment prefix (shown as the tree root; stripped from dir labels).
  const segLists = list.map((f) => dirOf(f.path).split('/').filter(Boolean));
  let pref = segLists.length ? segLists[0].slice() : [];
  segLists.forEach((segs) => { let i = 0; while (i < pref.length && i < segs.length && pref[i] === segs[i]) i++; pref = pref.slice(0, i); });
  const prefLen = pref.length;
  const groups = new Map();
  list.forEach((f) => {
    const dir = dirOf(f.path);
    const restSegs = dir.split('/').filter(Boolean).slice(prefLen);
    const rest = restSegs.join('/');
    const key = rest || '(root)';           // group by the full (prefix-stripped) dir so distinct dirs never merge
    let g = groups.get(key);
    if (!g) {
      // Header shows only the last 1–2 path segments (ellipsized in CSS); the full
      // dir is kept for the hover title. When dirs share no common prefix (mixed
      // absolute roots) the prefix strip is a no-op, so this is what keeps headers short.
      const shortLabel = restSegs.length === 0
        ? '(root)'
        : (restSegs.length > 2 ? '…/' + restSegs.slice(-2).join('/') : rest);
      g = { label: shortLabel + '/', full: (dir || '(root)'), totalTouches: 0, weight: 0, files: [] };
      groups.set(key, g);
    }
    g.totalTouches += f.touches;
    // Edits are where the work landed — weight them over reads so an edited file
    // (and its directory) claims more space than a widely-read one.
    g.weight += f.edits * 3 + f.reads;
    g.files.push({ ...f, base: baseOf(f.path) });
  });
  const dirs = [...groups.values()];
  dirs.forEach((d) => d.files.sort((a, b) => (b.edits * 3 + b.reads) - (a.edits * 3 + a.reads) || b.touches - a.touches));
  dirs.sort((a, b) => b.weight - a.weight);
  const maxTouches = list.reduce((m, f) => Math.max(m, f.touches), 1);
  // One collapsed card for the demoted scratch reads (rendered last, muted).
  const scratch = scratchFiles.length ? {
    count: scratchFiles.length,
    reads: scratchFiles.reduce((s, f) => s + f.reads, 0),
    edits: scratchFiles.reduce((s, f) => s + f.edits, 0),
    title: scratchFiles.slice(0, 12).map((f) => f.path).join('\n')
      + (scratchFiles.length > 12 ? '\n… +' + (scratchFiles.length - 12) + ' more' : ''),
  } : null;
  return { root: (pref.join('/') || 'workspace') + '/', dirs, maxTouches, scratch };
}

// Lay out the sub-agents lane: position each subagent as a [left,right]% bar on
// the SAME axis the other lanes use (time → ts offset / duration; step →
// start/end ordinal), then greedily pack non-overlapping bars onto rows (the
// lane grows up to MB_SUB_MAX_ROWS). Past the cap an item falls onto the
// earliest-ending row and is marked `.overlapped` so the renderer suppresses
// its label — bars may then overlap, text never does. In step mode a subagent
// with no mapped ordinals is hidden (it has no step-grid position). Returns the
// placed items (with `.row`) and the row count for sizing the lane.
function mbLayoutSubagents(subs, mode, started, duration, n) {
  const clamp01 = (f) => Math.max(0, Math.min(1, f));
  const items = [];
  (subs || []).forEach((sa) => {
    let l, r;
    if (mode === 'time') {
      // Active-time axis first (idle gaps collapsed); fall back to raw wall-clock
      // offset for payloads without active_s (older backend / no gaps).
      const so = (sa.start_active_s != null) ? sa.start_active_s
        : ((sa.start_ts && !isNaN(started)) ? (Date.parse(sa.start_ts) - started) / 1000 : null);
      const eo = (sa.end_active_s != null) ? sa.end_active_s
        : ((sa.end_ts && !isNaN(started)) ? (Date.parse(sa.end_ts) - started) / 1000 : null);
      if (so == null || duration <= 0) return; // no usable time position
      l = clamp01(so / duration);
      r = clamp01((eo != null ? eo : so) / duration);
    } else {
      if (sa.start_ordinal == null || sa.end_ordinal == null || n <= 1) return; // hide: no step-grid position
      l = clamp01(sa.start_ordinal / (n - 1));
      r = clamp01(sa.end_ordinal / (n - 1));
    }
    const left = l * 100;
    items.push({ sa, left, right: Math.max(left + MB_SUBBAR_MIN, r * 100) });
  });
  items.sort((a, b) => a.left - b.left);
  const rowEnds = []; // right edge (%) of the last bar placed on each row
  items.forEach((it) => {
    let row = rowEnds.findIndex((end, idx) => idx < MB_SUB_MAX_ROWS && it.left >= end + MB_SUBBAR_GAP);
    it.overlapped = false;
    if (row < 0) {
      if (rowEnds.length < MB_SUB_MAX_ROWS) { row = rowEnds.length; rowEnds.push(0); }
      else {
        // Every row is occupied here — this bar WILL overlap its row-mate, so
        // flag it: the renderer keeps the bar (honest density) but not the label.
        row = 0; for (let k = 1; k < rowEnds.length; k++) if (rowEnds[k] < rowEnds[row]) row = k;
        it.overlapped = true;
      }
    }
    rowEnds[row] = Math.max(rowEnds[row], it.right);
    it.row = row;
  });
  return { items, rows: Math.max(1, rowEnds.length) };
}

// The Map tab's board: phase / tools / sub-agents / context / cost lanes share one
// x-axis with a time⇄step toggle and a shared crosshair, plus the territory
// treemap below. When /sessionmap has no board data we fall back to the nested
// WorkMapSection so nothing is lost for sessions without it. The sub-agents lane
// (between tools and context) renders only when the session spawned subagents.
function MapBoardSection({ sessionId }) {
  const [data, setData] = useState(null);
  // Step is the DEFAULT read: evenly spaced by tool-call order, it shows the
  // work sequence without burst/idle distortion. Time mode (one click away)
  // answers "when did money burn"; the insights strip answers it in text too.
  const [mode, setMode] = useState('step'); // 'step' | 'time'
  const boardRef = useRef(null);
  const crossRef = useRef(null);
  const crossLabelRef = useRef(null);
  const tipRef = useRef(null);

  // Poll like WorkMapSection/ApproachSection so a live session fills in; keep the
  // last good payload on a transient failure.
  const load = useCallback(() => {
    api('/sessions/' + sessionId + '/sessionmap')
      .then((d) => setData(d))
      .catch(() => setData((prev) => prev || { available: false }));
  }, [sessionId]);

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, [load]);

  // Measured plot width (board minus gutter) — drives px-based label thinning/clamping
  // so phase + tool labels never overlap or overflow the lane regardless of zoom/width.
  const [plotW, setPlotW] = useState(0);
  useLayoutEffect(() => {
    const measure = () => { const el = boardRef.current; if (el) setPlotW(Math.max(0, el.clientWidth - MB_GUTTER)); };
    measure();
    const ro = (typeof ResizeObserver !== 'undefined') ? new ResizeObserver(measure) : null;
    if (ro && boardRef.current) ro.observe(boardRef.current);
    window.addEventListener('resize', measure);
    return () => { if (ro) ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [data]);

  if (!data) return null; // loading — render nothing (mirrors ApproachSection)

  const events = (data.events || []).slice().sort((a, b) => (a.ordinal || 0) - (b.ordinal || 0));
  const ctxSeries = data.context_series || [];
  const costSeries = data.cost_series || [];

  // No board data for this session → fall back to the existing work map.
  if (!data.available || (!events.length && !ctxSeries.length && !costSeries.length)) {
    return html`<${WorkMapSection} sessionId=${sessionId} />`;
  }

  const meta = data.meta || {};
  const phases = data.phases || [];
  const n = events.length;
  const started = meta.started_at ? Date.parse(meta.started_at) : NaN;
  const duration = (meta.duration_s && meta.duration_s > 0)
    ? meta.duration_s
    : Math.max(1, ...ctxSeries.map((p) => p.t_s || 0), ...costSeries.map((p) => p.t_s || 0), 1);
  // Time mode plots on the idle-collapsed ACTIVE-time axis (meta.active_duration_s
  // + per-point active_s), so the real work spreads out instead of being crammed
  // against huge idle gaps. meta.gaps are the collapsed stretches → break markers.
  // No gaps → active_duration_s == duration_s and every active_s == its wall-clock
  // offset, so time mode is byte-identical to the old wall-clock behavior.
  const activeDur = (meta.active_duration_s && meta.active_duration_s > 0) ? meta.active_duration_s : duration;
  const gaps = meta.gaps || [];

  const clamp01 = (f) => Math.max(0, Math.min(1, f));
  const evOffset = (e) => (e.ts && !isNaN(started)) ? (Date.parse(e.ts) - started) / 1000 : null;
  const evStepFrac = (e, i) => (n > 1 ? i / (n - 1) : 0);
  const evTimeFrac = (e, i) => {
    const a = (e.active_s != null) ? e.active_s : evOffset(e);
    return (a == null || activeDur <= 0) ? evStepFrac(e, i) : clamp01(a / activeDur);
  };
  // x% of an event in the current mode: by wall-clock offset (time) or evenly by
  // ordinal position (step). The toggle re-spaces every lane because every lane's
  // x derives from this one function (events) or seriesFrac (the SVG lanes).
  const evX = (e, i) => 100 * (mode === 'time' ? evTimeFrac(e, i) : evStepFrac(e, i));

  // Series points carry only t_s. In step mode we interpolate their wall-clock
  // offset onto the event step-grid (anchors), so the SVG lanes stay aligned to
  // the tool ticks under both modes.
  const anchors = events.map((e, i) => ({ off: evOffset(e), sf: evStepFrac(e, i) }))
    .filter((a) => a.off != null).sort((a, b) => a.off - b.off);
  const stepFracForTs = (ts) => {
    if (anchors.length < 2) return duration > 0 ? clamp01(ts / duration) : 0;
    if (ts <= anchors[0].off) return anchors[0].sf;
    if (ts >= anchors[anchors.length - 1].off) return anchors[anchors.length - 1].sf;
    for (let i = 1; i < anchors.length; i++) {
      if (ts <= anchors[i].off) {
        const a = anchors[i - 1], b = anchors[i];
        return a.sf + ((ts - a.off) / ((b.off - a.off) || 1)) * (b.sf - a.sf);
      }
    }
    return 1;
  };
  // Series points carry both t_s (wall-clock) and active_s (idle-collapsed). Time
  // mode fracs by active_s/activeDur (fall back to t_s); step mode interpolates the
  // raw wall-clock ts onto the event step-grid (unchanged).
  const seriesActive = (p) => (p && p.active_s != null) ? p.active_s : ((p && p.t_s) || 0);
  const seriesFrac = (p) => (mode === 'time'
    ? (activeDur > 0 ? clamp01(seriesActive(p) / activeDur) : 0)
    : stepFracForTs((p && p.t_s) || 0));

  // Phase band edges anchor to the nearest event by ordinal, so bands line up with
  // the tool ticks; bands are made contiguous (each runs to the next phase's start).
  const phaseEdgeX = (ord) => {
    if (!n) return 0;
    let bi = 0, bd = Infinity;
    events.forEach((e, i) => { const d = Math.abs((e.ordinal || 0) - (ord || 0)); if (d < bd) { bd = d; bi = i; } });
    return evX(events[bi], bi);
  };
  const sortedPhases = phases.slice().sort((a, b) => (a.start_ordinal || 0) - (b.start_ordinal || 0));
  // strip leading pleasantries from phase titles, then merge adjacent phases
  // whose cleaned titles are identical (case/punct-insensitive). Dropping the later
  // duplicate is enough to merge — bands run to the next distinct phase's start.
  const cleanedPhases = [];
  sortedPhases.forEach((p) => {
    const name = mbCleanPhase(p.name);
    const prev = cleanedPhases[cleanedPhases.length - 1];
    if (prev && mbNormTitle(prev.name) === mbNormTitle(name)) return;
    cleanedPhases.push({ ...p, name });
  });
  const starts = cleanedPhases.map((p) => phaseEdgeX(p.start_ordinal));
  const phaseBands = cleanedPhases.map((p, i) => ({
    name: p.name,
    left: i === 0 ? 0 : starts[i],
    right: i === cleanedPhases.length - 1 ? 100 : starts[i + 1],
    tint: mbTint(MB_PHASE_TINTS[i % MB_PHASE_TINTS.length], 14),
    last: i === cleanedPhases.length - 1,
  }));
  // in time mode, split any phase band that spans an idle break into segments
  // with a visible gap at the break; label only the widest segment of each phase.
  const phaseSegs = [];
  if (mode === 'time' && gaps.length) {
    const gapPct = plotW > 0 ? Math.min(2, (5 / plotW) * 100) : 0.5;
    const breakFracs = gaps.map((g) => clamp01(g.at_active_frac) * 100).sort((a, b) => a - b);
    phaseBands.forEach((band) => {
      const inside = breakFracs.filter((x) => x > band.left + 0.05 && x < band.right - 0.05);
      const bounds = [band.left, ...inside, band.right];
      const segs = [];
      for (let k = 0; k < bounds.length - 1; k++) {
        let l = bounds[k], r = bounds[k + 1];
        if (k > 0) l += gapPct / 2;                    // gap after a break
        if (k < bounds.length - 2) r -= gapPct / 2;    // gap before the next break
        if (r > l) segs.push({ left: l, right: r, name: band.name, tint: band.tint, last: band.last && k === bounds.length - 2 });
      }
      let widest = 0, wmax = -1;
      segs.forEach((s, si) => { const w = s.right - s.left; if (w > wmax) { wmax = w; widest = si; } });
      segs.forEach((s, si) => phaseSegs.push({ ...s, labelSeg: si === widest }));
    });
  }
  const usePhaseSegs = mode === 'time' && gaps.length > 0 && phaseSegs.length > 0;

  // Which tool ticks get a printed label: walk the labelable events left→right and
  // keep one only when its RENDERED center sits at least MB_EVLAB_GAP px past the
  // last kept label, so the printed subset is sparse and never overlaps (dense
  // regions lean on hover). The gap is enforced on the *clamped* x (each label's
  // box is clamped so its max-width stays inside the lane), not the raw x — at the
  // edges the clamp shifts a label inward, so comparing raw x would let an
  // edge-clamped label collide with its neighbor (MB_EVLAB_GAP > MB_EVLAB_MAX, so
  // two kept rendered centers that far apart can never touch).
  const labelPx = (i) => (evX(events[i], i) / 100) * plotW;
  const half = MB_EVLAB_MAX / 2;
  const shownLabels = [];
  if (plotW > 0) {
    let lastPx = -Infinity, lastTxt = null;
    events.forEach((e, i) => {
      if (!e.label) return;
      const clampedPx = Math.max(half, Math.min(plotW - half, labelPx(i)));
      if (clampedPx - lastPx < MB_EVLAB_GAP) return;
      // head-truncate long filenames (keep the distinctive tail) and suppress a
      // label that repeats the most recently SHOWN one (consecutive same-file ticks).
      const txt = evLabelShort(e.label);
      if (txt === lastTxt) return;
      lastPx = clampedPx; lastTxt = txt;
      shownLabels.push({ i, leftPct: (clampedPx / plotW) * 100, txt });
    });
  }

  // Context area+line (each call's OWN context occupancy — input+cache tokens on
  // that call, so growth/compaction/resets are visible; NOT a cumulative sum) and
  // cost bars (per-span burn) as inline SVG on a shared 0..100 x — NOT uPlot —
  // so the lanes stay pixel-aligned.
  const maxCtx = Math.max(1, ...ctxSeries.map((p) => p.tokens || 0));
  const ctxPts = ctxSeries.map((p) => [seriesFrac(p) * 100, 30 - ((p.tokens || 0) / maxCtx) * 26]);
  const ctxLine = ctxPts.map((pt, i) => (i ? 'L' : 'M') + pt[0].toFixed(2) + ',' + pt[1].toFixed(2)).join(' ');
  // close the area straight down at the LAST sample's x (and up at the first),
  // so the fill stops where the data stops instead of fading to the right edge as a
  // decaying wedge. The stroke (ctxLine) already ends at the last sample.
  const ctxFirstX = ctxPts.length ? ctxPts[0][0] : 0;
  const ctxLastX = ctxPts.length ? ctxPts[ctxPts.length - 1][0] : 100;
  const ctxArea = ctxPts.length ? ctxLine + ' L' + ctxLastX.toFixed(2) + ',30 L' + ctxFirstX.toFixed(2) + ',30 Z' : '';
  const maxCost = Math.max(0.0001, ...costSeries.map((p) => p.usd || 0));

  // Tools-lane density histogram (TIME MODE ONLY): bin every event into fixed
  // active-time buckets (idle-collapsed, same axis the lanes use), stacked by
  // category. Bin width is ALWAYS auto-resolved for this span — the manual
  // interval ladder was purged (#58): bin widths carry no domain meaning for an
  // agent run, and a manual 1h on a 40m session collapsed the board into one
  // full-width slab. The width is surfaced in the cost lane's peak label.
  // Events with no ts fall back to their ordinal position (evTimeFrac already
  // does this). Step mode keeps the per-event ticks below.
  const binWidth = mbAutoBinWidth(activeDur);
  const histBins = [];
  const costBins = [];
  if (mode === 'time') {
    const nb = Math.max(1, Math.ceil(activeDur / binWidth));
    for (let j = 0; j < nb; j++) {
      histBins.push({ i: j, start: j * binWidth, end: Math.min(activeDur, (j + 1) * binWidth), cats: {}, total: 0, retries: 0, usd: 0 });
    }
    events.forEach((e, i) => {
      const pos = evTimeFrac(e, i) * activeDur;   // active-seconds position (idle-collapsed)
      let bi = Math.floor(pos / binWidth);
      if (bi < 0) bi = 0; if (bi >= nb) bi = nb - 1;
      const b = histBins[bi];
      const cat = MB_CAT_COLOR[e.category] ? e.category : 'other';
      b.cats[cat] = (b.cats[cat] || 0) + 1;
      b.total += 1;
      if (e.is_retry) b.retries += 1;
    });
    // Cost re-binned into the SAME bucket edges so the cost bars line up
    // vertically under the tool bursts ("this spike came from these tools").
    costSeries.forEach((p) => {
      const a = seriesActive(p);
      let bi = Math.floor(a / binWidth);
      if (bi < 0) bi = 0; if (bi >= nb) bi = nb - 1;
      histBins[bi].usd += (p.usd || 0);
    });
  }
  const histMax = histBins.reduce((m, b) => Math.max(m, b.total), 1);
  // Cost lane vertical scale: binned peak in time mode, per-point peak in step mode.
  const costMax = mode === 'time'
    ? Math.max(0.0001, ...histBins.map((b) => b.usd))
    : maxCost;

  // x-axis ticks (4 evenly across) + origin label in the gutter.
  const ticks = [0.25, 0.5, 0.75, 1].map((fr) => ({
    x: fr * 100,
    label: mode === 'time' ? mbFmtTime(activeDur * fr) : ('step ' + Math.max(1, Math.round(fr * n))),
  }));

  // Shared crosshair + exemplar tooltip: snap to the nearest event, drive the line
  // and tip imperatively (refs) so a mousemove doesn't re-render the whole board.
  const onMove = (ev) => {
    const board = boardRef.current; if (!board) return;
    const cross = crossRef.current, lab = crossLabelRef.current, tip = tipRef.current;
    const r = board.getBoundingClientRect();
    const x = ev.clientX - r.left;
    if (x < MB_GUTTER || !n) { if (cross) cross.style.display = 'none'; if (tip) tip.style.display = 'none'; return; }
    const pct = (x - MB_GUTTER) / (r.width - MB_GUTTER) * 100;
    let best = 0, bd = Infinity;
    events.forEach((e, i) => { const d = Math.abs(evX(e, i) - pct); if (d < bd) { bd = d; best = i; } });
    const e = events[best];
    const frac = mode === 'time' ? evTimeFrac(e, best) : evStepFrac(e, best);
    const off = evOffset(e);
    const labelTxt = mode === 'time'
      ? mbFmtTime(e.active_s != null ? e.active_s : (off != null ? off : frac * activeDur))
      : ('step ' + (best + 1));
    if (cross) { cross.style.display = 'block'; cross.style.left = x + 'px'; }
    if (lab) lab.textContent = labelTxt;
    // nearest context + cumulative cost at this point (exemplar fields)
    let ctxTok = null, cb = Infinity;
    ctxSeries.forEach((p) => { const d = Math.abs(seriesFrac(p) - frac); if (d < cb) { cb = d; ctxTok = p.tokens; } });
    let spent = 0;
    costSeries.forEach((p) => { if (seriesFrac(p) <= frac + 1e-9) spent += (p.usd || 0); });
    if (tip) {
      tip.style.display = 'block';
      tip.style.left = Math.min(r.width - 200, x + 10) + 'px';
      const tool = (MB_CAT_COLOR[e.category] ? e.category : 'other');
      tip.innerHTML =
        '<div class="mb-tip-hd">' + mbEsc(labelTxt) + (e.phase ? ' · ' + mbEsc(e.phase) : '') + '</div>' +
        '<div class="mb-tip-r"><span>tool</span><b>' + mbEsc(tool) + (e.label ? ' ' + mbEsc(shortPath(e.label)) : '') + '</b></div>' +
        (e.is_retry || e.category === 'error' ? '<div class="mb-tip-r"><span>flag</span><b>' + (e.category === 'error' ? 'error' : 'retry') + '</b></div>' : '') +
        (ctxTok != null ? '<div class="mb-tip-r"><span>context</span><b>' + mbEsc(fmtTokens(ctxTok)) + ' tok</b></div>' : '') +
        '<div class="mb-tip-r"><span>spent so far</span><b>' + mbEsc(fmtCost(spent)) + '</b></div>';
    }
  };
  const onLeave = () => {
    if (crossRef.current) crossRef.current.style.display = 'none';
    if (tipRef.current) tipRef.current.style.display = 'none';
  };

  // Histogram-bucket hover: show the bucket's time range + per-category counts in
  // the shared mb-tip (reusing the tooltip pattern). stopPropagation so the board's
  // onMove exemplar handler doesn't overwrite it while we're over a bucket.
  const onBucketMove = (ev, b) => {
    ev.stopPropagation();
    const board = boardRef.current; if (!board) return;
    const r = board.getBoundingClientRect();
    const x = ev.clientX - r.left;
    const cross = crossRef.current, lab = crossLabelRef.current, tip = tipRef.current;
    const range = mbFmtTime(b.start) + '–' + mbFmtTime(b.end);
    if (cross) { cross.style.display = 'block'; cross.style.left = x + 'px'; }
    if (lab) lab.textContent = range;
    if (tip) {
      tip.style.display = 'block';
      tip.style.left = Math.min(r.width - 200, x + 10) + 'px';
      const catRows = Object.keys(b.cats).sort((a, c) => b.cats[c] - b.cats[a])
        .map((c) => '<div class="mb-tip-r"><span>' + mbEsc(MB_CAT_LABEL[c] || c) + '</span><b>' + b.cats[c] + '</b></div>').join('');
      tip.innerHTML =
        '<div class="mb-tip-hd">' + mbEsc(range) + '</div>' +
        catRows +
        (b.retries ? '<div class="mb-tip-r"><span>retries</span><b>' + b.retries + '</b></div>' : '') +
        '<div class="mb-tip-r"><span>total</span><b>' + b.total + ' tool' + (b.total === 1 ? '' : 's') + '</b></div>' +
        (b.usd > 0 ? '<div class="mb-tip-r"><span>cost</span><b>' + mbEsc(fmtCost(b.usd)) + '</b></div>' : '');
    }
  };

  const territory = mbBuildTerritory(events);

  // Derived callouts — the board's job is to ANSWER "where did the time and
  // money go", not just plot it. Deterministic, computed on fixed auto-width
  // bins (independent of the UI bin selector) so the strip is stable across
  // mode/interval toggles; each chip's title says how it was derived.
  const insights = [];
  {
    const insW = mbAutoBinWidth(activeDur);
    const insBins = new Map();
    let totalUsd = 0;
    costSeries.forEach((p) => {
      const bi = Math.floor(seriesActive(p) / insW);
      insBins.set(bi, (insBins.get(bi) || 0) + (p.usd || 0));
      totalUsd += (p.usd || 0);
    });
    let topBin = null;
    insBins.forEach((usd, bi) => { if (!topBin || usd > topBin.usd) topBin = { bi, usd }; });
    if (topBin && totalUsd > 0 && topBin.usd > 0) {
      const pct = Math.round((topBin.usd / totalUsd) * 100);
      insights.push({ k: 'costliest ' + mbFmtBin(insW), v: fmtCost(topBin.usd) + ' (' + pct + '% of spend) @ ' + mbFmtTime(topBin.bi * insW), title: 'the single ' + mbFmtBin(insW) + ' stretch of active time that burned the most' });
    }
    const errCount = events.filter((e) => e.category === 'error').length;
    const retryCount = events.filter((e) => e.is_retry).length;
    if (errCount || retryCount) insights.push({ k: 'friction', v: errCount + ' error' + (errCount === 1 ? '' : 's') + ' · ' + retryCount + ' retr' + (retryCount === 1 ? 'y' : 'ies'), bad: errCount > 0, title: 'failed tool calls and retried steps across the run' });
    const costedSubs = (data.subagents || []).filter((s) => s.cost_usd != null);
    if (costedSubs.length) {
      const topSub = costedSubs.reduce((m, s) => (s.cost_usd > m.cost_usd ? s : m));
      insights.push({ k: 'top sub-agent', v: topSub.name + ' · ' + fmtCost(topSub.cost_usd), title: 'the delegation that cost the most (of ' + (data.subagents || []).length + ' sub-agents)' });
    }
    if (gaps.length && duration > activeDur) {
      const idlePct = Math.round(((duration - activeDur) / duration) * 100);
      insights.push({ k: 'idle', v: idlePct + '% of wall-clock', title: 'time collapsed off the axis as idle gaps (⋯ markers)' });
    }
    if (territory) {
      const editedCount = territory.dirs.reduce((s, d) => s + d.files.filter((f) => f.edited).length, 0);
      if (editedCount) insights.push({ k: 'edits landed in', v: editedCount + ' file' + (editedCount === 1 ? '' : 's'), title: 'distinct files edited — see "Where the work landed" below' });
    }
  }

  // Sub-agents lane: positioned bars on the shared axis (re-spaced by the
  // time⇄step toggle). Rendered only when the session spawned subagents.
  const subLayout = mbLayoutSubagents(data.subagents || [], mode, started, activeDur, n);
  const subLaneH = 10 + subLayout.rows * MB_SUB_ROW_H;

  // Idle-gap break markers: a faint dashed rule at each collapsed gap's active-axis
  // position (drawn for every gap), with a thinned "⋯ idle Nh/Nm" label (printed
  // only when ≥ MB_BREAK_LAB_GAP px past the last, clamped inside the board so it
  // never overflows). Time mode only — step mode has no wall-clock. gaps arrive in
  // ascending at_active_frac, so left→right thinning is monotonic.
  const breaks = [];
  if (mode === 'time' && plotW > 0) {
    let lastLabPx = -Infinity;
    gaps.forEach((g) => {
      const px = MB_GUTTER + clamp01(g.at_active_frac) * plotW;
      const showLab = px - lastLabPx >= MB_BREAK_LAB_GAP;
      if (showLab) lastLabPx = px;
      const labLeft = Math.max(MB_GUTTER + 1, Math.min(px + 3, MB_GUTTER + plotW - MB_BREAK_LAB_W));
      breaks.push({ px, labLeft, showLab, label: 'idle ' + mbFmtGap(g.duration_s) });
    });
  }

  return html`
    <div class="page-title" style="font-size:14px;margin-top:24px">Map</div>
    <div style="font-size:12px;color:var(--text-dim);margin:-14px 0 0;font-family:'Geist Mono',monospace">Where this run's time and money went — phases, tool activity, sub-agents, per-call context size and cost burn on one shared axis. Toggle time⇄step to re-space every lane; hover any point for details.</div>
    <div class="mb-head">
      <div class="mb-chips">
        <span class="mb-chip">${mbFmtTime(duration)}</span>
        <span class="mb-chip"><b>${fmtTokens(meta.total_tokens)}</b> tok</span>
        <span class="mb-chip"><b>${fmtCost(meta.total_cost_usd)}</b></span>
        ${meta.model ? html`<span class="mb-chip">${meta.model}</span>` : null}
        <span class="mb-chip">${n} tool${n === 1 ? '' : 's'}</span>
        ${data.from_snapshot ? html`<span class="mb-chip">from snapshot</span>` : null}
      </div>
      <div class="mb-head" style="margin:0;gap:8px">
        <div class="mb-toggle" title="step: evenly by tool-call order (the sequence) · time: by active time (when money burned)">
          <span class=${mode === 'step' ? 'on' : ''} onClick=${() => setMode('step')}>step</span>
          <span class=${mode === 'time' ? 'on' : ''} onClick=${() => setMode('time')}>time</span>
        </div>
      </div>
    </div>

    ${insights.length ? html`<div class="mb-insights">
      ${insights.map((it) => html`<span class="mb-ins${it.bad ? ' bad' : ''}" title=${it.title}><span class="mb-ins-k">${it.k}</span><b>${it.v}</b></span>`)}
    </div>` : null}

    <div class="mb-board" ref=${boardRef} onMouseMove=${onMove} onMouseLeave=${onLeave}>
      <div class="mb-lane phase"><div class="mb-gutter">phase</div><div class="mb-plot">
        ${(usePhaseSegs ? phaseSegs : phaseBands).map((b) => {
          const wpct = Math.max(0, b.right - b.left);
          // in split mode only the widest segment of each phase is labelable.
          const canLabel = usePhaseSegs ? b.labelSeg : true;
          const showLabel = canLabel && (wpct / 100) * plotW >= MB_PHASE_LABEL_MIN;
          return html`<div class="mb-seg" title=${b.name} style=${'left:' + b.left + '%;width:' + wpct + '%;background:' + b.tint + (b.last ? ';border-right:none' : '')}>${showLabel ? html`<span class="mb-seg-lab">${b.name}</span>` : null}</div>`;
        })}
      </div></div>

      <div class="mb-lane tools"><div class="mb-gutter">tools</div><div class="mb-plot">
        ${mode === 'time'
          ? histBins.map((b) => {
            if (b.total <= 0) return null; // 0 events → empty gap (honest "quiet" signal)
            const leftPct = (b.start / activeDur) * 100;
            const wPct = ((b.end - b.start) / activeDur) * 100;
            const barH = (b.total / histMax) * MB_HIST_MAX_PX;
            const segs = MB_STACK_ORDER.filter((c) => b.cats[c]).map((c) => {
              const segH = (b.cats[c] / histMax) * MB_HIST_MAX_PX;
              const col = c === 'error' ? 'var(--error)' : mbColor(c);
              return html`<div class="mb-hseg" style=${'height:' + segH.toFixed(2) + 'px;background:' + col}></div>`;
            });
            return html`<div class="mb-hbar ${b.retries ? 'retry' : ''}"
              onMouseMove=${(ev) => onBucketMove(ev, b)}
              style=${'left:' + leftPct.toFixed(3) + '%;width:calc(' + wPct.toFixed(3) + '% - 1px);height:' + barH.toFixed(2) + 'px'}>
              ${segs}
            </div>`;
          })
          : html`
            ${events.map((e, i) => {
              const x = evX(e, i);
              const col = e.category === 'error' ? 'var(--error)' : mbColor(e.category);
              const h = e.category === 'error' ? 13 : e.category === 'task' ? 12 : 10;
              return html`<div class="mb-ev ${e.is_retry ? 'retry' : ''}" style=${'left:' + x + '%;background:' + col + ';height:' + h + 'px;' + (e.category === 'task' ? 'width:5px;' : '')}></div>`;
            })}
            ${shownLabels.map(({ i, leftPct, txt }) => html`<div class="mb-evlab" title=${events[i].label} style=${'left:' + leftPct + '%'}>${txt}</div>`)}
          `}
      </div></div>

      ${(data.subagents || []).length ? html`
      <div class="mb-lane sub" style=${'height:' + subLaneH + 'px'}><div class="mb-gutter">sub-<br/>agents</div><div class="mb-plot">
        ${subLayout.items.map(({ sa, left, right, row, overlapped }) => {
          const w = Math.min(100, Math.max(MB_SUBBAR_MIN, right - left));
          const l = Math.max(0, Math.min(left, 100 - w)); // keep the bar inside the plot
          // One ellipsized run: "name · tokens · $cost". Omit null metrics entirely
          // (transcript-only subagents show just the name — no dangling "1…"/"—").
          // middle-truncate the name ("first8…last6") so both ends stay legible
          // instead of a tail-ellipsized "Gather tokenj…" stub; full name in hover.
          const metrics = [];
          if (sa.tokens != null) metrics.push(fmtTokens(sa.tokens));
          if (sa.cost_usd != null) metrics.push(fmtCost(sa.cost_usd));
          const fullLabel = [sa.name, ...metrics].join(' · ');
          const subLabel = [mbMidTrunc(sa.name), ...metrics].join(' · ');
          // Text never collides: a label prints only on a wide-enough,
          // non-overlapped bar; every bar keeps the full label as hover title.
          const showSubLab = !overlapped && plotW > 0 && (w / 100) * plotW >= MB_SUBLAB_MIN_PX;
          return html`<div class="mb-subbar" title=${fullLabel}
            style=${'left:' + l + '%;width:' + w + '%;top:' + (5 + row * MB_SUB_ROW_H) + 'px;'
              + 'background:' + mbTint('--chart-5', 16) + ';border:1px solid ' + mbTint('--chart-5', 50)}>
            ${showSubLab ? html`<span class="mb-sublab">${subLabel}</span>` : null}
          </div>`;
        })}
      </div></div>
      ` : null}

      <div class="mb-lane ctx"><div class="mb-gutter axis"><span class="mb-yv">${fmtTokens(maxCtx)}</span><span class="mb-yname">context</span><span class="mb-yv mb-y0">0</span></div><div class="mb-plot">
        <div class="mb-grid mid"></div>
        <svg viewBox="0 0 100 30" preserveAspectRatio="none">
          <defs><linearGradient id="mbCtxGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--brand)" stop-opacity="0.35"/>
            <stop offset="1" stop-color="var(--brand)" stop-opacity="0.02"/>
          </linearGradient></defs>
          ${ctxArea ? html`<path d=${ctxArea} fill="url(#mbCtxGrad)"/>` : null}
          ${ctxLine ? html`<path d=${ctxLine} fill="none" stroke="var(--brand)" stroke-width="0.7"/>` : null}
        </svg>
        <span class="mb-peak">peak ${fmtTokens(maxCtx)} tok</span>
      </div></div>

      <div class="mb-lane cost"><div class="mb-gutter axis"><span class="mb-yv">${fmtCost(costMax)}</span><span class="mb-yname">cost</span><span class="mb-yv mb-y0">$0</span></div><div class="mb-plot">
        <div class="mb-grid mid"></div>
        <svg viewBox="0 0 100 30" preserveAspectRatio="none">
          ${mode === 'time'
            ? histBins.map((b) => {
              if (!(b.usd > 0)) return null;
              const left = (b.start / activeDur) * 100;
              const w = ((b.end - b.start) / activeDur) * 100;
              const h = (b.usd / costMax) * 26;
              // Same bucket edges as the tools histogram → the bars line up vertically.
              return html`<rect x=${(left + 0.05).toFixed(2)} width=${Math.max(0.3, w - 0.1).toFixed(2)} y=${(30 - h).toFixed(2)} height=${h.toFixed(2)} fill="var(--chart-3)"/>`;
            })
            : costSeries.map((p) => {
              const x = seriesFrac(p) * 100;
              const h = ((p.usd || 0) / costMax) * 26;
              return html`<rect x=${(x - 1).toFixed(2)} width="2" y=${(30 - h).toFixed(2)} height=${h.toFixed(2)} fill="var(--chart-3)"/>`;
            })}
        </svg>
        <span class="mb-peak">peak ${fmtCost(costMax)}${mode === 'time' ? ' per ' + mbFmtBin(binWidth) : '/call'}</span>
      </div></div>

      <div class="mb-xaxis"><div class="mb-gutter mono">${mode === 'time' ? '0s' : 'step 1'}</div><div class="mb-ticks">
        ${ticks.map((t) => {
          // The final tick sits at x=100% — right-align it (no centering transform) so
          // it stays inside the lane instead of being clipped past the right edge.
          const pos = t.x >= 100 ? 'right:0;left:auto;transform:none' : (t.x <= 0 ? 'left:0;transform:none' : 'left:' + t.x + '%');
          return html`<div class="mb-tick" style=${pos}>${t.label}</div>`;
        })}
      </div></div>

      ${breaks.map((b) => html`<div class="mb-break" style=${'left:' + b.px.toFixed(1) + 'px'}></div>`)}
      ${breaks.map((b) => b.showLab ? html`<div class="mb-break-lab" title=${b.label} style=${'left:' + b.labLeft.toFixed(1) + 'px'}>⋯ ${b.label}</div>` : null)}

      <div class="mb-cross" ref=${crossRef}><div class="mb-crosslabel" ref=${crossLabelRef}></div></div>
      <div class="mb-tip" ref=${tipRef}></div>
    </div>

    <div class="mb-legend">
      <span><i style="background:var(--chart-1)"></i>Read</span>
      <span><i style="background:var(--chart-4)"></i>Grep/Glob</span>
      <span><i style="background:var(--chart-2)"></i>Edit/Write</span>
      <span><i style="background:var(--chart-3)"></i>Bash</span>
      <span><i style="background:var(--chart-5)"></i>Task</span>
      <span><i style="background:var(--chart-6)"></i>WebFetch</span>
      <span><i style="background:var(--text-dim)"></i>Other</span>
      <span><i style="background:var(--error)"></i>error</span>
      <span title="a dashed red outline on a bar or tick marks a retried step"><i style="background:transparent;border:1px dashed var(--error);box-sizing:border-box"></i>retry</span>
      <span title="phase-band tints alternate per phase to show boundaries; hover a band for its title"><i style=${'background:' + mbTint('--chart-1', 30)}></i>phase band</span>
      <span class="mb-hint">hover any lane for details · toggle re-spaces every lane</span>
    </div>

    ${territory ? html`
      <div class="mb-sec">
        <div class="mb-sec-h"><h3>Where the work landed</h3>
          <span class="mb-sec-cap">shade = touch intensity · ①=order · <span class="mb-edt">✎</span>=edited</span></div>
        <div class="mb-tree">
          <div class="mb-root">${territory.root}</div>
          <div class="mb-dirs">
            ${territory.dirs.map((d) => html`
              <div class="mb-dir" style=${'flex:' + Math.max(0.6, d.weight)}>
                <div class="mb-dh"><span class="mb-dh-nm" title=${d.full}>${d.label}</span> <span class="mb-meta">${d.totalTouches} touch${d.totalTouches === 1 ? '' : 'es'}</span></div>
                <div class="mb-files">
                  ${d.files.map((f) => {
                    const inten = territory.maxTouches > 0 ? f.touches / territory.maxTouches : 0;
                    const pct = (8 + inten * 30).toFixed(1);
                    const cvar = f.edited ? '--success' : '--brand';
                    const metaTxt = f.edits
                      ? (f.touches + '× · ' + f.edits + ' edit' + (f.edits === 1 ? '' : 's'))
                      : (f.reads + ' read' + (f.reads === 1 ? '' : 's'));
                    return html`<div class="mb-file" title=${f.path} style=${'background:' + mbTint(cvar, pct)}>
                      <span class="mb-ord">${f.rank}</span>
                      <span class="mb-nm">${f.base}</span>
                      ${f.edited ? html`<span class="mb-edt">✎</span>` : null}
                      <span class="mb-meta">${metaTxt}</span>
                    </div>`;
                  })}
                </div>
              </div>`)}
            ${territory.scratch ? html`
              <div class="mb-dir mb-scratch" title=${territory.scratch.title}>
                <div class="mb-dh"><span class="mb-dh-nm">temp / scratch</span> <span class="mb-meta">demoted</span></div>
                <div class="mb-meta">${territory.scratch.count} file${territory.scratch.count === 1 ? '' : 's'} · ${territory.scratch.reads} read${territory.scratch.reads === 1 ? '' : 's'}${territory.scratch.edits ? ' · ' + territory.scratch.edits + ' edit' + (territory.scratch.edits === 1 ? '' : 's') : ''} — hover for paths</div>
              </div>` : null}
          </div>
          <div class="mb-tcap">Cards are sized by edits over reads — edits (green, ✎) are where the work landed; reads sweep wide. Order badges show first-touch sequence; temp/scratch reads collapse into one muted card. Descriptive only — tj reports what happened, you judge the approach.</div>
        </div>
      </div>
    ` : null}
  `;
}
