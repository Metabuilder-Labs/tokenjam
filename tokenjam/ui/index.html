// Render a dollar value with the server-decided plan-tier framing (#110). The
// rule (which mode) is server-side; this only formats per that decision —
// mirrors core/framing.render_dollar.
function fmtFramedDollar(v, framing) {
  if (!framing) return fmtCost(v);
  const m = framing.pricing_mode;
  if (m === 'local') return '—';
  if (m === 'subscription') {
    return framing.plan_monthly_usd ? (100 * v / framing.plan_monthly_usd).toFixed(1) + '% of cycle' : '—';
  }
  return fmtCost(v); // api / unknown
}

// Trend chip: ▲ (up, red) / ▼ (down, green) with a percentage.
function TrendChip({ pct }) {
  if (pct == null) return null;
  const up = pct > 0;
  const arrow = pct === 0 ? '·' : up ? '▲' : '▼';
  const color = pct === 0 ? 'var(--text-dim)' : up ? 'var(--error)' : 'var(--success)';
  return html`<span class="trend-chip" style="color:${color}">${arrow} ${Math.abs(pct).toFixed(1)}% vs prev</span>`;
}

// Build a uPlot [xs, ys...] series from day-grouped cost rows. `mode` is
// total | model | agent; `useTokens` swaps cost for token volume (subscription
// / local framing where dollars are suppressed). Splits keep the top-5 keys
// plus an "other" bucket.
function _costVal(r, useTokens) {
  return useTokens ? ((r.input_tokens || 0) + (r.output_tokens || 0)) : (r.cost_usd || 0);
}

// Build a uPlot [xs, ys...] series from a /cost response. The x-axis spans the
// FULL selected window (zero-filled across empty buckets) so 7d/30d/90d look
// distinct and idle periods show as $0 (#133). `resp` carries epoch-second
// `series` buckets, `series_bucket` ('hour'|'day'), and `window_start/end`.
function buildCostSeries(resp, mode, useTokens) {
  const rows = (resp && resp.series) || [];
  const bucket = (resp && resp.series_bucket) || 'day';
  const step = bucket === 'hour' ? 3600 : 86400;
  let start = resp && resp.window_start;
  let end = resp && resp.window_end;
  if (start == null || end == null) {
    if (!rows.length) return null;
    const bs = rows.map(r => r.bucket);
    start = Math.min(...bs); end = Math.max(...bs);
  }
  // Align bounds to bucket boundaries and build the full grid.
  start = Math.floor(start / step) * step;
  end = Math.floor(end / step) * step;
  if (!(end >= start)) return null;
  const xs = [];
  for (let t = start; t <= end; t += step) xs.push(t);
  if (!xs.length || xs.length > 5000) return null;  // guard pathological ranges
  const idx = {}; xs.forEach((t, i) => { idx[t] = i; });
  const bucketOf = r => Math.floor(r.bucket / step) * step;
  if (mode === 'total') {
    const ys = xs.map(() => 0);
    rows.forEach(r => { const b = bucketOf(r); if (b in idx) ys[idx[b]] += _costVal(r, useTokens); });
    return { data: [xs, ys], labels: ['Total'], bucket };
  }
  const keyOf = mode === 'model' ? (r => r.model || '(none)') : (r => r.agent_id || '(none)');
  const totals = {};
  rows.forEach(r => { const k = keyOf(r); totals[k] = (totals[k] || 0) + _costVal(r, useTokens); });
  const top = Object.keys(totals).sort((a, b) => totals[b] - totals[a]).slice(0, 5);
  const topSet = new Set(top);
  const hasOther = Object.keys(totals).length > top.length;
  const labels = hasOther ? [...top, 'other'] : [...top];
  const yss = labels.map(() => xs.map(() => 0));
  rows.forEach(r => {
    const k = keyOf(r); const b = bucketOf(r);
    if (!(b in idx)) return;
    const li = topSet.has(k) ? labels.indexOf(k) : (hasOther ? labels.length - 1 : -1);
    if (li >= 0) yss[li][idx[b]] += _costVal(r, useTokens);
  });
  return { data: [xs, ...yss], labels, bucket };
}

function CostView({ params }) {
  const DEFAULTS = { since: '7d', group_by: 'total', agent_id: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const groupBy = readParam(params, 'group_by', DEFAULTS.group_by,
    v => ['total', 'model', 'agent'].includes(v));
  const agentId = readParam(params, 'agent_id', DEFAULTS.agent_id);
  const setFilter = (k, v) => navigate('cost', { since, group_by: groupBy, agent_id: agentId, [k]: v }, DEFAULTS);

  const [st, setSt] = useState({ loading: true, error: null, rows: [], total: 0,
    totalTokens: 0, framing: null, costResp: null, compare: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: s.rows.length === 0, error: null }));
    try {
      const tableGroup = groupBy === 'total' ? 'day' : groupBy;
      // One /cost call returns the grouped table `rows` + the daily `series`
      // (per date+agent+model) the chart needs + framing + totals (#113).
      const d = await api('/cost', { since, group_by: tableGroup, agent_id: agentId || undefined });
      let compare = null;
      try {
        compare = await api('/cost/compare', { since, compare: 'previous', agent_id: agentId || undefined });
      } catch (_) { compare = null; }
      const totalTokens = d.total_tokens != null
        ? d.total_tokens
        : (d.rows || []).reduce((s, r) => s + (r.input_tokens || 0) + (r.output_tokens || 0), 0);
      setSt({ loading: false, error: null, rows: d.rows || [], total: d.total_cost_usd || 0,
        totalTokens, framing: d.framing || null, costResp: d, compare });
    } catch (e) {
      setSt(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, [since, groupBy, agentId]);

  useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, [load]);

  const { loading, error, rows, total, totalTokens, framing, costResp, compare } = st;
  const useTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const series = buildCostSeries(costResp, groupBy, useTokens);
  const fmtY = useTokens ? fmtTokens : fmtCost;

  // Run-rate (total view only): per-day average over the FULL window length
  // (not the data range — #129), projected to the end of the calendar cycle
  // (#134), drawn as a dashed line. Single linear figure, no forecasting.
  const cyc = cycleRemaining();
  let runRate = null, projection = null;
  if (groupBy === 'total' && series && series.data[1] && series.data[1].length) {
    const windowTotal = useTokens ? totalTokens : total;
    runRate = runRateProjection(windowTotal, since, 1);  // per-day average (single windowDays source)
    const projected = runRate * cyc.days;
    projection = useTokens ? (fmtTokens(Math.round(projected)) + ' tokens') : fmtFramedDollar(projected, framing);
  }

  const trendPct = compare ? (useTokens ? compare.tokens_delta_pct : compare.cost_delta_pct) : null;
  const totalDisplay = useTokens ? (fmtTokens(totalTokens) + ' tokens') : fmtFramedDollar(total, framing);
  const tableMode = groupBy === 'total' ? 'day' : groupBy;
  const totalIn = rows.reduce((s, r) => s + (r.input_tokens || 0), 0);
  const totalOut = rows.reduce((s, r) => s + (r.output_tokens || 0), 0);

  return html`
    <div class="page-title">Cost</div>
    <div class="filters">
      <select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="24h">Last 24h</option>
        <option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="90d">Last 90d</option>
      </select>
      <select value=${groupBy} onChange=${e => setFilter('group_by', e.target.value)}>
        <option value="total">Total</option>
        <option value="model">By model</option>
        <option value="agent">By agent</option>
      </select>
      ${agentId ? html`<button class="btn" onClick=${() => setFilter('agent_id', '')}>agent: ${agentId} ✕</button>` : null}
      <button class="btn" onClick=${load}>Refresh</button>
    </div>

    ${error ? html`
      <div class="chart-card" style="border-color:var(--error)">
        <div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load cost data: ${error}</div>
        <button class="btn" onClick=${load}>Retry</button>
      </div>` : null}

    ${!error && framing && framing.qualifier_text ? html`
      <div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${!error ? html`
      <div class="chart-card">
        <div class="chart-head">
          <div class="chart-title">Spend over time ${useTokens ? '(tokens)' : ''}</div>
          <div class="chart-meta">
            <span class="chart-total">${totalDisplay}</span>
            <${TrendChip} pct=${trendPct} />
          </div>
        </div>
        ${loading ? html`<div class="shimmer" style="height:160px"></div>`
          : series ? html`
            <${SpendChart} data=${series.data} labels=${series.labels} height=${160}
              fmtY=${fmtY} axisFmtY=${useTokens ? fmtTokens : fmtAxisUsd} runRate=${runRate}
              showLegend=${groupBy !== 'total'} bucket=${series.bucket} />
            ${projection ? html`<div class="chart-foot">At this pace, ~${projection} by end of ${cyc.label} <span class="dim">(linear run-rate, not a forecast)</span></div>` : null}
          ` : html`<div class="empty" style="padding:32px 0">No spend in this window.</div>`}
      </div>
    ` : null}

    ${!error && !loading && rows.length > 0 ? html`
      <div class="table-wrap"><table>
        <thead><tr>
          <th>${tableMode === 'day' ? 'Date' : tableMode === 'agent' ? 'Agent' : 'Model'}</th>
          ${tableMode !== 'agent' ? html`<th>Agent</th>` : null}
          ${tableMode !== 'model' ? html`<th>Model</th>` : null}
          <th>Input</th><th>Output</th><th>Cache R <span class="info-btn">i<span class="info-tip">Cache-read tokens (billed at the discounted cache-read rate).</span></span></th><th>Cache W <span class="info-btn">i<span class="info-tip">Cache-write (creation) tokens — often the dominant cost driver on cache-heavy workloads.</span></span></th><th>Cost <span class="info-btn">i<span class="info-tip">Estimated from token usage. If you're on a subscription plan (e.g. Claude Max), your actual spend may differ.</span></span></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => html`
            <tr>
              <td class="mono">${r.group || '-'}</td>
              ${tableMode !== 'agent' ? html`<td class="mono">${r.agent_id || '-'}</td>` : null}
              ${tableMode !== 'model' ? html`<td class="mono">${r.model || '-'}</td>` : null}
              <td>${fmtTokens(r.input_tokens)}</td>
              <td>${fmtTokens(r.output_tokens)}</td>
              <td>${fmtTokens(r.cache_tokens || 0)}</td>
              <td>${fmtTokens(r.cache_write_tokens || 0)}</td>
              <td>${fmtCost(r.cost_usd)}</td>
            </tr>
          `)}
          <tr style="font-weight:600;border-top:2px solid var(--border)">
            <td colspan=${1 + (tableMode !== 'agent' ? 1 : 0) + (tableMode !== 'model' ? 1 : 0)}></td>
            <td>${fmtTokens(totalIn)}</td>
            <td>${fmtTokens(totalOut)}</td>
            <td>${fmtTokens(rows.reduce((s, r) => s + (r.cache_tokens || 0), 0))}</td>
            <td>${fmtTokens(rows.reduce((s, r) => s + (r.cache_write_tokens || 0), 0))}</td>
            <td>${fmtCost(total)}</td>
          </tr>
        </tbody>
      </table></div>
    ` : null}
  `;
}

// Drift View
// ============================
function DriftView({ params }) {
  const agentId = readParam(params, 'agent_id', '');
  const [data, setData] = useState(null);

  useEffect(() => {
    const fetchDrift = () => api('/drift', { agent_id: agentId || undefined }).then(d => setData(d));
    fetchDrift();
    const t = setInterval(fetchDrift, 10000);
    return () => clearInterval(t);
  }, [agentId]);

  if (!data) return html`<div class="empty">Loading...</div>`;

  // /drift returns a single-agent shape when agent_id is set; normalize to a list.
  const agents = data.agents || (data.agent_id ? [data] : []);
  if (!agents.length) return html`<div class="empty">No baselines built yet. Run at least 10 sessions to establish a behavioral baseline.</div>`;

  const metrics = [
    ['Input tokens', 'avg_input_tokens', 'stddev_input_tokens', 'input_tokens'],
    ['Output tokens', 'avg_output_tokens', 'stddev_output_tokens', 'output_tokens'],
    ['Session duration', 'avg_session_duration_s', 'stddev_session_duration', 'duration_seconds'],
    ['Tool calls', 'avg_tool_call_count', 'stddev_tool_call_count', 'tool_call_count'],
  ];

  return html`
    <div class="page-title">Drift Detection</div>
    ${agents.map(a => html`
      <div class="drift-section">
        <h3>${a.agent_id}</h3>
        ${!a.baseline ? html`<div style="color:var(--text-dim);font-size:13px">No baseline yet.</div>` : html`
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;font-family:'Geist Mono',monospace">
            Baseline: ${a.baseline.sessions_sampled} sessions sampled${a.baseline.computed_at ? ', computed ' + fmtAgo(a.baseline.computed_at) : ''}
          </div>
          <table>
            <thead><tr><th>Metric</th><th>Baseline</th><th>Latest</th><th>Z-score (threshold: 2.0\u03C3)</th><th></th></tr></thead>
            <tbody>
              ${metrics.map(([label, avgKey, stdKey, latestKey]) => {
                const avg = a.baseline[avgKey];
                const std = a.baseline[stdKey];
                const latest = a.latest_session ? a.latest_session[latestKey] : null;
                let z = null;
                let zDisplay = '-';
                if (avg != null && latest != null) {
                  if (std != null && std > 0) {
                    z = (latest - avg) / std;
                    zDisplay = z.toFixed(2);
                  } else if (std === 0 || std == null) {
                    // Match drift.py z_score: inf when stddev=0 and value != mean
                    if (latest !== avg) {
                      z = Infinity;
                      zDisplay = 'inf';
                    } else {
                      z = 0;
                      zDisplay = '0.00';
                    }
                  }
                }
                const pass = z == null || (Number.isFinite(z) && Math.abs(z) < 2);
                return html`
                  <tr>
                    <td>${label}</td>
                    <td class="mono">${avg != null ? avg.toFixed(1) : '-'}${std != null ? ' +/- ' + std.toFixed(1) : ''}</td>
                    <td class="mono">${latest != null ? (typeof latest === 'number' ? latest.toFixed(1) : latest) : '-'}</td>
                    <td class="mono" style="color:${pass ? 'var(--success)' : 'var(--error)'}">${zDisplay}</td>
                    <td><span class="badge ${pass ? 'badge-ok' : 'badge-critical'}">${pass ? 'pass' : 'drift'}</span></td>
                  </tr>
                `;
              })}
            </tbody>
          </table>
        `}
      </div>
    `)}
  `;
}

function BudgetRow({ scope, label, daily, session, effectiveDaily, effectiveSession, onSave }) {
  const [dailyVal, setDailyVal] = useState(daily != null ? String(daily) : '');
  const [sessionVal, setSessionVal] = useState(session != null ? String(session) : '');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const save = async () => {
    setSaving(true);
    try {
      await onSave(scope, dailyVal, sessionVal);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch (e) {
      alert('Save failed: ' + e.message);
    } finally {
      setSaving(false);
    }
  };

  const dailyPlaceholder = (effectiveDaily != null && daily == null)
    ? `default: $${effectiveDaily}` : 'no limit';
  const sessionPlaceholder = (effectiveSession != null && session == null)
    ? `default: $${effectiveSession}` : 'no limit';

  return html`
    <tr>
      <td class="mono">${label}</td>
      <td>
        <input type="number" min="0" step="0.01" placeholder=${dailyPlaceholder}
          value=${dailyVal} onInput=${e => setDailyVal(e.target.value)}
          style="width:120px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--text);font-size:13px" />
      </td>
      <td>
        <input type="number" min="0" step="0.01" placeholder=${sessionPlaceholder}
          value=${sessionVal} onInput=${e => setSessionVal(e.target.value)}
          style="width:120px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--text);font-size:13px" />
      </td>
      <td>
        <button class="btn" onClick=${save} disabled=${saving}
          style="padding:4px 12px;font-size:12px">
          ${saving ? 'Saving...' : saved ? '\u2713 Saved' : 'Save'}
        </button>
      </td>
    </tr>
  `;
}

        ${agentEntries.length === 0 ? html`

            Budget alerts (last 24h)
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>Time</th><th>Severity</th><th>Type</th><th>Agent</th><th>Detail</th></tr></thead>
            <tbody>
              ${alerts.map(a => html`
                <tr>
                  <td>${fmtAgo(a.fired_at)}</td>
                  <td><span class="badge badge-${a.severity}">${a.severity}</span></td>

// ============================
// Overview + Optimize (issue #114)
// ============================
// Per-analyzer display metadata for the recoverable band + Optimize sections.
// cache-recommend / budget-projection are intentionally absent from the savings
// band (no estimated_recoverable_usd); they surface elsewhere.
const ANALYZER_META = {
  downsize: { title: 'Downsize', hint: 'Route candidate sessions to a cheaper model' },
  cache:    { title: 'Cache',    hint: 'Raise cache-read efficacy toward the 80% ceiling' },
  script:   { title: 'Script',   hint: 'Replace a deterministic call-pattern with a script' },
  trim:     { title: 'Trim',     hint: 'Trim low-significance tokens from prompt templates' },
  'cache-recommend': { title: 'Cache recommend', hint: 'Add cache_control breakpoints (Anthropic)' },
  'budget-projection': { title: 'Budget projection', hint: 'Projected cycle spend vs ceiling' },
};

// Mirror core/framing.render_savings: api/unknown → dollars; subscription →
// token-share of the cycle; local → token count. The mode is server-decided.
function fmtFramedSavings(usd, tokens, framing) {
  const mode = framing ? framing.pricing_mode : 'api';
  if (mode === 'subscription') {
    if (tokens == null) return '—';
    if (framing.window_total_tokens > 0) return (100 * tokens / framing.window_total_tokens).toFixed(1) + '% of cycle tokens';
    return fmtTokens(tokens) + ' tokens';
  }
  if (mode === 'local') return tokens == null ? '—' : fmtTokens(tokens) + ' tokens';
  return usd == null ? '—' : fmtCost(usd);
}

// Count agents whose latest session breaches the 2σ drift threshold on any
// tracked metric (mirrors the Drift screen's z-score logic).
function driftSignalCount(drift) {
  const agents = (drift && drift.agents) || (drift && drift.agent_id ? [drift] : []);
  const metrics = [
    ['avg_input_tokens', 'stddev_input_tokens', 'input_tokens'],
    ['avg_output_tokens', 'stddev_output_tokens', 'output_tokens'],
    ['avg_session_duration_s', 'stddev_session_duration', 'duration_seconds'],
    ['avg_tool_call_count', 'stddev_tool_call_count', 'tool_call_count'],
  ];
  let n = 0;
  for (const a of agents) {
    if (!a.baseline || !a.latest_session) continue;
    let breach = false;
    for (const [avgK, stdK, latK] of metrics) {
      const avg = a.baseline[avgK], std = a.baseline[stdK], latest = a.latest_session[latK];
      if (avg == null || latest == null) continue;
      if (std != null && std > 0) { if (Math.abs((latest - avg) / std) >= 2) breach = true; }
      else if (latest !== avg) breach = true;
    }
    if (breach) n++;
  }
  return n;
}

// Flatten the optimize report into recoverable-band tiles. Ready tiles carry a
// number; not-ready ones (capture off, missing dep, or skipped under fast=true)
// render muted with an enablement hint.
// Cache efficacy ceiling — fallback if the response doesn't carry
// `efficacy_ceiling`; mirrors core/optimize cache_efficacy.EFFICACY_CEILING.
const CACHE_EFFICACY_CEILING = 0.80;

// Classify a finding into one of four honest tile states (issue #127):
//   actionable  — ran, found recoverable waste (carries a number)
//   at_ceiling  — ran, already optimized (no waste because at the ceiling)
//   no_findings — ran, nothing actionable in this window
//   not_ready   — couldn't run (capture off / missing dep / skipped on fast)
// Reads richer discriminators from the finding rather than `usd in (None,0)`.
function classifyFinding(name, fd, skipped) {
  if (skipped.has(name)) return { state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' };
  if (fd && fd.enabled === false) {
    return { state: 'not_ready', hint: fd.hint || (ANALYZER_META[name] || {}).hint };
  }
  const usd = fd ? fd.estimated_recoverable_usd : null;
  const tokens = fd ? fd.estimated_recoverable_tokens : null;
  if (usd != null && usd > 0) {
    return { state: 'actionable', usd, tokens, basis: fd.estimate_basis || '' };
  }
  // Ran, nothing to recover. For cache, distinguish "already at the ceiling"
  // (positive) from "nothing here" so we never tell a user to raise efficacy
  // they've already maxed out. A fully-cached model can have tiny *uncached*
  // input (most volume is cache reads), so DON'T gate at_ceiling on input
  // volume — gate on "all rows with usage are at/above the ceiling" (#135).
  if (name === 'cache' && fd) {
    const ceiling = fd.efficacy_ceiling != null ? fd.efficacy_ceiling : CACHE_EFFICACY_CEILING;
    const used = (fd.rows || []).filter(r => (r.input_tokens + r.cache_tokens) > 0);
    if (used.length && used.every(r => r.efficacy >= ceiling)) {
      const best = used.slice().sort((a, b) =>
        (b.input_tokens + b.cache_tokens) - (a.input_tokens + a.cache_tokens))[0];
      return { state: 'at_ceiling', metric: Math.round(best.efficacy * 100) + '% cache efficacy' };
    }
  }
  return { state: 'no_findings' };
}

// Flatten the optimize report into recoverable-band tiles, each carrying a
// state (see classifyFinding). Registry-driven: downsize is a typed slot; any
// wave-2 finding carrying the `estimated_recoverable_usd` contract field becomes
// a tile (so a future `reuse` analyzer appears with no UI change).
// cache-recommend / budget-projection lack the field → excluded by contract.
function recoverableTiles(opt) {
  if (!opt) return [];
  const out = [];
  const skipped = new Set(opt.skipped_analyzers || []);
  const f = opt.findings || {};
  // Downsize always gets a tile — it runs unconditionally; a null typed slot
  // means "ran, no candidates", not "missing" (issue #126).
  out.push({ name: 'downsize', ...classifyFinding('downsize', opt.downgrade, skipped) });
  Object.keys(f).forEach(k => {
    if (f[k] && 'estimated_recoverable_usd' in f[k]) out.push({ name: k, ...classifyFinding(k, f[k], skipped) });
  });
  skipped.forEach(k => {
    if (!(k in f) && k !== 'downsize') {
      out.push({ name: k, state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' });
    }
  });
  return out;
}

function HealthTile({ label, value, attention, href, sub }) {
  return html`<a class="health-tile ${attention ? 'attn' : ''}" href=${href}>
    <div class="health-value">${value}</div>

  </a>`;
}

function OverviewView({ params }) {
  const DEFAULTS = { since: '7d' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const setWin = v => navigate('overview', { since: v }, DEFAULTS);
  const [d, setD] = useState({ loading: true, empty: false, error: null });

  const load = useCallback(async () => {
    try {
      const status = await api('/status');
      if (!status.agents || status.agents.length === 0) {
        setD({ loading: false, empty: true, error: null });
        return;
      }
      // Fetch sequentially, not in parallel: the daemon's single DuckDB
      // connection isn't safe for concurrent access across the sync routes'
      // threadpool, and a 6-at-once burst can 500. Six local reads in series
      // are still well under a frame on a 30s-poll surface.
      const cost = await api('/cost', { since, group_by: 'day' });
      const compare = await api('/cost/compare', { since, compare: 'previous' }).catch(() => null);
      const opt = await api('/optimize', { since, fast: 'true' }).catch(() => null);
      const al = await api('/alerts', { since, unread: 'true' }).catch(() => ({ alerts: [] }));
      const drift = await api('/drift').catch(() => ({ agents: [] }));
      const traces = await api('/traces', { since, limit: 6 }).catch(() => ({ traces: [] }));
      setD({ loading: false, empty: false, error: null, cost, compare, opt,
        alerts: al.alerts || [], drift, traces: traces.traces || [] });
    } catch (e) {
      setD(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, [since]);

  // Auto-refresh every 30s only while the tab is visible (#114).
  useEffect(() => {
    load();
    const timer = setInterval(() => { if (document.visibilityState === 'visible') load(); }, 30000);
    const onVis = () => { if (document.visibilityState === 'visible') load(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { clearInterval(timer); document.removeEventListener('visibilitychange', onVis); };
  }, [load]);

  const winPicker = html`
    <select value=${since} onChange=${e => setWin(e.target.value)}>
      <option value="24h">Last 24h</option>
      <option value="7d">Last 7d</option>
      <option value="30d">Last 30d</option>
      <option value="90d">Last 90d</option>
    </select>`;

  if (d.loading) return html`<div class="page-title">Overview</div><div class="shimmer" style="height:220px"></div>`;

  if (d.empty) return html`
    <div class="page-title">Overview</div>
    <div class="card" style="max-width:560px">
      <div class="card-header">No data yet — TokenJam is listening.</div>
      <p style="color:var(--text-dim);font-size:13px;line-height:1.6;margin:8px 0 16px">
        Once an agent runs, this is where your spend, recoverable waste, and health show up.
      </p>
      <div style="font-size:13px;margin-bottom:10px">
        <strong>Wire up Claude Code</strong><br/>
        <code>tj onboard --claude-code</code> &nbsp;
        <a href="https://github.com/Metabuilder-Labs/tokenjam#readme" style="color:var(--brand)">docs ↗</a>
      </div>
      <div style="font-size:13px">
        <strong>Or try a demo</strong> <span style="color:var(--text-dim)">(no API keys)</span>
        <div style="margin-top:6px;color:var(--text-dim);line-height:1.8">
          <code>tj demo retry-loop</code> — an agent stuck calling the same tool<br/>
          <code>tj demo surprise-cost</code> — a quiet run that rang up real spend<br/>
          <code>tj demo hallucination-drift</code> — output drifting from baseline
        </div>
      </div>
    </div>`;

  if (d.error) return html`
    <div class="page-title">Overview</div>
    <div class="chart-card" style="border-color:var(--error)">
      <div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load overview: ${d.error}</div>
      <button class="btn" onClick=${load}>Retry</button>
    </div>`;

  const cost = d.cost || {};
  const framing = cost.framing || null;
  const useTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const series = buildCostSeries(cost, 'total', useTokens);
  const totalDisplay = useTokens ? (fmtTokens(cost.total_tokens || 0) + ' tokens') : fmtFramedDollar(cost.total_cost_usd || 0, framing);
  const trendPct = d.compare ? (useTokens ? d.compare.tokens_delta_pct : d.compare.cost_delta_pct) : null;
  const cyc = cycleRemaining();
  let runRate = null, projection = null;
  if (series && series.data[1] && series.data[1].length) {
    const windowTotal = useTokens ? (cost.total_tokens || 0) : (cost.total_cost_usd || 0);
    runRate = runRateProjection(windowTotal, since, 1);  // per-day average over window length (#129)
    const projected = runRate * cyc.days;  // cycle-relative projection (#134)
    projection = useTokens ? (fmtTokens(Math.round(projected)) + ' tokens') : fmtFramedDollar(projected, framing);
  }

  const tiles = recoverableTiles(d.opt);
  const budgets = (d.opt && d.opt.budgets) || [];
  const budgetAttn = budgets.filter(b => b.over_budget || (b.budget_usd > 0 && b.projected_cycle_total / b.budget_usd > 0.8)).length;
  const driftN = driftSignalCount(d.drift);
  const errTraces = d.traces.filter(t => t.status_code === 'error').length;

  return html`
    <div class="ov-head">
      <div class="page-title" style="margin:0">Overview</div>
      <div class="filters" style="margin:0">${winPicker}</div>
    </div>
    ${framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}

    <!-- Band 1: Cost hero. The chart is NOT a click-target (it owns hover for
         the tooltip, #128); drill-through is an explicit link in the header. -->
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-title">Spend ${useTokens ? '(tokens) ' : ''}· last ${since}</div>
        <div class="chart-meta">
          <span class="chart-total">${totalDisplay}</span>
          <${TrendChip} pct=${trendPct} />
          <a class="drill-link" href=${'#/cost?since=' + since}>View Cost details →</a>
        </div>
      </div>
      ${series ? html`<${SpendChart} data=${series.data} labels=${series.labels} height=${130} fmtY=${useTokens ? fmtTokens : fmtCost} axisFmtY=${useTokens ? fmtTokens : fmtAxisUsd} runRate=${runRate} bucket=${series.bucket} />`
        : html`<div class="empty" style="padding:24px 0">No spend in this window.</div>`}
      ${projection ? html`<div class="chart-foot">At this pace, ~${projection} by end of ${cyc.label} <span class="dim">(linear run-rate, not a forecast)</span></div>` : null}
    </div>

    <!-- Band 2: Recoverable waste -->
    <div class="band-label">Recoverable waste <span class="estimated-tag" title="Heuristic estimates — review before acting">estimated</span> <span class="band-window">· over the last ${since}</span></div>
    <div class="tile-grid">
      ${tiles.length === 0 ? html`<div class="empty">No recoverable candidates in this window.</div>`
        : tiles.map(t => {
          const meta = ANALYZER_META[t.name] || { title: t.name, hint: '' };
          const href = '#/optimize?finding=' + t.name + '&since=' + since;
          // Four honest states (#127): actionable / at_ceiling / no_findings / not_ready.
          if (t.state === 'actionable') return html`
            <a class="rec-tile" href=${href}>
              <div class="rec-name">${meta.title} <span class="estimated-tag" title=${t.basis}>estimated</span></div>
              <div class="rec-amount">${fmtFramedSavings(t.usd, t.tokens, framing)}</div>
              <div class="rec-hint">${meta.hint}</div>
            </a>`;
          if (t.state === 'at_ceiling') return html`
            <a class="rec-tile ok" href=${href}>
              <div class="rec-name">${meta.title}</div>
              <div class="rec-amount ok">✓ ${t.metric}</div>
              <div class="rec-hint">Already optimized — nothing to recover.</div>
            </a>`;
          if (t.state === 'no_findings') return html`
            <a class="rec-tile muted" href=${href}>
              <div class="rec-name">${meta.title}</div>
              <div class="rec-amount dim">No candidates</div>
              <div class="rec-hint">Nothing actionable in the last ${since}.</div>
            </a>`;
          // not_ready — the only state that uses the "not ready" framing + hint.
          return html`
            <div class="rec-tile muted">
              <div class="rec-name">${meta.title}</div>
              <div class="rec-amount dim">— not ready</div>
              <div class="rec-hint">${t.hint || meta.hint}</div>
            </div>`;
        })}
    </div>

    <!-- Band 3: Health -->
    <div class="band-label">Health at a glance</div>
    <div class="tile-grid">
      <${HealthTile} label="Unread alerts" value=${d.alerts.length} attention=${d.alerts.length > 0}
        href="#/alerts?unread=true" sub=${d.alerts.length ? d.alerts[0].severity : 'all clear'} />
      <${HealthTile} label="Agents drifting" value=${driftN} attention=${driftN > 0} href="#/drift"
        sub=${driftN ? 'review baselines' : 'within baseline'} />
      <${HealthTile} label="Budgets at risk" value=${budgetAttn} attention=${budgetAttn > 0} href="#/budget"
        sub=${budgets.length ? (budgetAttn ? 'over / near ceiling' : 'within ceiling') : 'none configured'} />
      <${HealthTile} label="Recent activity" value=${d.traces.length} attention=${errTraces > 0} href="#/traces"
        sub=${errTraces ? (errTraces + ' with errors') : 'last sessions'} />
    </div>
  `;
}

// ---- Optimize detail screen ----
function OptimizeFinding({ name, opt, framing }) {
  const meta = ANALYZER_META[name] || { title: name };
  let body = null;
  if (name === 'downsize') {
    const dg = opt.downgrade;
    // Always render the section — a null typed slot means the analyzer ran and
    // found no candidates, not that it's missing (issue #126).
    if (!dg) {
      return html`<section class="opt-section" id="opt-downsize">
        <div class="opt-title">Downsize</div>
        <div class="opt-line dim">No downsize candidates in this window — sessions don't match the smaller-model shape (small input/output, few tool calls).</div>
      </section>`;
    }
    body = html`
      <div class="opt-line">${dg.percent_of_sessions}% of sessions match a smaller-model candidate shape (${dg.candidate_sessions} of ${dg.total_sessions}).</div>
      ${dg.suggestions && Object.keys(dg.suggestions).length ? html`<div class="opt-line dim">Pattern: ${Object.entries(dg.suggestions).map(([k, v]) => k + ' → ' + v).join(', ')}</div>` : null}
      ${(dg.examples || []).length ? html`<div class="opt-sub">Examples</div>
        <table class="opt-table"><tbody>${dg.examples.map(ex => html`<tr><td class="mono">${(ex.trace_id || '').slice(0, 8)}…</td><td>${ex.tool_calls} tools</td><td class="mono">${ex.model}</td></tr>`)}</tbody></table>` : null}
      ${dg.caveat ? html`<div class="opt-caveat">! ${dg.caveat}</div>` : null}`;
  } else {
    const fd = (opt.findings || {})[name];
    if (!fd) return null;
    if (name === 'cache') {
      body = html`
        ${(fd.flagged || []).length ? html`<div class="opt-line">${fd.flagged.length} (provider, model) row(s) below the efficacy threshold.</div>` : null}
        <table class="opt-table"><thead><tr><th>Provider/Model</th><th>Efficacy</th><th>Input</th><th>Cache</th></tr></thead>
          <tbody>${(fd.rows || []).map(r => html`<tr class=${r.flagged ? 'flagged' : ''}><td class="mono">${r.provider}/${r.model}</td><td>${(r.efficacy * 100).toFixed(0)}%</td><td>${fmtTokens(r.input_tokens)}</td><td>${fmtTokens(r.cache_tokens)}</td></tr>`)}</tbody></table>`;
    } else if (name === 'cache-recommend') {
      body = !fd.enabled ? html`<div class="opt-line dim">${fd.hint || 'Disabled. Set [capture] prompts = true to run this analyzer.'}</div>`
        : (fd.candidates || []).length ? html`<div class="opt-line">${fd.candidates.length} prefix candidate(s) for cache_control:</div>
          <table class="opt-table"><tbody>${fd.candidates.map(c => html`<tr><td class="mono">${(c.prefix_hash || '').slice(0, 8)}…</td><td>${c.occurrences}× shared</td><td>~${fmtTokens(c.estimated_cacheable_tokens)} cacheable</td></tr>`)}</tbody></table>`
        : html`<div class="opt-line dim">No stable prefixes shared across ≥3 Anthropic calls.</div>`;
    } else if (name === 'script') {
      body = (fd.clusters || []).length ? html`
        <div class="opt-line">${fd.clusters.length} deterministic-pattern cluster(s).</div>
        <table class="opt-table"><thead><tr><th>Instances</th><th>Signature</th><th>Avg cost</th></tr></thead>
          <tbody>${fd.clusters.map(c => html`<tr><td>${c.instances}×</td><td class="mono">${(c.signature || []).map(s => s.tool).join(' → ').slice(0, 60)}</td><td>${fmtCost(c.avg_cost_usd)}</td></tr>`)}</tbody></table>
        ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`
        : html`<div class="opt-line dim">No clusters above threshold (≥20 identical signatures).</div>`;
    } else if (name === 'trim') {
      body = !fd.enabled ? html`<div class="opt-line dim">${fd.hint || 'Disabled — needs [capture] prompts = true and tokenjam[bloat].'}</div>`
        : (fd.per_prompt || []).length ? html`
          <div class="opt-line">${fd.prompts_scored} prompt(s) scored; ${fd.total_bloat_chars} of ${fd.total_chars} chars flagged.</div>
          <table class="opt-table"><thead><tr><th>Agent</th><th>Bloat</th><th>~Tokens</th></tr></thead>
            <tbody>${fd.per_prompt.slice(0, 5).map(p => html`<tr><td class="mono">${p.agent_id}</td><td>${p.bloat_chars}/${p.prompt_chars}</td><td>~${p.estimated_token_reduction}</td></tr>`)}</tbody></table>`
        : html`<div class="opt-line dim">No bloat regions above threshold.</div>`;
    }
  }
  // Recoverable estimate line (when present)
  const fd = name === 'downsize' ? opt.downgrade : (opt.findings || {})[name];
  const recUsd = fd ? fd.estimated_recoverable_usd : null;
  const recTok = fd ? fd.estimated_recoverable_tokens : null;
  const rec = (recUsd != null || recTok != null) ? fmtFramedSavings(recUsd, recTok, framing) : null;

  return html`<section class="opt-section" id=${'opt-' + name}>
    <div class="opt-title">${meta.title}
      ${rec ? html`<span class="opt-rec">${rec} <span class="estimated-tag" title=${fd && fd.estimate_basis}>estimated recoverable</span></span>` : null}
    </div>
    ${body}
  </section>`;
}

function OptimizeView({ params }) {
  const DEFAULTS = { since: '30d', agent_id: '', compare: '', finding: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const agentId = readParam(params, 'agent_id', DEFAULTS.agent_id);
  const compare = readParam(params, 'compare', DEFAULTS.compare, v => ['previous', 'last-week', 'last-month', 'last-7d', 'last-30d'].includes(v));
  const focus = readParam(params, 'finding', DEFAULTS.finding);
  const setFilter = (k, v) => navigate('optimize', { since, agent_id: agentId, compare, finding: focus, [k]: v }, DEFAULTS);

  const [st, setSt] = useState({ loading: true, error: null, opt: null, cmp: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: !s.opt, error: null }));
    try {
      const opt = await api('/optimize', { since, agent_id: agentId || undefined });
      let cmp = null;
      if (compare) cmp = await api('/cost/compare', { since, compare, agent_id: agentId || undefined }).catch(() => null);
      setSt({ loading: false, error: null, opt, cmp });
    } catch (e) { setSt(s => ({ ...s, loading: false, error: e.message || String(e) })); }
  }, [since, agentId, compare]);

  useEffect(() => { load(); }, [load]);

  // Scroll the focused finding into view + highlight it (deep-link from Overview).
  useEffect(() => {
    if (!focus || st.loading) return;
    const el = document.getElementById('opt-' + focus);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); el.classList.add('opt-focus'); }
  }, [focus, st.loading, st.opt]);

  const framing = st.opt ? st.opt.framing : null;
  const order = ['downsize', 'cache', 'cache-recommend', 'script', 'trim'];

  return html`
    <div class="page-title">Optimize</div>
    <div class="filters">
      <select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="90d">Last 90d</option>
      </select>
      <select value=${compare} onChange=${e => setFilter('compare', e.target.value)}>
        <option value="">No comparison</option>
        <option value="previous">vs previous</option>
        <option value="last-week">vs last week</option>
        <option value="last-month">vs last month</option>
      </select>
      ${agentId ? html`<button class="btn" onClick=${() => setFilter('agent_id', '')}>agent: ${agentId} ✕</button>` : null}
      <button class="btn" onClick=${load}>Refresh</button>
    </div>

    ${st.error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load: ${st.error}</div><button class="btn" onClick=${load}>Retry</button></div>` : null}
    ${st.loading ? html`<div class="shimmer" style="height:200px"></div>` : null}

    ${!st.loading && st.opt ? html`
      ${framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}
      ${st.cmp ? html`<div class="chart-card"><div class="chart-title">Window comparison (${compare})</div>
        <div class="opt-line">Cost ${st.cmp.cost_delta_usd >= 0 ? '▲' : '▼'} ${fmtCost(Math.abs(st.cmp.cost_delta_usd))} ${st.cmp.cost_delta_pct != null ? '(' + st.cmp.cost_delta_pct.toFixed(1) + '%)' : ''} · Tokens ${st.cmp.tokens_delta >= 0 ? '▲' : '▼'} ${fmtTokens(Math.abs(st.cmp.tokens_delta))}</div></div>` : null}
      ${order.map(n => html`<${OptimizeFinding} name=${n} opt=${st.opt} framing=${framing} />`)}
      ${(st.opt.budgets || []).length ? html`<section class="opt-section"><div class="opt-title">Budget projection</div>
        ${st.opt.budgets.map(b => html`<div class="opt-line">${b.provider}: run rate ${fmtCost(b.monthly_run_rate_usd)}/mo vs ${fmtCost(b.budget_usd)}/cycle ${b.over_budget ? html`<span style="color:var(--error)">— projected over by ${fmtCost(b.projected_overage_usd)}</span>` : '— within budget'}</div>`)}
      </section>` : null}
    ` : null}
  `;
}

// ============================
// App Router
// ============================
function App() {
  const [route, setRoute] = useState(getRoute());

  useEffect(() => {
    const handler = () => setRoute(getRoute());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // Reflect the default route in the URL bar without a render-time redirect.
  // getRoute() already defaults to 'overview', so the first render shows
  // Overview; this just makes the address bar say so (replace = no extra
  // history entry, no hashchange race that left the view blank — #132).
  useEffect(() => {
    if (!location.hash || location.hash === '#/') {
      history.replaceState(null, '', '#/overview');
    }
  }, []);

  // Update active nav link
  useEffect(() => {
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.view === route.view);
    });
  }, [route.view]);

  const p = route.params;
  switch (route.view) {
    case 'overview': return html`<${OverviewView} params=${p} />`;
    case 'status': return html`<${StatusView} params=${p} />`;
    case 'traces':
      if (route.param) return html`<${TraceDetailView} traceId=${route.param} />`;
      return html`<${TracesListView} params=${p} />`;
    case 'sessions':
      if (route.param) return html`<${SessionDetailView} sessionId=${route.param} />`;
      return html`<${StatusView} params=${p} />`;
    case 'runs':
      if (route.param) return html`<${RunDetailView} runId=${route.param} />`;
      return html`<${StatusView} params=${p} />`;
    case 'cost': return html`<${CostView} params=${p} />`;
    case 'alerts': return html`<${AlertsView} params=${p} />`;
    case 'drift': return html`<${DriftView} params=${p} />`;
    case 'optimize': return html`<${OptimizeView} params=${p} />`;
    case 'budget': return html`<${BudgetView} params=${p} />`;
    default: return html`<div class="empty">Page not found.</div>`;
  }
}

render(html`<${App} />`, document.getElementById('app'));

<script>
  // Theme toggle: cycles dark → light → system
  (function () {
    var KEY = 'tj-theme';
    var ICONS = { dark: '☾', light: '☀', system: '⊙' };  // ☾ ☀ ⊙
    var LABELS = { dark: 'Dark', light: 'Light', system: 'System' };
    var btn = document.getElementById('theme-toggle');
    var iconEl = document.getElementById('theme-icon');
    var labelEl = document.getElementById('theme-label');
    var mql = window.matchMedia('(prefers-color-scheme: light)');
    function apply(pref) {
      var isLight = pref === 'light' || (pref === 'system' && mql.matches);
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
      if (iconEl) iconEl.textContent = ICONS[pref];
      if (labelEl) labelEl.textContent = LABELS[pref];
      if (btn) btn.title = 'Theme: ' + pref + ' (click to cycle)';
    }
    var pref = localStorage.getItem(KEY) || 'system';
    apply(pref);
    if (btn) btn.addEventListener('click', function () {
      pref = pref === 'system' ? 'light' : pref === 'light' ? 'dark' : 'system';
      localStorage.setItem(KEY, pref);
      apply(pref);
    });
    mql.addEventListener('change', function () { if (pref === 'system') apply(pref); });
  })();
</script>
