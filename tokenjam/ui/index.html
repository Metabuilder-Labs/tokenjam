// Per-analyzer display metadata for the recoverable band + Optimize sections.
// cache-recommend / budget-projection are intentionally absent from the savings
// band (no estimated_recoverable_usd); they surface elsewhere.
const ANALYZER_META = {
  downsize:   { title: 'Downsize',   hint: 'Route candidate sessions to a cheaper model' },
  cache:      { title: 'Cache',      hint: 'Raise cache-read efficacy toward the 80% ceiling' },
  script:     { title: 'Script',     hint: 'Replace a deterministic call-pattern with a script' },
  trim:       { title: 'Trim',       hint: 'Trim low-significance tokens from prompt templates' },
  reuse:      { title: 'Reuse',      hint: 'Reuse a repeated planning skeleton instead of re-planning' },
  subagent:   { title: 'Subagent',   hint: 'Right-size an over-powered subagent to a cheaper same-family model' },
  relearn:    { title: 'Relearn',    hint: 'Recurring failure clusters the self-improve loop tracks' },
  verbosity:  { title: 'Verbosity',  hint: 'Sessions whose output runs high vs the per-task-shape median' },
  deadweight: { title: 'Deadweight', hint: 'Configured MCP servers whose schemas are injected but never called' },
  resend:     { title: 'Context resend', hint: 'How much of each turn re-sends context already sent in an earlier turn' },
  placement:  { title: 'Batch placement', hint: 'Unattended, cadence-regular workloads that fit the Batch API\'s flat-rate discount' },
  'cache-recommend': { title: 'Cache recommend', hint: 'Add cache_control breakpoints (Anthropic)' },
  'budget-projection': { title: 'Budget projection', hint: 'Projected cycle spend vs ceiling' },
};

// Fallback threshold values for the `placement` empty state, mirroring
// analyzers/batch_placement.py's MIN_SESSIONS_FOR_CADENCE / MIN_GROUP_COST_USD
// module defaults. Used only when the finding itself is absent from the
// payload (nothing qualified this window) — `analyze_batch_placement` returns
// None rather than a finding carrying the effective (possibly user-tuned via
// [optimize] in tj.toml) values in that case, so the empty state can't read
// the run's actual thresholds off the response the way the populated card
// does off `fd.min_sessions_for_cadence` / `fd.min_group_cost_usd`.
const PLACEMENT_DEFAULT_MIN_SESSIONS = 5;
const PLACEMENT_DEFAULT_MIN_GROUP_COST_USD = 1.0;

// A median inter-start gap as something a person reads at a glance — mirrors
// cmd_optimize.py's `_cadence_phrase`, the CLI placement renderer's own helper.
function fmtCadence(seconds) {
  if (seconds >= 86400) return '~' + (seconds / 86400).toFixed(1) + 'd';
  if (seconds >= 3600) return '~' + (seconds / 3600).toFixed(1) + 'h';
  if (seconds >= 60) return '~' + Math.round(seconds / 60) + 'm';
  return '~' + Math.round(seconds) + 's';
}

// Deep-link a recoverable-waste tile straight to its own analyzer detail card
// on the Optimize screen (#229) — not an Analytics chart slice. The
// `finding` param drives OptimizeView's scroll-into-view + highlight of
// #opt-<name> (see the focus effect below). `since` is passed through so the
// destination shows the same window the tile was computed from.
function optimizeFindingHref(name, since) {
  const sp = new URLSearchParams();
  if (since && since !== '30d') sp.set('since', since);
  sp.set('finding', name);
  return '#/optimize?' + sp.toString();
}

// Reverse hop: deep-link a detail card's evidence into the Review inbox's
// matching cost advisory (or advisories — one analyzer can carry several).
// The `analyzer` param drives ReviewInboxView's scroll-into-view + highlight
// of every open advisory that analyzer produced, mirroring
// optimizeFindingHref's card-level (not per-instance) granularity.
function reviewProposalHref(analyzer) {
  return '#/review?analyzer=' + encodeURIComponent(analyzer);
}

// Title-case a registry key for display. Centralizes capitalization so a tile
// for a not-yet-known analyzer still renders title-case instead of the raw
// lowercase key (#162) — registry keys are lowercase by convention.
function capitalize(name) {
  return name ? name.charAt(0).toUpperCase() + name.slice(1) : name;
}

// Mirror core/framing.render_savings: api/unknown → dollars; subscription →
// token-share of the cycle; local → token count. The mode is server-decided.
function fmtFramedSavings(usd, tokens, framing) {
  const mode = framing ? framing.pricing_mode : 'api';
  if (mode === 'subscription') {
    if (tokens == null) return '—';
    if (framing.window_total_tokens > 0) return (100 * tokens / framing.window_total_tokens).toFixed(1) + '% of cycle tokens';
    return fmtTokens(tokens) + ' tokens';
  }
  if (mode === 'local') return tokens == null ? '—' : fmtTokens(tokens) + ' tokens';
  return usd == null ? '—' : fmtCost(usd);
}

// Is the server telling us NOT to lead with dollars? Reads the explicit
// server-side decision (`display_rule`, core/framing.py) rather than
// re-deriving it, with a pricing_mode fallback for older payloads. True for a
// subscription-dominant corpus (a dollar figure there covers only the
// API-billed slice, so it understates), for local inference, and for an
// unknown plan. Callers make TOKENS the headline in that case.
const DOLLARS_SUPPRESSED_RULES = new Set([
  'suppress_dollars_for_subscription_share', 'tokens_only', 'suppress_dollars_unknown',
]);
function dollarsSuppressed(framing) {
  if (!framing) return false;
  if (framing.display_rule) return DOLLARS_SUPPRESSED_RULES.has(framing.display_rule);
  return framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local';
}

// Count agents whose latest session breaches the 2σ drift threshold on any
// tracked metric (mirrors the Drift screen's z-score logic).
function driftSignalCount(drift) {
  const agents = (drift && drift.agents) || (drift && drift.agent_id ? [drift] : []);
  const metrics = [
    ['avg_input_tokens', 'stddev_input_tokens', 'input_tokens'],
    ['avg_output_tokens', 'stddev_output_tokens', 'output_tokens'],
    ['avg_session_duration_s', 'stddev_session_duration', 'duration_seconds'],
    ['avg_tool_call_count', 'stddev_tool_call_count', 'tool_call_count'],
  ];
  let n = 0;
  for (const a of agents) {
    if (!a.baseline || !a.latest_session) continue;
    let breach = false;
    for (const [avgK, stdK, latK] of metrics) {
      const avg = a.baseline[avgK], std = a.baseline[stdK], latest = a.latest_session[latK];
      if (avg == null || latest == null) continue;
      if (std != null && std > 0) { if (Math.abs((latest - avg) / std) >= 2) breach = true; }
      else if (latest !== avg) breach = true;
    }
    if (breach) n++;
  }
  return n;
}

// Flatten the optimize report into recoverable-band tiles. Ready tiles carry a
// number; not-ready ones (capture off, missing dep, or skipped under fast=true)
// render muted with an enablement hint.
// Cache efficacy ceiling — fallback if the response doesn't carry
// `efficacy_ceiling`; mirrors core/optimize cache_efficacy.EFFICACY_CEILING.
const CACHE_EFFICACY_CEILING = 0.80;

// Classify a finding into one of four honest tile states (issue #127):
//   actionable  — ran, found recoverable waste (carries a number)
//   at_ceiling  — ran, already optimized (no waste because at the ceiling)
//   no_findings — ran, nothing actionable in this window
//   not_ready   — couldn't run (capture off / missing dep / skipped on fast)
// Reads richer discriminators from the finding rather than `usd in (None,0)`.
function classifyFinding(name, fd, skipped) {
  if (skipped.has(name)) return { state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' };
  if (fd && fd.enabled === false) {
    return { state: 'not_ready', hint: fd.hint || (ANALYZER_META[name] || {}).hint };
  }
  const usd = fd ? fd.estimated_recoverable_usd : null;
  const tokens = fd ? fd.estimated_recoverable_tokens : null;
  if (usd != null && usd > 0) {
    return { state: 'actionable', usd, tokens, basis: fd.estimate_basis || '' };
  }
  // Ran, nothing to recover. For cache, distinguish "already at the ceiling"
  // (positive) from "nothing here" so we never tell a user to raise efficacy
  // they've already maxed out. A fully-cached model can have tiny *uncached*
  // input (most volume is cache reads), so DON'T gate at_ceiling on input
  // volume — gate on "all rows with usage are at/above the ceiling" (#135).
  if (name === 'cache' && fd) {
    const ceiling = fd.efficacy_ceiling != null ? fd.efficacy_ceiling : CACHE_EFFICACY_CEILING;
    const used = (fd.rows || []).filter(r => (r.input_tokens + r.cache_tokens) > 0);
    if (used.length && used.every(r => r.efficacy >= ceiling)) {
      const best = used.slice().sort((a, b) =>
        (b.input_tokens + b.cache_tokens) - (a.input_tokens + a.cache_tokens))[0];
      return { state: 'at_ceiling', metric: Math.round(best.efficacy * 100) + '% cache efficacy' };
    }
  }
  return { state: 'no_findings' };
}

// Flatten the optimize report into recoverable-band tiles, each carrying a
// state (see classifyFinding). Registry-driven: downsize is a typed slot; any
// wave-2 finding carrying the `estimated_recoverable_usd` contract field becomes
// a tile (so a future `reuse` analyzer appears with no UI change).
// cache-recommend / budget-projection lack the field → excluded by contract.
function recoverableTiles(opt) {
  if (!opt) return [];
  const out = [];
  const skipped = new Set(opt.skipped_analyzers || []);
  const f = opt.findings || {};
  // Downsize always gets a tile — it runs unconditionally; a null typed slot
  // means "ran, no candidates", not "missing" (issue #126).
  out.push({ name: 'downsize', ...classifyFinding('downsize', opt.downgrade, skipped) });
  Object.keys(f).forEach(k => {
    if (f[k] && 'estimated_recoverable_usd' in f[k]) out.push({ name: k, ...classifyFinding(k, f[k], skipped) });
  });
  skipped.forEach(k => {
    if (!(k in f) && k !== 'downsize') {
      out.push({ name: k, state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' });
    }
  });
  return rankTiles(out, opt.finding_rank);
}

// Order recoverable tiles biggest-waste-first, mirroring the CLI's ranking
// (cmd_optimize.py's `_rank_findings`) instead of Object.keys() insertion
// order (#229) — the server ships that same ranking as
// `finding_rank` on the /optimize payload so the algorithm lives in one
// place. `share` entries are ordered largest-first with unranked findings
// (share === null — no quantified estimate, NOT zero) already sorted last by
// the server; a tile whose name is missing from finding_rank (older server,
// or a name the rank doesn't cover) keeps its original relative position at
// the end via a stable sort.
function rankTiles(tiles, findingRank) {
  if (!findingRank || !findingRank.length) return tiles;
  const order = new Map(findingRank.map((r, i) => [r.name, i]));
  return tiles
    .map((t, i) => ({ t, i, rank: order.has(t.name) ? order.get(t.name) : Infinity }))
    .sort((a, b) => (a.rank - b.rank) || (a.i - b.i))
    .map(x => x.t);
}

function HealthTile({ label, value, attention, href, sub }) {
  return html`<a class="health-tile ${attention ? 'attn' : ''}" href=${href}>
    <div class="health-value">${value}</div>
    <div class="health-label">${label}</div>
    ${sub ? html`<div class="health-sub">${sub}</div>` : null}
  </a>`;
}

// ---- Optimize detail screen ----
function OptimizeFinding({ name, opt, framing, hasProposal }) {
  const meta = ANALYZER_META[name] || { title: capitalize(name) };
  let body = null;
  if (name === 'downsize') {
    const dg = opt.downgrade;
    // Always render the section — a null typed slot means the analyzer ran and
    // found no candidates, not that it's missing (issue #126).
    if (!dg) {
      return html`<section class="opt-section" id="opt-downsize">
        <div class="opt-title">Downsize</div>
        <div class="opt-line dim">No downsize candidates in this window — sessions don't match the smaller-model shape (small input/output, few tool calls).</div>
      </section>`;
    }
    body = html`
      <div class="opt-line">${dg.percent_of_sessions}% of sessions match a smaller-model candidate shape (${dg.candidate_sessions} of ${dg.total_sessions}).</div>
      ${dg.suggestions && Object.keys(dg.suggestions).length ? html`<div class="opt-line dim">Pattern: ${Object.entries(dg.suggestions).map(([k, v]) => k + ' → ' + v).join(', ')}</div>` : null}
      ${(dg.examples || []).length ? html`<div class="opt-sub">Examples</div>
        <table class="opt-table"><tbody>${dg.examples.map(ex => html`<tr><td class="mono">${(ex.trace_id || '').slice(0, 8)}…</td><td>${ex.tool_calls} tools</td><td class="mono">${ex.model}</td></tr>`)}</tbody></table>` : null}
      ${dg.caveat ? html`<div class="opt-caveat">! ${dg.caveat}</div>` : null}`;
  } else if (name === 'placement') {
    // Batch API placement: unattended, cadence-regular workloads whose spend
    // could move to the Batch API's flat 50% rate. A sibling top-level branch
    // (not the generic `(opt.findings||{})[name]` path below) because
    // `analyze_batch_placement` drops the key from `findings` entirely rather
    // than carrying an empty-candidates finding when nothing qualifies (see
    // model_downgrade.py's `run()`) — same "null slot means ran, found
    // nothing" shape as `downsize`/`opt.downgrade` just above, so it gets the
    // same explicit empty-state treatment (issue #126) instead of vanishing
    // via the generic `if (!fd) return null` a couple lines down.
    const fd = (opt.findings || {})[name];
    if (!fd) {
      return html`<section class="opt-section" id="opt-placement">
        <div class="opt-title">Batch placement</div>
        <div class="opt-line dim">No unattended, cadence-regular workloads in this window <span class="dim">(≥${PLACEMENT_DEFAULT_MIN_SESSIONS} sessions on a regular cadence, ≥${fmtCost(PLACEMENT_DEFAULT_MIN_GROUP_COST_USD)} window spend)</span>. Lower <span class="mono">[optimize] min_sessions_for_cadence</span> / <span class="mono">min_group_cost_usd</span> in tj.toml to consider smaller workloads.</div>
      </section>`;
    }
    // This number is a PRICE difference on the SAME tokens (batch bills the
    // same work at half rate, freeing nothing), never tokens freed — so
    // unlike every sibling card this branch renders its own footer line
    // below instead of the generic "estimated recoverable" one (see
    // `recUsd`/`recTok` suppression for this name further down), and gates
    // the dollar figure on `pricing_mode === 'api'` exactly, not just "not
    // suppressed" — the Batch API discount is an api-billed lever a
    // subscription/local/unknown plan cannot pull at all, mirroring the
    // CLI's `_render_placement` and `cost_proposals._placement_to_proposals`
    // (CLAUDE.md anti-pattern #22). Advise-only by design: batch adoption is
    // an architectural change (submit + poll) in the user's own application,
    // so this card offers no apply action — the generic "fix is ready" link
    // rendered below (data-driven off `hasProposal`) still applies, since it
    // only ever points at the Review inbox, never an apply button.
    const n = fd.candidates.length;
    const isApi = framing && framing.pricing_mode === 'api';
    body = html`
      <div class="opt-line">${n} workload${n !== 1 ? 's' : ''} fit the batch shape <span class="dim">(regular cadence, no human turn after the first model call)</span>: <b>${fd.percent_of_window_cost}%</b> of window cost.</div>
      <table class="opt-table"><thead><tr><th>Agent</th><th>Cadence</th><th>Tokens</th>${isApi ? html`<th>Spend → batch rate</th>` : null}</tr></thead>
        <tbody>${fd.candidates.slice(0, 10).map(c => html`<tr><td class="mono">${c.agent_id}</td><td>${c.sessions} session${c.sessions !== 1 ? 's' : ''} every ${fmtCadence(c.median_gap_seconds)}</td><td>${fmtTokens(c.tokens)}</td>${isApi ? html`<td class="mono">${fmtCost(c.cost_usd)} → <span style="color:var(--success)">${fmtCost(c.cost_usd - c.estimated_batch_saving_usd)}</span></td>` : null}</tr>`)}</tbody></table>
      ${fd.candidates.length > 10 ? html`<div class="opt-line dim">…and ${fd.candidates.length - 10} more.</div>` : null}
      ${isApi && fd.estimated_recoverable_usd != null ? html`
        <div class="opt-line" style="margin-top:8px"><span style="color:var(--success)">~${fmtCost(fd.estimated_recoverable_usd)}</span> estimated price difference over this window <span class="price-diff-tag" title=${fd.estimate_basis}>price difference</span> <span class="dim">(the same work, billed at the Batch API's flat rate)</span></div>`
        : html`<div class="opt-line dim" style="margin-top:8px">The Batch API's discount is an api-billed price lever, so no dollar figure is shown for this plan. The workload sizes above still say how much work fits the shape.</div>`}
      ${fd.friction ? html`<div class="opt-caveat">! ${fd.friction}</div>` : null}`;
  } else {
    const fd = (opt.findings || {})[name];
    if (!fd) return null;
    if (name === 'cache') {
      body = html`
        ${(fd.flagged || []).length ? html`<div class="opt-line">${fd.flagged.length} (provider, model) row(s) below the efficacy threshold.</div>` : null}
        <table class="opt-table"><thead><tr><th>Provider/Model</th><th>Efficacy</th><th>Input</th><th>Cache</th></tr></thead>
          <tbody>${(fd.rows || []).map(r => html`<tr class=${r.flagged ? 'flagged' : ''}><td class="mono">${r.provider}/${r.model}</td><td>${(r.efficacy * 100).toFixed(0)}%</td><td>${fmtTokens(r.input_tokens)}</td><td>${fmtTokens(r.cache_tokens)}</td></tr>`)}</tbody></table>`;
    } else if (name === 'resend') {
      // Structural context re-send: how much of each turn's prompt was
      // already sent in a previous turn. Cross-persona (Claude Code + SDK
      // alike) — only the fix differs, so both fixes always render, labeled
      // by who acts on them. `repeat_share === null` is the below-threshold
      // empty state; name the reason from `notes` rather than an empty card.
      const usd = fd.estimated_recoverable_usd, tok = fd.estimated_recoverable_tokens;
      const median = fd.repeat_share_median, p90 = fd.repeat_share_p90;
      body = fd.repeat_share == null ? html`
        <div class="opt-line dim">${(fd.notes && fd.notes[0]) || 'Not enough data in this window to measure a repeat share.'}</div>`
        : html`
        <div class="opt-line">${(fd.repeat_share * 100).toFixed(1)}% of prompt tokens in this window were already sent in an earlier turn of the same session <span class="dim">(token-weighted aggregate, ${fd.sessions_examined} session${fd.sessions_examined !== 1 ? 's' : ''} · ${fd.turns_examined} turns)</span>.</div>
        ${median != null ? html`<div class="opt-line dim">Median session: ${(median * 100).toFixed(0)}%${p90 != null ? `, p90: ${(p90 * 100).toFixed(0)}%` : ''}. The aggregate above is token-weighted, so a handful of very long sessions can pull it well above what a typical session carries.</div>` : null}
        ${(fd.examples || []).length ? html`<div class="opt-sub">Heaviest sessions</div>
          <table class="opt-table"><thead><tr><th>Session</th><th>Turns</th><th>Repeat share</th><th>Repeat tokens</th><th>Provider/Model</th></tr></thead>
            <tbody>${fd.examples.map((ex, i) => html`<tr key=${i}><td class="mono">${(ex.session_id || '').slice(0, 12)}</td><td>${ex.turns}</td><td>${(ex.repeat_share * 100).toFixed(0)}%</td><td>${fmtTokens(ex.repeat_tokens)}</td><td class="mono">${ex.provider}/${ex.model}</td></tr>`)}</tbody></table>` : null}
        ${(fd.recurring_examples || []).length ? html`<div class="opt-sub">Why: recurring inclusions</div>
          <table class="opt-table"><thead><tr><th>What's re-included</th><th>Sessions</th><th>Occurrences</th><th>Fix</th></tr></thead>
            <tbody>${fd.recurring_examples.slice(0, 8).map((r, i) => html`<tr key=${i}><td class="mono">${r.label}</td><td>${r.sessions}</td><td>${r.occurrences}</td><td class="dim">${r.fix}</td></tr>`)}</tbody></table>`
          : (fd.notes && fd.notes[0] ? html`<div class="opt-line dim">${fd.notes[0]}</div>` : null)}
        <div class="opt-sub">Fixes</div>
        <div class="opt-line">${fd.fix_compaction} <span class="dim">(agent-harness users, e.g. Claude Code)</span></div>
        ${fd.fix_cache_control ? html`
          <div style="margin-top:8px">
            <div class="opt-title" style="font-size:12.5px"><span>cache_control snippet <span class="dim" style="font-weight:400">· SDK users, paste into your own call site</span></span>
              <${CopySnippetButton} text=${fd.fix_cache_control} />
            </div>
            <div class="sz-copybox" style="margin-top:4px">${fd.fix_cache_control}</div>
          </div>` : null}
        ${(!dollarsSuppressed(framing) && usd == null && tok != null) ? html`<div class="opt-line dim">No dollar figure: no session in this window carries a priced, cache-capable model to estimate the cache_control-adoption saving from. The token estimate above still applies to the compaction lever, which is cache-agnostic.</div>` : null}
        ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`;
    } else if (name === 'cache-recommend') {
      body = !fd.enabled ? html`<div class="opt-line dim">${fd.hint || 'Disabled. Set [capture] prompts = true to run this analyzer.'}</div>`

        : html`<div class="opt-line dim">No stable prefixes shared across ≥3 Anthropic calls.</div>`;
    } else if (name === 'script') {
      body = (fd.clusters || []).length ? html`
        <div class="opt-line">${fd.clusters.length} deterministic-pattern cluster(s).</div>
        <table class="opt-table"><thead><tr><th>Instances</th><th>Signature</th><th>Avg cost</th></tr></thead>
          <tbody>${fd.clusters.map(c => html`<tr><td>${c.instances}×</td><td class="mono">${(c.signature || []).map(s => s.tool).join(' → ').slice(0, 60)}</td><td>${fmtPerItemCost(c.avg_cost_usd, c.avg_tokens, framing)}</td></tr>`)}</tbody></table>
        ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`

    } else if (name === 'trim') {

        ${fd.clusters[0].caveat ? html`<div class="opt-caveat">! ${fd.clusters[0].caveat}</div>` : null}`
        : html`<div class="opt-line dim">No repeated planning detected above threshold (≥3 sessions sharing a skeleton).</div>
          ${fd.hint ? html`<div class="opt-line dim">${fd.hint}</div>` : null}`;

        ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`

    } else if (name === 'deadweight') {

        : !fd.configured_servers ? html`<div class="opt-line dim">Scanned ${fd.sessions_scanned} session${fd.sessions_scanned !== 1 ? 's' : ''}; no MCP server is configured, so nothing is being injected.</div>`

        : html`
          <div class="opt-line">${fd.dead_servers.length} dead MCP server${fd.dead_servers.length !== 1 ? 's' : ''} of ${fd.configured_servers} configured <span class="dim">(schemas injected every session, never called)</span>.</div>
          <table class="opt-table"><thead><tr><th>Server</th><th>Sessions</th><th>Invocations</th><th>Tax / 90d</th></tr></thead>
            <tbody>${fd.dead_servers.map(s => html`<tr><td class="mono">${s.name} <span class="dim">(${s.scope} · ${s.source})</span></td><td>${s.sessions_present}</td><td>${s.invocations}</td><td>${s.estimated_tax_usd_90d != null ? fmtCost(s.estimated_tax_usd_90d) : ('~' + fmtTokens(s.estimated_tax_tokens_90d) + ' tokens')}</td></tr>`)}</tbody></table>
          ${fd.caveat ? html`<div class="opt-caveat">! ${fd.caveat}</div>` : null}`;
    }
  }
  // Recoverable estimate line (when present). `placement` is excluded: its
  // figure is a price difference, not recoverable tokens, and its own branch
  // above renders its own footer with the "price difference" label instead
  // (CLAUDE.md anti-pattern #22 — the generic "estimated recoverable" wording
  // below would be dishonest for a figure that frees no tokens at all).
  const fd = name === 'downsize' ? opt.downgrade : (opt.findings || {})[name];
  const recUsd = name === 'placement' ? null : (fd ? fd.estimated_recoverable_usd : null);
  const recTok = name === 'placement' ? null : (fd ? fd.estimated_recoverable_tokens : null);
  const rec = (recUsd != null || recTok != null) ? fmtFramedSavings(recUsd, recTok, framing) : null;

  return html`<section class="opt-section" id=${'opt-' + name}>
    <div class="opt-title">${meta.title}
      ${rec ? html`<span class="opt-rec">${rec} <span class="estimated-tag" title=${fd && fd.estimate_basis}>estimated recoverable</span></span>` : null}
    </div>
    ${body}
    ${hasProposal ? html`<div class="opt-line" style="margin-top:10px"><a class="sz-link" href=${reviewProposalHref(name)}>A fix for this is ready. Review it in the Review inbox →</a></div>` : null}
  </section>`;
}

// Recommendation-outcome ledger: did recommendations get acted on, and
// what did they actually recover? Keeps measured-recovered strictly separate
// from estimated-recoverable (honesty discipline, Rule 14) — the measured column
// is an observed post-recommendation span-mix shift (correlation), never a
// projected figure and never "tokenjam saved you".
function RecommendationsPanel({ rec }) {
  const estTok = rec.estimated_recoverable_tokens || 0;
  const estUsd = rec.estimated_recoverable_usd || 0;

        <div class="sz-tile"><div class="sz-tile-v" style="color:var(--success)">${fmtTokens(measTok)}${measUsd ? ' (' + fmtCost(measUsd) + ')' : ''}</div><div class="sz-tile-l">measured recovered</div></div>
        <div class="sz-tile"><div class="sz-tile-v">${rec.adopted || 0} / ${rec.ignored || 0}</div><div class="sz-tile-l">adopted / ignored</div></div>

// ============================
// Optimize ▸ Summarize (Track B) — curate → run → review/apply.
// ============================
// The Optimize dashboard SHOWS the recoverable signal (the Track A `summarize`
// analyzer); THIS screen DOES the work. Its reason to exist vs. `tj summarize`
// on the CLI is granularity (DEC-034): the CLI applies all-or-nothing, here you
// pick a subset, run the structure-aware summarizer per file, review each diff,
// and apply individually. Every write goes through core `apply_staged` (owner +
// content-hash-drift + symlink guards, gzip backup, dry-run until an explicit
// per-file Apply — no flag bypasses a guard). All data comes from
// /api/v1/summarize/* (core in-process; the run route is `tj serve`'s first
// outbound LLM caller — capabilities-gated so dead engines are disabled).
function diffLine(ln, i) {
  let col = 'var(--text-faint)';
  if (ln.startsWith('+')) col = 'var(--success)';
  else if (ln.startsWith('-')) col = 'var(--error)';
  return html`<div key=${i} style=${'color:' + col}>${ln || ' '}</div>`;
}

// Group a unified diff into per-hunk "blocks" so the review shows the change
// block-by-block instead of one wall of @@ noise. Drops the ---/+++ file headers
// and the cryptic @@ hunk header; each hunk becomes a block with +/- line counts.
function diffBlocks(diffText) {
  const out = [];
  let cur = null;
  for (const ln of (diffText || '').split('\n')) {
    if (ln.startsWith('--- ') || ln.startsWith('+++ ')) continue;
    if (ln.startsWith('@@')) { cur = { add: 0, del: 0, lines: [] }; out.push(cur); continue; }
    if (!cur) { cur = { add: 0, del: 0, lines: [] }; out.push(cur); }
    if (ln.startsWith('+')) cur.add++;
    else if (ln.startsWith('-')) cur.del++;
    cur.lines.push(ln);
  }
  return out.filter(b => b.lines.some(l => l.trim()));
}

function SummarizeView({ params }) {

  const [caps, setCaps] = useState(null);

  // Scan + staged data (read-only reads).
  const [scan, setScan] = useState(null);              // ScanResult.to_dict

  const [backups, setBackups] = useState([]);          // applied files that still have a gzip backup (undo surface)
  const [dataErr, setDataErr] = useState(null);
  const [loading, setLoading] = useState(false);

  // Run.
  const [runList, setRunList] = useState([]);          // ordered basket snapshot
  const [runState, setRunState] = useState(null);      // api/claude-p batch progress
  const [tick, setTick] = useState(0);                 // 1s ticker so the in-flight run row shows live elapsed
  const [manIdx, setManIdx] = useState(0);             // manual per-file stepper
  const [manPrep, setManPrep] = useState(null);
  const [manSummary, setManSummary] = useState('');
  const [manBusy, setManBusy] = useState(false);
  const [manErr, setManErr] = useState(null);

  // Review.
  const [revChecked, setRevChecked] = useState(() => new Set());
  const [revModal, setRevModal] = useState(null);      // staged path whose diff is open
  const [rvState, setRvState] = useState('all');
  const [rvKind, setRvKind] = useState('all');

  const [applyMsg, setApplyMsg] = useState(null);
  const [busy, setBusy] = useState(false);

  // The scan omits already-summarized files by design; a file that's been run
  // but not yet applied is still a candidate AND has a staged record → 'staged'.
  const cands = scan ? scan.candidates : [];
  const stagedPaths = new Set(staged.map(s => s.path));
  const candByPath = {};
  cands.forEach(c => { candByPath[c.path] = c; });
  const statusOf = c => stagedPaths.has(c.path) ? 'staged' : 'candidate';

  // ---- loaders (all core in-process) ----
  const loadCaps = async () => {
    try { setCaps(await api('/summarize/capabilities')); }
    catch (e) { setCapErr(e.message || String(e)); }
  };
  const loadScan = async (opts) => {
    // Merge the toggle into a ref SYNCHRONOUSLY: a second toggle handled before the
    // re-render must not rebuild the other value from a stale closure (the seq guard
    // would otherwise make that stale-but-later request authoritative).
    if (opts) scanOpts.current = { ...scanOpts.current, ...opts };
    const { recursive: rec, repo: rp } = scanOpts.current;
    const seq = ++scanSeq.current;
    setLoading(true); setDataErr(null);
    try {
      const [sc, stg] = await Promise.all([
        api('/summarize/candidates', { recursive: rec || undefined, repo: rp || undefined }),
        api('/summarize/staged'),
      ]);
      if (seq !== scanSeq.current) return;   // a newer scan superseded this response — drop it
      setScan(sc); setStaged(stg.staged || []);
    } catch (e) { if (seq === scanSeq.current) setDataErr(e.message || String(e)); }
    if (seq === scanSeq.current) setLoading(false);
  };
  const loadStaged = async () => {
    try { const stg = await api('/summarize/staged'); setStaged(stg.staged || []); }
    catch (e) { setDataErr(e.message || String(e)); }
  };
  const loadBackups = async () => {
    try { const bk = await api('/summarize/backups'); setBackups(bk.backups || []); }
    catch (e) { /* backups are a convenience surface; don't block the screen on them */ }
  };

  // Mount: capabilities (which engines work) + any already-staged work, so the
  // start screen can offer "review N staged" WITHOUT forcing an engine choice
  // (reviewing/applying staged rewrites needs no LLM — only running does).
  useEffect(() => { loadCaps(); loadStaged(); loadBackups(); }, []);

  // While a batch run is in flight, tick once a second so the in-flight row shows
  // live elapsed time (a claude-p file can take 30-90s; silence reads as "hung").
  const runActive = phase === 'run' && !!runState && runState.running;
  useEffect(() => {
    if (!runActive) return undefined;
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [runActive]);

  const pickEngine = e => { setEngine(e); setPhase('curate'); loadScan(); };

  // ---- curator ----
  const seg = (val, set, opts, label) => html`
    <div class="cur-seg"><span class="seg-label">${label}</span>
      ${opts.map(o => html`<button class=${val === o.v ? 'on' : ''} onClick=${() => set(o.v)}>${o.t}</button>`)}
    </div>`;
  const baseMatch = c =>
    (kind === 'all' || c.kind === kind) &&
    (scope === 'all' || c.scope === scope) &&
    (status === 'all' || statusOf(c) === status) &&
    (query === '' || c.path.toLowerCase().includes(query.toLowerCase()));
  const visible = cands.filter(baseMatch);
  const selectable = visible.filter(c => !added.has(c.path));
  const checkedCount = [...checked].filter(p => !added.has(p)).length;

  const toggle = p => setChecked(prev => { const n = new Set(prev); n.has(p) ? n.delete(p) : n.add(p); return n; });
  const checkShown = () => setChecked(prev => { const n = new Set(prev); selectable.forEach(c => n.add(c.path)); return n; });
  const uncheckShown = () => setChecked(prev => { const n = new Set(prev); visible.forEach(c => n.delete(c.path)); return n; });
  const doAdd = () => { setAdded(prev => { const n = new Set(prev); checked.forEach(p => n.add(p)); return n; }); setChecked(new Set()); };
  const removeAdded = p => setAdded(prev => { const n = new Set(prev); n.delete(p); return n; });
  const clearAll = () => setAdded(new Set());
  const clearShownModal = () => setAdded(prev => { const n = new Set(prev); [...prev].filter(p => mQuery === '' || p.toLowerCase().includes(mQuery.toLowerCase())).forEach(p => n.delete(p)); return n; });
  const openModal = m => { setMQuery(''); setModal(m); };

  const addedList = [...added].map(p => candByPath[p]).filter(Boolean);
  const addedTok = addedList.reduce((s, c) => s + (c.est_tokens_saved || 0), 0);
  const modalList = addedList.filter(c => mQuery === '' || c.path.toLowerCase().includes(mQuery.toLowerCase()));

  // Smart tally: individual chips while few; collapse to directory groups past a cap.
  const CHIP_CAP = 8;
  const dirOf = p => { const i = p.lastIndexOf('/'); return i < 0 ? './' : p.slice(0, i + 1); };
  let chipEls;
  if (addedList.length <= CHIP_CAP) {
    chipEls = addedList.map((c, i) => html`<span class="cur-chip" key=${i}>${c.path}</span>`);
  } else {
    const groups = {};
    addedList.forEach(c => { const k = dirOf(c.path); groups[k] = (groups[k] || 0) + 1; });
    const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]);
    chipEls = [
      ...sorted.slice(0, CHIP_CAP).map(([dir, n], i) => html`<span class="cur-chip" key=${i}>${dir} <span class="dim">×${n}</span></span>`),
      ...(sorted.length > CHIP_CAP ? [html`<span class="cur-chip more" key="more">+${sorted.length - CHIP_CAP} dirs</span>`] : []),
    ];
  }

  // ---- run transitions ----
  const approve = () => {
    const list = [...added];
    setRunList(list); setModal(null); setFileStates({}); setRevChecked(new Set()); setApplyMsg(null);
    if (engine === 'manual') {
      setManIdx(0); setManSummary(''); setManErr(null); setPhase('run'); prepFile(list[0]);
    } else {
      setPhase('run'); runBatch(list);
    }
  };
  const runBatch = async list => {
    setRunState({ total: list.length, done: 0, current: null, results: [], running: true });
    for (const path of list) {
      setRunState(s => ({ ...s, current: path, curStart: Date.now() }));
      try {
        const r = (await apiPostOrDetail('/summarize/run', { path, mode: engine, ratio: 0.5 })) || {};
        const ok = !!(r.verdict && r.verdict.staged);
        const note = r.skipped_note || (r.verdict && !r.verdict.structure_ok ? (r.verdict.reason || 'structure check did not pass') : '');
        setRunState(s => ({ ...s, done: s.done + 1, results: [...s.results, { path, ok, note, amortization: r.amortization, cost_unknown: r.cost_unknown }] }));
      } catch (e) {
        setRunState(s => ({ ...s, done: s.done + 1, results: [...s.results, { path, ok: false, error: true, note: e.message || String(e) }] }));
      }
    }
    setRunState(s => ({ ...s, current: null, running: false }));
    await loadStaged();
  };
  const prepFile = async path => {
    if (!path) { await loadStaged(); setPhase('review'); return; }
    setManBusy(true); setManErr(null); setManSummary('');
    try { setManPrep(await apiPostOrDetail('/summarize/prep', { path, ratio: 0.5 })); }
    catch (e) { setManErr(e.message || String(e)); setManPrep({ path, wrapped_prompt: '', system_rules: '', source_sha256: '', note: '', error: true }); }
    setManBusy(false);
  };
  const manNext = async () => {
    const next = manIdx + 1;
    if (next >= runList.length) { await loadStaged(); setPhase('review'); return; }
    setManIdx(next); await prepFile(runList[next]);
  };
  const manCheck = async () => {
    if (!manPrep || !manPrep.source_sha256) return;
    setManBusy(true); setManErr(null);
    try { await apiPostOrDetail('/summarize/check', { path: manPrep.path, summary: manSummary, source_hash: manPrep.source_sha256 }); }
    catch (e) { setManErr(e.message || String(e)); setManBusy(false); return; }
    await manNext();
    setManBusy(false);
  };

  // ---- review ----
  const revRows = staged.map(s => { const c = candByPath[s.path]; return { ...s, kind: c ? c.kind : 'other', scope: c ? c.scope : '—' }; });
  const stOf = p => fileStates[p] || 'staged';
  const rvMatch = r => {
    const st = stOf(r.path);
    return (rvState === 'all' || st === rvState) &&
      (rvKind === 'all' || r.kind === rvKind) &&
      (rvScope === 'all' || r.scope === rvScope) &&
      (rvQuery === '' || r.path.toLowerCase().includes(rvQuery.toLowerCase()));
  };
  const rvVisible = revRows.filter(rvMatch);
  const rvSelectable = rvVisible.filter(r => stOf(r.path) === 'staged');
  // Reject is a client-side dismiss (no write), so it filters nothing — any row can
  // be cleared from the view. Apply WRITES, so it excludes structure_ok===false
  // (defense-in-depth; core is the real guard — check() never stages a failed rewrite
  // and apply_staged re-skips one server-side).
  const rvCheckedReject = [...revChecked].filter(p => stOf(p) === 'staged');
  const rvCheckedStaged = rvCheckedReject.filter(
    p => !staged.some(s => s.path === p && s.structure_ok === false));
  const appliedCount = revRows.filter(r => stOf(r.path) === 'applied').length;
  const rejectedCount = revRows.filter(r => stOf(r.path) === 'rejected').length;
  const revertedCount = revRows.filter(r => stOf(r.path) === 'reverted').length;
  const stagedCount = revRows.length - appliedCount - rejectedCount - revertedCount;
  const rvToggle = p => setRevChecked(prev => { const n = new Set(prev); n.has(p) ? n.delete(p) : n.add(p); return n; });
  const rvCheckShown = () => setRevChecked(prev => { const n = new Set(prev); rvSelectable.forEach(r => n.add(r.path)); return n; });
  const rvUncheckShown = () => setRevChecked(prev => { const n = new Set(prev); rvVisible.forEach(r => n.delete(r.path)); return n; });
  const shortP = p => { const i = p.lastIndexOf('/'); return i < 0 ? p : '…/' + p.slice(i + 1); };
  const setMsg = (text, tone) => setApplyMsg({ text, tone: tone || 'ok' });

  // Apply writes via core apply_staged (go=true). Staging is NOT reloaded after —
  // applied files are cleared from disk on write, but we keep the row visible and
  // overlay 'applied' via fileStates so the review stays legible for this session.
  const applyPaths = async paths => {
    if (!paths.length) return;
    setBusy(true);
    const results = [];
    for (const path of paths) {
      try {
        const r = (await apiPostOrDetail('/summarize/apply', { path, go: true })) || {};
        if (r.applied && r.applied.length) { results.push({ path, ok: true }); setFileStates(s => ({ ...s, [path]: 'applied' })); }
        else { results.push({ path, ok: false, reason: (r.skipped && r.skipped[0]) ? r.skipped[0].reason : 'not applied' }); }
      } catch (e) { results.push({ path, ok: false, reason: e.message || String(e) }); }
    }
    setRevChecked(new Set()); setBusy(false);
    const okN = results.filter(r => r.ok).length;
    const fails = results.filter(r => !r.ok);
    setMsg('Applied ' + okN + ' file(s).' + (fails.length ? ' ' + fails.length + ' skipped — ' + fails.map(f => shortP(f.path) + ' (' + f.reason + ')').join('; ') : ''), fails.length ? 'warn' : 'ok');
    loadBackups();   // newly-applied files now have a backup → surface them as undoable
  };
  const applyChecked = () => applyPaths(rvCheckedStaged);
  const rejectChecked = () => {
    setFileStates(s => { const n = { ...s }; rvCheckedReject.forEach(p => n[p] = 'rejected'); return n; });
    setRevChecked(new Set());
  };
  // Undo restores an APPLIED file from its gzip backup via core `undo` (go=true).
  // Refuses (409) if the file changed since apply or the backup is gone — the
  // reason is surfaced. On success the row goes terminal 'reverted' (its staged
  // copy was already cleared at apply, so it can't be re-applied — re-run to redo).
  const undoPath = async path => {
    setBusy(true);
    try {
      await apiPostOrDetail('/summarize/undo', { path, go: true });
      setFileStates(s => ({ ...s, [path]: 'reverted' }));
      setBackups(bs => bs.filter(b => b.source_path !== path));   // no longer undoable (now == original)
      setMsg('Reverted ' + shortP(path) + ' — restored from backup.', 'ok');
    } catch (e) { setMsg('Undo failed for ' + shortP(path) + ' — ' + (e.message || String(e)), 'warn'); }
    setBusy(false);
  };
  const reRun = async path => {
    if (engine === 'manual') return;
    setBusy(true);
    try {
      await apiPostOrDetail('/summarize/run', { path, mode: engine, ratio: 0.5 });
      const one = await api('/summarize/staged', { path });
      if (one.staged && one.staged.length) {
        setStaged(prev => prev.map(s => s.path === path ? one.staged[0] : s));
        setFileStates(s => { const n = { ...s }; delete n[path]; return n; });
      }
    } catch (e) { setMsg('Re-run failed for ' + shortP(path) + ' — ' + (e.message || String(e)), 'warn'); }
    setBusy(false);
  };

  // ======================= RENDER =======================
  if (phase === 'engine') {
    const eng = (id, name, tag, desc) => {
      const cap = caps ? caps[id] : null;
      const avail = cap ? cap.available : false;
      const val = id === 'claude_p' ? 'claude-p' : id;
      return html`<button class="sz-engine" disabled=${!avail} onClick=${() => avail && pickEngine(val)}>
        <div class="sz-eng-name">${name}</div>
        <div class="sz-eng-tag">${tag}</div>
        <div class="sz-eng-desc">${desc}</div>
        ${!avail && cap && cap.reason ? html`<div class="sz-eng-off">${cap.reason}</div>` : null}
      </button>`;
    };
    return html`
      <div style="margin:0 0 4px"><a class="sz-link" href="#/optimize">← Optimize</a></div>
      <div class="page-title">Summarize <span class="sz-sub">· structure-aware prompt summarization</span></div>
      <div class="sz-note">Rewrites prose only — code, tables and ${'<tj-keep>'} blocks stay verbatim. Nothing is written until you review each rewrite and Apply.</div>
      ${staged.length ? html`<div class="cur-tally" style="cursor:pointer;margin-top:14px" onClick=${() => setPhase('review')}>
        <div class="cur-tally-head">
          <div class="cur-tally-count">${staged.length} <small>staged rewrite(s) ready to review — no engine needed</small></div>
          <div class="cur-tally-hint">Review & apply →</div>
        </div>
      </div>` : null}
      ${backups.filter(b => b.undoable).length ? html`<div class="dim" style="font-size:12px;margin-top:8px">${backups.filter(b => b.undoable).length} applied summary(ies) can be undone — <span class="sz-link" onClick=${() => setPhase('review')}>review & undo →</span></div>` : null}
      <div class="sz-sub" style="font-weight:600;margin:18px 0 2px">Summarize new files</div>
      <div class="sz-note" style="margin-bottom:6px">How to produce the summaries:</div>
      ${capErr ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px">Couldn't load engine availability: ${capErr}</div></div>` : null}
      ${!caps && !capErr ? html`<div class="shimmer" style="height:140px"></div>` : null}
      ${caps ? html`<div class="sz-engines">
        ${eng('api', 'API', '$ at cost · your key', 'Calls Anthropic with your key. Billed per rewrite; the review shows cost and break-even.')}
        ${eng('claude_p', 'Claude CLI', 'against your Claude limits', 'Runs the local `claude` CLI. No dollar cost — uses your Claude limits. Local host only.')}
        ${eng('manual', 'Manual', 'no outbound calls', 'Copy a ready-made prompt into any Claude session, paste the reply back. Nothing leaves this machine.')}
      </div>` : null}
    `;
  }

  if (phase === 'run' && engine !== 'manual') {
    const rs = runState || { total: runList.length, done: 0, current: null, results: [], running: true };
    const pct = rs.total ? Math.round(rs.done / rs.total * 100) : 100;
    const okN = rs.results.filter(r => r.ok).length;
    const elapsed = rs.curStart ? Math.max(0, Math.round((Date.now() - rs.curStart) / 1000)) : 0;
    return html`
      <div class="page-title">Summarize <span class="sz-sub">· running via ${engine}</span></div>
      <div class="sz-note">Summarizing ${rs.total} file(s), one at a time${engine === 'claude-p' ? ' — ~30–90s each via claude-p' : ''}. Results are staged; <b>nothing is written yet</b>.</div>
      <div class="sz-prog"><div style=${'width:' + pct + '%'}></div></div>
      <div class="dim" style="font-size:12px;margin-bottom:10px">${rs.done} / ${rs.total} done${rs.running && rs.current ? ' · running ' + shortP(rs.current) + ' (' + elapsed + 's)' : (rs.running ? '' : ' · complete')}</div>
      <div class="cur-listbox" style="max-height:360px">
        ${rs.results.map((r, i) => html`<div class="sz-runrow" key=${i}>
          <span style=${'color:' + (r.ok ? 'var(--success)' : (r.error ? 'var(--error)' : 'var(--warn)'))}>${r.ok ? '✓' : (r.error ? '✕' : '—')}</span>
          <span style="flex:1;word-break:break-all">${r.path}</span>
          ${r.amortization ? html`<span class="dim">${fmtCost(r.amortization.rewrite_usd)}${r.amortization.break_even_calls != null ? ' · breaks even after ' + r.amortization.break_even_calls + ' calls' : ''}${r.amortization.rates_known ? '' : ' (est. rates)'}</span>`
            : (r.cost_unknown ? html`<span class="dim">cost unknown</span>` : null)}
          ${!r.ok && r.note ? html`<span class="dim" title=${r.note}>${r.note.length > 44 ? r.note.slice(0, 44) + '…' : r.note}</span>` : null}
        </div>`)}
        ${rs.running && rs.current ? html`<div class="sz-runrow">
          <span class="sz-spin">⟳</span>
          <span style="flex:1;word-break:break-all">${rs.current}</span>
          <span class="dim">summarizing${'.'.repeat((tick % 3) + 1)} · ${elapsed}s</span>
        </div>` : null}
        ${rs.results.length === 0 && !(rs.running && rs.current) ? html`<div class="dim" style="padding:16px;text-align:center">Starting…</div>` : null}
      </div>
      <div class="cur-addbar">
        <button class="cur-btn primary" disabled=${rs.running} onClick=${() => setPhase('review')}>Review ${okN} staged →</button>
        <button class="cur-btn" disabled=${rs.running} onClick=${() => setPhase('curate')}>← back to curator</button>
      </div>
    `;
  }

  if (phase === 'run' && engine === 'manual') {
    const total = runList.length;
    const path = runList[manIdx];
    const belowGate = manPrep && !manPrep.error && !manPrep.wrapped_prompt;
    const full = manPrep ? (manPrep.system_rules ? manPrep.system_rules + '\n\n' : '') + manPrep.wrapped_prompt : '';
    return html`
      <div class="page-title">Summarize <span class="sz-sub">· manual — file ${Math.min(manIdx + 1, total)} of ${total}</span></div>
      <div class="dim" style="font-size:12.5px;margin-bottom:10px;font-family:'Geist Mono',monospace">${path}</div>
      ${manBusy ? html`<div class="shimmer" style="height:120px"></div>` : null}
      ${manErr ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px">${manErr}</div></div>` : null}
      ${!manBusy && manPrep && !manPrep.error && !belowGate ? html`
        <div class="sz-note">Paste this into a <b>new</b> Claude session, then paste the reply below and Check & stage.</div>
        <div style="font-size:12px;color:var(--text-faint);margin:8px 0">${manPrep.prose_words} prose words → target ~${manPrep.target_prose_words} · ${manPrep.protected_blocks} protected block(s)</div>
        <div class="sz-copybox">${full}</div>
        <button class="cur-btn" style="margin:8px 0" onClick=${() => navigator.clipboard && navigator.clipboard.writeText(full)}>Copy</button>
        <textarea class="sz-ta" placeholder="Paste Claude's summary here…" value=${manSummary} onInput=${e => setManSummary(e.target.value)}></textarea>
        <div class="cur-addbar">
          <button class="cur-btn primary" disabled=${manBusy || !manSummary.trim()} onClick=${manCheck}>Check & stage →</button>
          <button class="cur-btn" disabled=${manBusy} onClick=${manNext}>Skip this file</button>
          <button class="cur-btn" style="margin-left:auto" onClick=${() => setPhase('curate')}>← back to curator</button>
        </div>
      ` : null}
      ${!manBusy && belowGate ? html`
        <div class="opt-caveat">${manPrep.note || 'Below the prose gate — not worth summarizing.'}</div>
        <div class="cur-addbar"><button class="cur-btn primary" onClick=${manNext}>Skip →</button><button class="cur-btn" onClick=${() => setPhase('curate')}>← back to curator</button></div>
      ` : null}
    `;
  }

  if (phase === 'review') {
    const mf = revModal ? revRows.find(r => r.path === revModal) : null;
    const mst = mf ? stOf(mf.path) : null;
    const mfBlocks = mf ? diffBlocks(mf.diff) : [];
    return html`
      <div style="margin:0 0 4px"><span class="sz-link" onClick=${() => setPhase(engine ? 'curate' : 'engine')}>← ${engine ? 'back to curator' : 'back to start'}</span></div>
      <div class="page-title">Summarize <span class="sz-sub">· review & apply</span></div>
      <div class="sz-note rev-note">${revRows.length} staged. Structure is guaranteed; <b>meaning may change</b> — click a row for its diff. <b>Apply</b> writes the file (backs up first); <b>Reject</b> dismisses it here.</div>
      ${dataErr ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px">${dataErr}</div></div>` : null}
      ${applyMsg ? html`<div class="opt-caveat" style=${'font-style:normal;color:' + (applyMsg.tone === 'warn' ? 'var(--warn)' : 'var(--success)')}>${applyMsg.text}</div>` : null}
      <div class="cur-filters">
        ${seg(rvState, setRvState, [{ v: 'all', t: 'All' }, { v: 'staged', t: 'Staged' }, { v: 'applied', t: 'Applied' }, { v: 'rejected', t: 'Rejected' }, { v: 'reverted', t: 'Reverted' }], 'State')}
        ${seg(rvKind, setRvKind, [{ v: 'all', t: 'All' }, { v: 'prompt', t: 'Prompt' }, { v: 'other', t: 'Other' }], 'Kind')}
        ${seg(rvScope, setRvScope, [{ v: 'all', t: 'All' }, { v: 'global', t: 'Global' }, { v: 'repo', t: 'Repo' }, { v: 'project', t: 'Project' }], 'Scope')}
        <input class="cur-search" placeholder="search files…" value=${rvQuery} onInput=${e => setRvQuery(e.target.value)} />
      </div>
      <div class="cur-listhead">
        <span>${rvVisible.length} shown · <b style="color:var(--warn)">${stagedCount}</b> staged · <b style="color:var(--success)">${appliedCount}</b> applied · <b>${rejectedCount}</b> rejected${revertedCount ? html` · <b>${revertedCount}</b> reverted` : null}</span>
        <span class="sz-link" onClick=${rvCheckShown}>Check shown</span>
        <span class="sz-link" onClick=${rvUncheckShown}>Uncheck shown</span>
      </div>
      <div class="cur-listbox">
        <table class="cur-table">
          <thead><tr><th style="width:26px"></th><th>File</th><th>Kind</th><th>Scope</th><th style="text-align:right">Saved</th><th>Structure</th><th>State</th></tr></thead>
          <tbody>
            ${rvVisible.map((r, i) => {
              const st = stOf(r.path);
              const term = st !== 'staged';
              return html`<tr class=${'cur-row' + (term ? ' added' : '')} key=${i}>
                <td>${term ? html`<span class="dim">—</span>` : html`<input type="checkbox" checked=${revChecked.has(r.path)} onChange=${() => rvToggle(r.path)} />`}</td>

// ============================
// Analytics explorer (#210)
// ============================
// The single explorable pivot: metric × group_by × optional stack × chart-type,
// filters, KPI tiles, presets, URL state, CSV export. Renders entirely from the
// /api/v1/analytics response + its framing block (single compute path — the UI
// never re-derives plan-tier rules). Subsumes the cost-by-model / spend-over-
// time / leaderboard charts as presets (#214/#216).
const ANALYTICS_METRICS = [
  ['spend', 'Spend'], ['tokens', 'Tokens'], ['sessions', 'Sessions'], ['events', 'Events'],
];
const ANALYTICS_DIMENSIONS = [
  ['model', 'Model'], ['agent', 'Agent'], ['provider', 'Provider'], ['tool', 'Tool'],
  ['tool_category', 'Tool category'], ['kind', 'Span kind'], ['request_type', 'Request type'],
  ['day', 'Day'],
];
const ANALYTICS_CHARTS = [['bar', 'Bars'], ['line', 'Lines'], ['hbar', 'Leaderboard']];
// Built-in presets (close #214 leaderboard + #216 multi-series as preset views).
const ANALYTICS_PRESETS = [
  { id: 'spend-by-model', label: 'Spend by model', q: { metric: 'spend', group_by: 'model', chart: 'line', stack: '' } },
  { id: 'leaderboard', label: 'Cost leaderboard', q: { metric: 'spend', group_by: 'model', chart: 'hbar', stack: '' } },
  { id: 'tokens-over-time', label: 'Tokens over time', q: { metric: 'tokens', group_by: 'day', chart: 'bar', stack: '' } },
  { id: 'tool-usage', label: 'Tool usage', q: { metric: 'events', group_by: 'tool_category', chart: 'hbar', stack: '' } },
];

// Pivot the analytics rows into a uPlot [xs, ...ys] time-series, one ys per
// top-N group (+ "other"), zero-filled across the window (reuses _windowGrid so
// the x-axis spans the full selected window, #133). `valueOf` picks cost vs
// tokens per plan-tier framing.
function buildAnalyticsSeries(resp, useTokens) {
  if (!resp || !resp.rows) return null;
  const grid = _windowGrid({ ...resp, series: resp.rows });
  if (!grid) return null;
  const { xs, idx, step, bucket, coarsened } = grid;
  const valueOf = r => (useTokens ? (r.tokens || 0) : (r.value || 0));
  // When group_by IS the time dimension (Day), time is already the x-axis, so
  // coloring by the day-bucket key produces a meaningless rainbow with raw epoch
  // legend labels (#227). The colored SERIES then come from stack_by (g2) if
  // present, otherwise a SINGLE series — never one-per-day-bucket.
  const timeGroup = resp.group_by === 'day';
  const keyOf = timeGroup ? (r => r.stack) : (r => r.group);
  const seriesKeys = timeGroup ? (resp.stacks || []) : (resp.groups || []);
  if (!seriesKeys.length) {
    const ys = xs.map(() => 0);
    resp.rows.forEach(r => {
      const b = Math.floor(r.bucket / step) * step;
      if (b in idx) ys[idx[b]] += valueOf(r);
    });
    return { data: [xs, ys], labels: ['Total'], bucket, coarsened, requestedBucket: grid.reqBucket };
  }
  const top = seriesKeys.slice(0, 5);
  const topSet = new Set(top);
  const hasOther = seriesKeys.length > top.length;
  const labels = hasOther ? [...top, 'other'] : [...top];
  const yss = labels.map(() => xs.map(() => 0));
  resp.rows.forEach(r => {
    const b = Math.floor(r.bucket / step) * step; if (!(b in idx)) return;
    const k = keyOf(r);
    const li = topSet.has(k) ? labels.indexOf(k) : (hasOther ? labels.length - 1 : -1);
    if (li >= 0) yss[li][idx[b]] += valueOf(r);
  });
  return { data: [xs, ...yss], labels, bucket, coarsened, requestedBucket: grid.reqBucket };
}

// Collapse the time dimension into per-group totals for the leaderboard (#214):
// sorted desc, each with a fraction-of-max for the inline magnitude bar.
function buildLeaderboard(resp, useTokens) {
  if (!resp || !resp.rows) return null;
  const totals = {};
  resp.rows.forEach(r => { totals[r.group] = (totals[r.group] || 0) + (useTokens ? (r.tokens || 0) : (r.value || 0)); });
  const entries = Object.keys(totals).map(g => ({ group: g, value: totals[g] }))
    .sort((a, b) => b.value - a.value);
  const max = entries.length ? Math.max(...entries.map(e => e.value), 0) : 0;
  entries.forEach(e => { e.frac = max > 0 ? e.value / max : 0; });
  return entries;
}

// CSV from the current pivot — built client-side from the response (offline,
// no server round-trip), downloaded via a Blob object URL.
function analyticsCsv(resp) {
  const framing = resp.framing || {};
  const mode = framing.pricing_mode || 'unknown';
  const monthlyUsd = framing.plan_monthly_usd || 0;

  const hasStack = !!resp.stack_by;

  const head = [
    'bucket_epoch',
    'bucket_iso',
    resp.group_by,
    resp.stack_by || 'stack',
    'cost',
    'cycle_share_pct',
    'input_tokens',
    'output_tokens',
    'cache_read_tokens',
    'cache_write_tokens',
    'sessions',
    'events'
  ];

  const lines = [head.join(',')];

  (resp.rows || []).forEach(r => {
    const iso = new Date(r.bucket * 1000).toISOString();
    const cell = v => { const s = String(v == null ? '' : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };

    const rawCost = r.cost || 0;

    // Route through existing helper rather than inline mode derivation to prevent leaks
    const costVal = perItemUsesTokens(framing) ? '' : String(rawCost);
    
    let cycleShareVal = '';
    if (framing.pricing_mode === 'subscription' && framing.plan_monthly_usd > 0) {
      cycleShareVal = String((rawCost / framing.plan_monthly_usd) * 100.0);
    }

    const rowData = [
      r.bucket,
      iso,
      cell(r.group),
      cell(r.stack),
      costVal,
      cycleShareVal,
      r.input_tokens || 0,
      r.output_tokens || 0,
      r.cache_read_tokens || 0,
      r.cache_write_tokens || 0,
      r.sessions || 0,
      r.events || 0
    ];

    lines.push(rowData.join(','));
  });

  return lines.join('\n');
}

function downloadCsv(filename, text) {
  const blob = new Blob([text], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// `route` lets the pivot live on another screen (the merged Dashboard preview
// reuses it under #/dashboard); `embedded` drops the standalone title + window
// picker so the host screen owns those. Default args preserve the standalone
// #/analytics behavior exactly.
function AnalyticsView({ params, route = 'analytics', embedded = false, kpiCaption = null }) {
  const DEFAULTS = { since: '30d', metric: 'spend', group_by: 'model', stack: '', chart: 'bar',
    agent_id: '', provider: '', model: '', tool: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const metric = readParam(params, 'metric', DEFAULTS.metric, v => ANALYTICS_METRICS.some(m => m[0] === v));
  const groupBy = readParam(params, 'group_by', DEFAULTS.group_by, v => ANALYTICS_DIMENSIONS.some(d => d[0] === v));
  const stack = readParam(params, 'stack', DEFAULTS.stack, v => v === '' || ANALYTICS_DIMENSIONS.some(d => d[0] === v));
  const chart = readParam(params, 'chart', DEFAULTS.chart, v => ANALYTICS_CHARTS.some(c => c[0] === v));
  const fAgent = readParam(params, 'agent_id', '');
  const fProvider = readParam(params, 'provider', '');
  const fModel = readParam(params, 'model', '');
  const fTool = readParam(params, 'tool', '');
  const cur = { since, metric, group_by: groupBy, stack, chart, agent_id: fAgent, provider: fProvider, model: fModel, tool: fTool };
  const setFilter = (k, v) => navigate(route, { ...cur, [k]: v }, DEFAULTS);
  const applyPreset = (q) => navigate(route, { ...cur, ...q }, DEFAULTS);

  // #295: Stack only makes sense on the multi-series charts (bar/line). The
  // Leaderboard (hbar) collapses the time dimension into a single per-group
  // total and ignores stack entirely, so a stale stack there just strands the
  // view on an empty cross-tab ("No data"). Gate it: hide the Stack control AND
  // drop stack_by from the query for non-stacking charts. The chosen stack stays
  // in the URL, so it returns when the user switches back to a bar/line chart.
  const stackApplies = chart === 'bar' || chart === 'line';
  const effStack = stackApplies ? stack : '';

  const [st, setSt] = useState({ loading: true, error: null, resp: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: true, error: null }));
    try {
      const resp = await api('/analytics', {
        metric, group_by: groupBy, stack_by: effStack || undefined, since,
        agent_id: fAgent || undefined, provider: fProvider || undefined,
        model: fModel || undefined, tool: fTool || undefined,
      });
      setSt({ loading: false, error: null, resp });
    } catch (e) { setSt(s => ({ ...s, loading: false, error: e.message || String(e) })); }
  }, [metric, groupBy, stack, chart, since, fAgent, fProvider, fModel, fTool]);

  useEffect(() => {
    setSt(s => ({ ...s, loading: true, error: null }));
    load();
  }, [load]);

  const { loading, error, resp } = st;
  const framing = resp ? resp.framing : null;
  // Plan-tier framing: the spend metric switches to token volume for
  // subscription/local (dollars suppressed) — single source, never re-derived.
  const isSpend = metric === 'spend';
  const useTokens = isSpend && !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const valueIsDollars = isSpend && !useTokens;
  const fmtV = valueIsDollars ? fmtCost : fmtTokens;
  const fmtVal = v => (metric === 'sessions' || metric === 'events') ? fmtTokens(v).replace(/ tokens$/, '') : fmtV(v);
  const axisFmt = valueIsDollars ? fmtAxisUsd : fmtTokens;

  const series = (chart === 'line' || chart === 'bar') ? buildAnalyticsSeries(resp, useTokens) : null;
  const board = chart === 'hbar' ? buildLeaderboard(resp, useTokens) : null;
  const kpis = resp ? resp.kpis : null;
  const filterChips = [['agent_id', fAgent], ['provider', fProvider], ['model', fModel], ['tool', fTool]].filter(x => x[1]);

  const metricSuffix = isSpend ? (useTokens ? ' (tokens)' : '') : '';

  // Tool spans carry no tokens/cost, so grouping spend/tokens BY tool (or tool
  // category) is structurally all-zeros (#268). Rather than render a wall of
  // zeros, show a helpful empty state with a one-click switch to Events.
  const toolDimNoMetric = (groupBy === 'tool' || groupBy === 'tool_category')
    && (metric === 'spend' || metric === 'tokens');

  // #295: a stacked breakdown can be structurally empty even when the metric has
  // plenty of data — e.g. Model × Tool category, since a span is either an LLM
  // call or a tool call, never both. Detect that so we can prompt the user to
  // clear the stack instead of stranding them on a bare "No data" chart. (Only
  // bar/line carry a stack — effStack is '' for the leaderboard.)
  const noRows = !!resp && Array.isArray(resp.rows) && resp.rows.length === 0;
  const emptyFromStack = !!effStack && noRows;
  const labelOf = dim => (ANALYTICS_DIMENSIONS.find(d => d[0] === dim) || [, dim])[1];

  // #313: surface the leaderboard's own total + item count (a ranked list with
  // no sum is confusing), and reconcile the gap when grouping by a PARTIAL
  // dimension — only some spans carry it (e.g. a tool), so the breakdown subtotal
  // is legitimately smaller than the all-events KPI and otherwise looks
  // contradictory. Purely additive: only the leaderboard (hbar) branch reads
  // these; nothing else changes.
  const boardTotal = board ? board.reduce((s, e) => s + (e.value || 0), 0) : 0;
  const boardCount = board ? board.length : 0;
  const dimName = (ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1].toLowerCase();
  const dimNamePlural = (/y$/.test(dimName) && !/[aeiou]y$/.test(dimName)) ? dimName.slice(0, -1) + 'ies' : dimName + 's';
  const countMetric = (metric === 'events' || metric === 'sessions') ? metric : null;
  const kpiCount = (countMetric && kpis) ? kpis[countMetric] : null;
  const boardGap = kpiCount != null && boardTotal > 0 && boardTotal < kpiCount;

  const getFilename = () => {
    if (!resp) return 'tokenjam-analytics.csv';
    const startStr = resp.window_start ? new Date(resp.window_start * 1000).toISOString().split('T')[0] : '';
    const endStr = resp.window_end ? new Date(resp.window_end * 1000).toISOString().split('T')[0] : '';
    return startStr && endStr ? `tokenjam-analytics_${startStr}_${endStr}.csv` : 'tokenjam-analytics.csv';
  };



  return html`
    ${embedded ? null : html`<div class="page-title" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      Analytics <${PlanBadge} framing=${framing} />
    </div>`}

    <div class="filters">
      <label class="ctl">Metric
        <select value=${metric} onChange=${e => setFilter('metric', e.target.value)}>
          ${ANALYTICS_METRICS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      <label class="ctl">By
        <select value=${groupBy} onChange=${e => setFilter('group_by', e.target.value)}>
          ${ANALYTICS_DIMENSIONS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      ${stackApplies ? html`<label class="ctl">Stack
        <select value=${stack} onChange=${e => setFilter('stack', e.target.value)}>
          <option value="">none</option>
          ${ANALYTICS_DIMENSIONS.filter(d => d[0] !== groupBy).map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>` : null}
      <label class="ctl">Chart
        <select value=${chart} onChange=${e => setFilter('chart', e.target.value)}>
          ${ANALYTICS_CHARTS.map(([v, l]) => html`<option value=${v}>${l}</option>`)}
        </select></label>
      ${embedded ? null : html`<select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="24h">Last 24h</option><option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option><option value="90d">Last 90d</option>
      </select>`}
      <button class="btn" onClick=${load}>Refresh</button>
      <button class="btn" onClick=${() => resp && downloadCsv(getFilename(), analyticsCsv(resp))} disabled=${loading}>Export CSV</button>
    </div>

    <div class="filters preset-row">
      <span class="dim" style="font-size:12px">Presets:</span>
      ${ANALYTICS_PRESETS.map(p => html`<button class="btn preset-btn" onClick=${() => applyPreset(p.q)}>${p.label}</button>`)}
      ${filterChips.map(([k, v]) => html`<button class="btn" onClick=${() => setFilter(k, '')}>${k.replace('_id', '')}: ${v} ✕</button>`)}
    </div>

    ${error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load analytics: ${error}</div><button class="btn" onClick=${load}>Retry</button></div>` : null}

    ${!error && framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${!error && kpis ? (() => {
      // The Spend tile follows the server framing block (single source, never
      // re-derived). Under SUBSCRIPTION it shows an implied-value MULTIPLIER
      // ("43.5× plan value", #262) — NOT "% of cycle" and NOT raw tokens (which
      // duplicated the Tokens tile, #247). Its sparkline/delta still track SPEND
      // (cost_usd), since the multiplier is just spend rescaled by the plan fee
      // — so the trend/shape are identical to spend, never raw $. LOCAL / a
      // subscription with no declared fee have no denominator → the tile is
      // dropped rather than duplicate Tokens.
      const deltas = resp.kpi_deltas || {};
      const spend = spendTileDisplay(kpis.spend, framing);
      // A prior window with almost no activity makes period-over-period % a
      // misleading sliver (the ▲1682% on a fresh backfill, #262). Use the prior
      // window's session count as the universal "did anything happen" proxy.
      const prevThin = !!resp.kpi_prev && (resp.kpi_prev.sessions || 0) < 2;
      const onMetric = (k) => setFilter('metric', k);
      // #318: the ACTIVE count-metric tile shows the breakdown subtotal next to
      // the window total when grouping by a PARTIAL dimension (only some spans
      // carry it, e.g. tool), so the window-wide tile reconciles with the smaller
      // chart subtotal. Count metrics only (events/sessions — spend/tokens framing
      // is more complex); only when there's an actual gap.
      const breakdownTotal = (resp.rows || []).reduce((s, r) => s + (r.value || 0), 0);
      const breakdownDim = (ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1].toLowerCase();
      const activeSub = ((metric === 'events' || metric === 'sessions')
        && breakdownTotal > 0 && breakdownTotal < (kpis[metric] || 0))
        ? { value: fmtCount(breakdownTotal), label: `by ${breakdownDim}` } : null;
      const tiles = [];
      if (spend) {
        tiles.push({ key: 'spend', label: spend.label, cost: true, value: spend.value,
          series: kpiSparkValues(resp, 'spend'), delta: deltas.spend });
      }
      tiles.push({ key: 'tokens', label: 'Tokens', cost: false, value: fmtTokens(kpis.tokens),
        series: kpiSparkValues(resp, 'tokens'), delta: deltas.tokens });
      tiles.push({ key: 'sessions', label: 'Sessions', cost: false, value: fmtCount(kpis.sessions),
        series: kpiSparkValues(resp, 'sessions'), delta: deltas.sessions });
      tiles.push({ key: 'events', label: 'Events', cost: false, value: fmtCount(kpis.events),
        series: kpiSparkValues(resp, 'events'), delta: deltas.events });
      return html`
        <div class="kpi-row">
          ${tiles.map(t => html`<${KpiTile} label=${t.label} value=${t.value} active=${t.key === metric}
              series=${t.series} delta=${t.delta == null ? null : t.delta} cost=${t.cost}
              sub=${t.key === metric ? activeSub : null}
              prevThin=${prevThin} onSelect=${() => onMetric(t.key)} />`)}
        </div>
        ${kpiCaption ? html`<div class="kpi-caption">${kpiCaption}</div>` : null}`;
    })() : null}

    ${!error ? html`
      <div class="chart-card" style=${loading ? 'opacity: 0.5; pointer-events: none; transition: opacity 0.2s' : 'transition: opacity 0.2s'}>
        <div class="chart-head">
          <div class="chart-title">${(ANALYTICS_METRICS.find(m => m[0] === metric) || [, metric])[1]} by ${(ANALYTICS_DIMENSIONS.find(d => d[0] === groupBy) || [, groupBy])[1]}${metricSuffix}</div>
        </div>
        ${toolDimNoMetric ? html`
          <div class="empty" style="padding:32px 16px;text-align:center">
            <div style="font-size:13px;margin-bottom:12px">Tools don't carry ${metric === 'spend' ? 'cost' : 'tokens'} — those live on the LLM-call spans, not tool spans.</div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
              <button class="btn" onClick=${() => setFilter('metric', 'events')}>Switch to Events</button>
              <button class="btn" onClick=${() => setFilter('group_by', 'model')}>Group by Model</button>
              <button class="btn" onClick=${() => setFilter('group_by', 'agent')}>Group by Agent</button>
            </div>
          </div>`
          : loading && !resp ? html`<div class="shimmer" style="height:200px"></div>`
          : emptyFromStack ? html`
            <div class="empty" style="padding:32px 16px;text-align:center">
              <div style="font-size:13px;margin-bottom:12px">No rows for ${labelOf(groupBy)} × ${labelOf(effStack)}. That breakdown is empty because a span carries only one of these — e.g. an LLM call has a model but no tool, a tool span has a tool but no model.</div>
              <button class="btn" onClick=${() => setFilter('stack', '')}>Clear stack</button>
            </div>`
          : chart === 'hbar'
            ? (board && board.length ? html`
              <div class="dim" style="font-size:12px;margin:2px 0 8px">Total: ${fmtVal(boardTotal)} · ${boardCount} ${boardCount === 1 ? dimName : dimNamePlural}</div>
              <div class="leaderboard">
                ${board.map((e, i) => {
                  const label = formatGroupLabel(e.group, groupBy);
                  return html`
                  <div class="lb-row">
                    <span class="lb-rank">${i + 1}</span>
                    <span class="lb-name" title=${label}>${label}</span>
                    <span class="lb-bar"><span class="lb-fill" style=${'width:' + (e.frac * 100).toFixed(1) + '%;background:' + colorFor(e.group)}></span></span>
                    <span class="lb-val">${fmtVal(e.value)}</span>
                  </div>`;
                })}
              </div>
              ${boardGap ? html`<div class="chart-foot"><span class="dim">Only ${fmtCount(boardTotal)} of ${fmtCount(kpiCount)} ${countMetric} have a ${dimName} — the rest aren't in this breakdown.</span></div>` : null}
              ` : html`<div class="empty" style="padding:32px 0">No data in this window.</div>`)
            : (series ? html`
              ${chart === 'line'
                ? html`<${SpendChart} data=${series.data} labels=${series.labels} height=${220} fmtY=${fmtV} axisFmtY=${axisFmt} showLegend=${series.labels.length > 1} bucket=${series.bucket} />`
                : html`<${StackedBarChart} data=${series.data} labels=${series.labels} height=${220} fmtY=${fmtV} axisFmtY=${axisFmt} bucket=${series.bucket} />`}
              ${series.coarsened ? html`<div class="chart-foot"><span class="dim">Showing ${series.bucket} buckets — this range is too long for ${series.requestedBucket}ly detail.</span></div>` : null}
            ` : html`<div class="empty" style="padding:32px 0">No data in this window.</div>`)}
      </div>` : null}
  `;
}
