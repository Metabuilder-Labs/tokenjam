function TracesListView({ params }) {
  // Filters come from the URL (issue #112). `result` maps to the API's `status`.
  const DEFAULTS = { since: '24h', result: '', agent_id: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const result = readParam(params, 'result', DEFAULTS.result, v => ['ok', 'error'].includes(v));
  const agentId = readParam(params, 'agent_id', DEFAULTS.agent_id);
  const setFilter = (k, v) => navigate('traces', { since, result, agent_id: agentId, [k]: v }, DEFAULTS);

  const [traces, setTraces] = useState([]);
  const [totalCount, setTotalCount] = useState(0);
  const [framing, setFraming] = useState(null);
  const [agentStatus, setAgentStatus] = useState({});
  const TRACE_PAGE_SIZE = 100;

  const load = useCallback(async ({ append = false } = {}) => {
    const offset = append ? traces.length : 0;
    const [td, sd] = await Promise.all([
      api('/traces', { since, status: result || undefined, agent_id: agentId || undefined, limit: TRACE_PAGE_SIZE, offset }),
      api('/status'),
    ]);
    const nextTraces = td.traces || [];
    setTraces(prev => append ? prev.concat(nextTraces) : nextTraces);
    setTotalCount(td.total_count ?? nextTraces.length);
    setFraming(td.framing || null);
    const map = {};
    for (const a of (sd.agents || [])) map[a.agent_id] = a.status;
    setAgentStatus(map);
  }, [since, result, agentId, traces.length]);

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, [load]);

  return html`
    <div class="page-title">Traces</div>
    <div style="font-size:12px;color:var(--text-dim);margin:-14px 0 16px;font-family:'Geist Mono',monospace">Click on a trace row for details</div>
    <div class="filters">
      <select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="1h">Last 1h</option>
        <option value="24h">Last 24h</option>
        <option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="90d">Last 90d</option>
      </select>
      <select value=${result} onChange=${e => setFilter('result', e.target.value)}>
        <option value="">All results</option>
        <option value="ok">ok</option>
        <option value="error">error</option>
      </select>
      ${agentId ? html`<button class="btn" onClick=${() => setFilter('agent_id', '')}>agent: ${agentId} ✕</button>` : null}
      <button class="btn" onClick=${() => load()}>Refresh</button>
    </div>
    ${traces.length > 0 ? html`<div class="meta">Showing ${traces.length} of ${totalCount} traces</div>` : null}
    ${traces.length === 0 ? html`<div class="empty">No traces yet. Run an agent with ${'`@watch()`'} to start recording.</div>` : html`
      <div class="table-wrap"><table>
        <thead><tr><th>Agent</th><th>Type</th><th>Time</th><th>Duration</th><th>Cost <span class="info-btn">i<span class="info-tip">Estimated from token usage. If you're on a subscription plan (e.g. Claude Max), your actual spend may differ.</span></span></th><th>Result <span class="info-btn">i<span class="info-tip">Shows "error" if even a single span in this trace failed</span></span></th><th>Status <span class="info-btn">i<span class="info-tip">Agent liveness: active (seen in last 5 min), stale (no recent spans), completed or idle</span></span></th><th>Spans</th><th></th></tr></thead>
        <tbody>
          ${dedup(traces).map(t => {
            const st = agentStatus[t.agent_id];
            return html`
            <tr class="clickable" onClick=${() => location.hash = '#/traces/' + t.trace_id} title=${'Trace ' + t.trace_id}>
              <td class="mono">${t.agent_id || '-'}</td>
              <td>${friendlySpanName(t.name)}</td>
              <td>${fmtAgo(t.start_time)}</td>
              <td>${fmtDur(t.duration_ms)}</td>
              <td>${fmtPerItemCost(t.cost_usd, _costVal(t, true), framing)}</td>
              <td><span class="badge badge-${t.status_code}">${t.status_code}</span></td>
              <td>${st ? html`<span class="status-dot ${st}" style="margin-right:5px"></span><span class="badge badge-${st}">${st}</span>` : html`<span style="color:var(--text-dim)">-</span>`}</td>
              <td>${t.span_count}</td>
              <td class="chevron">\u2192</td>
            </tr>
          `})}
        </tbody>
      </table></div>
      ${traces.length < totalCount ? html`<button class="btn" onClick=${() => load({ append: true })}>Load more</button>` : null}
    `}
  `;
}

function dedup(traces) {
  const seen = new Set();
  return traces.filter(t => {
    if (seen.has(t.trace_id)) return false;
    seen.add(t.trace_id);
    return true;
  });
}

// ============================
// Trace Detail + Waterfall
// ============================
function TraceDetailView({ traceId }) {
  const [spans, setSpans] = useState([]);
  const [framing, setFraming] = useState(null);
  const [selected, setSelected] = useState(null);
  // Waterfall bar-sizing mode (#244): cost / tokens / duration. null = follow
  // the framing-derived default (cost for api/unknown, tokens when $ suppressed).
  const [wfMode, setWfMode] = useState(null);

  useEffect(() => {
    api('/traces/' + traceId).then(d => { setSpans(d.spans || []); setFraming(d.framing || null); });
  }, [traceId]);

  if (!spans.length) return html`<div class="empty">Loading trace...</div>`;

  // Build tree
  const byId = {};
  spans.forEach(s => byId[s.span_id] = s);
  const children = {};
  spans.forEach(s => {
    const pid = s.parent_span_id || '__root__';
    (children[pid] = children[pid] || []).push(s);
  });
  const spanIds = new Set(spans.map(s => s.span_id));
  const roots = spans.filter(s => !s.parent_span_id || !spanIds.has(s.parent_span_id));

  // Timeline bounds
  const times = spans.map(s => new Date(s.start_time).getTime()).filter(t => !isNaN(t));
  const endTimes = spans.map(s => s.end_time ? new Date(s.end_time).getTime() : new Date(s.start_time).getTime() + (s.duration_ms || 0)).filter(t => !isNaN(t));
  const traceStart = Math.min(...times);
  const traceEnd = Math.max(...endTimes);
  const traceDur = traceEnd - traceStart || 1;

  // Flatten tree for rendering
  function flatten(nodeList, depth) {
    let result = [];
    for (const s of (nodeList || [])) {
      result.push({ span: s, depth });
      result = result.concat(flatten(children[s.span_id], depth + 1));
    }
    return result;
  }
  const rows = flatten(roots, 0);
  const nameW = 220;

  // Cost-first annotation (#215). Plan-tier framing: when dollars are suppressed
  // (subscription/local), the magnitude bar + summary read on TOKEN volume, never
  // raw spend — the suppression decision comes from the server framing block, not
  // re-derived here. Tokens are never suppressed, so they always annotate.
  const spanTokens = s => (s.input_tokens || 0) + (s.output_tokens || 0) + (s.cache_tokens || 0) + (s.cache_write_tokens || 0);
  const wfUseTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const wfMagOf = s => wfUseTokens ? spanTokens(s) : (s.cost_usd || 0);
  const wfMaxMag = Math.max(0, ...rows.map(r => wfMagOf(r.span)));

  // #244 bar sizing: cost-first by default (the differentiator + the only mode
  // that works on duration-less backfilled spans), with a tokens/duration
  // toggle. Cost is never offered when $ is suppressed — tokens leads there.
  const wfDefaultMode = wfUseTokens ? 'tokens' : 'cost';
  const wfMode2 = wfMode || wfDefaultMode;
  const wfHasDuration = rows.some(r => r.span.duration_ms != null && r.span.duration_ms > 0);
  const magForMode = s => wfMode2 === 'duration' ? (s.duration_ms || 0)
    : wfMode2 === 'tokens' ? spanTokens(s) : (s.cost_usd || 0);
  const maxMagMode = Math.max(0, ...rows.map(r => magForMode(r.span)));

  const wfTotalCost = spans.reduce((a, s) => a + (s.cost_usd || 0), 0);
  const wfTotalTokens = spans.reduce((a, s) => a + spanTokens(s), 0);
  // A single trace's total is per-item, not a window aggregate (#249) — render
  // it as in+out TOKENS for subscription/local, dollars for api/unknown. ("% of
  // cycle" for one trace is the same category error as the per-row cells.)
  const wfTotalInOut = spans.reduce((a, s) => a + _costVal(s, true), 0);
  const wfTotalCostFramed = fmtPerItemCost(wfTotalCost, wfTotalInOut, framing);

  const sel = selected ? spans.find(s => s.span_id === selected) : null;

  // Determine agent name from root span
  const rootSpan = roots.length ? roots[0] : spans[0];
  const agentName = rootSpan ? (rootSpan.agent_id || traceId.slice(0, 12)) : traceId.slice(0, 12);

  return html`
    <button class="btn btn-back" onClick=${() => location.hash = '#/traces'}>\u2190 Back to traces</button>
    <div class="page-title">Trace details for ${agentName}</div>
    <div style="font-size:12px;color:var(--text-dim);margin:-14px 0 16px;font-family:'Geist Mono',monospace">Click a span for details</div>
    <div class="wf-summary">
      <span>Total cost <b>${wfTotalCostFramed}</b></span>
      <span>Tokens <b>${fmtTokens(wfTotalTokens)}</b></span>
      <span>Duration <b>${fmtDur(traceDur)}</b></span>
      <span>Started <b>${isFinite(traceStart) ? new Date(traceStart).toLocaleString() : '—'}</b></span>
      <span><b>${spans.length}</b> spans</span>
    </div>
    <div class="wf-toolbar">
      <div class="wf-legend">
        <span><i class="wf-kind-dot llm"></i>LLM</span>
        <span><i class="wf-kind-dot tool"></i>Tool</span>
        <span><i class="wf-kind-dot agent"></i>Agent</span>
        <span><i class="wf-kind-dot other"></i>Other</span>
      </div>
      <div class="view-toggle">
        ${!wfUseTokens ? html`<button class=${wfMode2 === 'cost' ? 'active' : ''} onClick=${() => setWfMode('cost')}>By cost</button>` : null}
        <button class=${wfMode2 === 'tokens' ? 'active' : ''} onClick=${() => setWfMode('tokens')}>By tokens</button>
        <button class=${wfMode2 === 'duration' ? 'active' : ''} onClick=${() => setWfMode('duration')} title=${wfHasDuration ? '' : 'Backfilled spans have no latency — bars will be flat'}>By duration</button>
      </div>
    </div>
    <div class="wf-head">
      <div class="wf-name" style="width:${nameW}px;padding-left:8px">Span</div>
      <div class="wf-track">${wfMode2 === 'duration' ? 'Timeline' : ('Magnitude · by ' + wfMode2)}</div>
      <div class="wf-offset">Offset</div>
      <div class="wf-cost">Cost / tokens</div>
    </div>
    <div class="waterfall">
      ${rows.map(({ span: s, depth }) => {
        const st = new Date(s.start_time).getTime() - traceStart;
        const kind = spanKindClass(s.name);
        const friendly = friendlySpanName(s.name);
        const primaryName = spanPrimaryName(s);
        const isError = (s.status_code || '') === 'error';
        // #244 bar geometry. Duration mode keeps the classic time-positioned bar;
        // cost/tokens modes draw a left-anchored magnitude bar (the only thing
        // that renders on duration-less backfill data). A minimum width keeps
        // tiny spans visible/clickable.
        let left, width;
        if (wfMode2 === 'duration') {
          left = (st / traceDur * 100);
          width = Math.max((s.duration_ms || 0) / traceDur * 100, 1.5);
        } else {
          left = 0;
          width = maxMagMode > 0 ? Math.max(magForMode(s) / maxMagMode * 100, 1.5) : 1.5;
        }
        left = Math.max(0, Math.min(left, 98.5));
        width = Math.max(1.5, Math.min(width, 100 - left));
        const barEnd = left + width;
        const valFlip = barEnd > 72;
        // Plan-tier framed cost (#187): subscription \u2192 "% of cycle", local
        // \u2192 "\u2014" (suppressed), api/unknown \u2192 "$X".
        const costFramed = fmtFramedDollar(s.cost_usd, framing);
        // Per-SPAN cost is per-item (#249): "% of cycle" is nonsensical at this
        // granularity, and the token column already conveys per-span magnitude,
        // so only show the $ value for api/unknown.
        const costShown = !wfUseTokens && s.cost_usd != null && s.cost_usd > 0 && costFramed !== '\u2014';
        const sTok = spanTokens(s);
        const wfFrac = wfMaxMag > 0 ? (wfMagOf(s) / wfMaxMag * 100) : 0;
        // Value printed past the bar end reflects the active mode. Duration is
        // "\u2014" with a "not captured in backfilled data" hint when absent (#243).
        const durMissing = wfMode2 === 'duration' && s.duration_ms == null;
        const valLabel = wfMode2 === 'duration'
          ? (durMissing ? '\u2014' : fmtDur(s.duration_ms))
          : wfMode2 === 'tokens'
            ? (sTok ? fmtTokens(sTok) : '')
            : (costShown ? costFramed : '');
        const valTitle = durMissing ? 'Duration not captured in backfilled data' : '';
        const absStart = isFinite(traceStart) && s.start_time ? new Date(s.start_time).toLocaleString() : '';
        const offsetLabel = '+' + fmtDur(st);
        const tipLines = [friendly];
        tipLines.push('Status: ' + (s.status_code || 'unset'));
        tipLines.push('Offset: ' + offsetLabel + (absStart ? ' (' + absStart + ')' : ''));
        tipLines.push('Duration: ' + (s.duration_ms == null ? '\u2014 (not captured in backfill)' : fmtDur(s.duration_ms)));
        if (s.provider) tipLines.push('Provider: ' + s.provider);
        if (s.model) tipLines.push('Model: ' + s.model);
        if (s.tool_name) tipLines.push('Tool: ' + s.tool_name);
        if (s.input_tokens != null) tipLines.push('Input tokens: ' + fmtTokens(s.input_tokens));
        if (s.output_tokens != null) tipLines.push('Output tokens: ' + fmtTokens(s.output_tokens));
        if (s.cache_tokens) tipLines.push('Cache read: ' + fmtTokens(s.cache_tokens));
        if (s.cache_write_tokens) tipLines.push('Cache write: ' + fmtTokens(s.cache_write_tokens));
        if (!wfUseTokens && s.cost_usd != null && costFramed !== '\u2014') tipLines.push('Cost: ' + costFramed);
        const tooltip = tipLines.join('\n');
        return html`
          <div class="wf-row ${selected === s.span_id ? 'selected' : ''}" onClick=${() => setSelected(s.span_id)}>
            <div class="wf-name" style="width:${nameW}px;padding-left:${depth * 16 + 8}px">
              <span class="wf-status ${isError ? 'error' : 'ok'}" title=${isError ? 'error' : 'ok'}>${isError ? '\u2715' : '\u2713'}</span>
              <span class="wf-kind-dot ${kind}"></span>
              <span class="wf-name-txt" title=${primaryName}>${primaryName}</span>
            </div>
            <div class="wf-track">
              <div class="wf-bar-wrap${valFlip ? ' tip-flip' : ''}" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%">
                <div class="wf-bar ${kind}" style="width:100%"></div>
                <div class="wf-tip">${tooltip}</div>
              </div>
              ${valLabel ? html`<span class="wf-val ${valFlip ? 'flip' : ''}" title=${valTitle} style=${valFlip ? ('right:' + (100 - barEnd).toFixed(2) + '%') : ('left:' + barEnd.toFixed(2) + '%')}>${valLabel}</span>` : null}
            </div>
            <div class="wf-offset" title=${absStart}>${offsetLabel}</div>
            <div class="wf-cost">
              <div class="wf-cost-bar"><div class="wf-cost-fill" style="width:${wfFrac.toFixed(1)}%"></div></div>
              <span class="wf-cost-val">${costShown ? costFramed : ''}</span>
              <span class="wf-cost-tok">${sTok ? fmtTokens(sTok) : ''}</span>
            </div>
          </div>
        `;
      })}
    </div>
    ${sel ? html`
      <div class="span-detail">
        <h3>${friendlySpanName(sel.name)}</h3>
        <div style="color:var(--text-dim);font-size:11px;margin:-8px 0 12px;font-family:'Geist Mono',monospace">${sel.name}</div>
        <div class="detail-grid">
          <span class="dk">Duration</span><span class="dv">${fmtDur(sel.duration_ms)}</span>
          <span class="dk">Status</span><span class="dv">${sel.status_code}</span>
          <span class="dk">Span ID</span><span class="dv">${sel.span_id}</span>
          ${sel.provider ? html`<span class="dk">Provider</span><span class="dv">${sel.provider}</span>` : null}
          ${sel.model ? html`<span class="dk">Model</span><span class="dv">${sel.model}</span>` : null}
          ${sel.tool_name ? html`<span class="dk">Tool</span><span class="dv">${sel.tool_name}</span>` : null}
          ${sel.input_tokens != null ? html`<span class="dk">Input tokens</span><span class="dv">${fmtTokens(sel.input_tokens)}</span>` : null}
          ${sel.output_tokens != null ? html`<span class="dk">Output tokens</span><span class="dv">${fmtTokens(sel.output_tokens)}</span>` : null}
          ${sel.cache_tokens ? html`<span class="dk">Cache read</span><span class="dv">${fmtTokens(sel.cache_tokens)}</span>` : null}
          ${sel.cache_write_tokens ? html`<span class="dk">Cache write</span><span class="dv">${fmtTokens(sel.cache_write_tokens)}</span>` : null}
          ${sel.cost_usd != null ? html`<span class="dk">Cost</span><span class="dv">${fmtPerItemCost(sel.cost_usd, _costVal(sel, true), framing)}</span>` : null}
          ${sel.agent_id ? html`<span class="dk">Agent</span><span class="dv">${sel.agent_id}</span>` : null}
          ${sel.conversation_id ? html`<span class="dk">Conversation</span><span class="dv">${sel.conversation_id}</span>` : null}
          ${sel.session_id ? html`<span class="dk">Session</span><span class="dv">${sel.session_id}</span>` : null}
          <span class="dk">Trace ID</span><span class="dv">${sel.trace_id}</span>
          ${sel.attributes && Object.keys(sel.attributes).length > 0 ? html`
            <span class="dk">Attributes</span><span class="dv"><pre style="margin:0;white-space:pre-wrap;font-size:11px">${JSON.stringify(sel.attributes, null, 2)}</pre></span>
          ` : null}
        </div>
      </div>
    ` : null}
  `;
}

// ============================
// Cost View
// ============================
// Render a dollar value with the server-decided plan-tier framing (#110). The
// rule (which mode) is server-side; this only formats per that decision —
// mirrors core/framing.render_dollar.
function fmtFramedDollar(v, framing) {
  if (!framing) return fmtCost(v);
  const m = framing.pricing_mode;
  if (m === 'local') return '—';
  if (m === 'subscription') {
    return framing.plan_monthly_usd ? (100 * v / framing.plan_monthly_usd).toFixed(1) + '% of cycle' : '—';
  }
  return fmtCost(v); // api / unknown
}

// Per-ITEM (per-row) cost rendering (#249). "% of cycle" is a WINDOW-LEVEL
// aggregate concept — applying it to a single trace / agent / span produces
// nonsense like "466.7% of cycle". So at per-item granularity, subscription /
// local users see the row's TOKEN total (the same in+out basis as the Cost
// table's "Cost (tokens)" column via _costVal), while api / unknown users keep
// dollars unchanged. WINDOW-LEVEL totals + headlines still use fmtFramedDollar.
// `tokenTotal` must be a server-provided per-row figure (single compute path) —
// the /traces and /status payloads carry input_tokens/output_tokens per row.
function perItemUsesTokens(framing) {
  return !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
}
function fmtPerItemCost(costUsd, tokenTotal, framing) {
  if (perItemUsesTokens(framing)) return fmtTokens(tokenTotal || 0) + ' tok';
  return fmtFramedDollar(costUsd, framing); // api / unknown → dollars
}

// Integer count with thousand separators (#262): "23954" → "23,954". For the
// Sessions / Events KPI tiles, which are exact counts (not abbreviated like
// fmtTokens "23.9k").
function fmtCount(n) {
  if (n == null) return '0';
  return Math.round(n).toLocaleString('en-US');
}

// The Spend KPI tile under plan-tier framing (#262). For SUBSCRIPTION, the
// confusing "% of cycle" is replaced by an honest implied-value MULTIPLIER —
// "43.5× plan value" (implied API value ÷ the plan's monthly fee, which is just
// the "% of cycle" number ÷ 100). It is plan VALUE, never "spent $X". api /
// unknown keep dollars. LOCAL (no plan fee) and a subscription with no declared
// monthly fee have no denominator, so the tile is dropped — the Tokens tile
// already conveys volume. Returns {label, value} or null (drop the tile).
function spendTileDisplay(spendUsd, framing) {
  const mode = framing && framing.pricing_mode;
  if (mode === 'subscription') {
    if (!framing.plan_monthly_usd) return null;          // no fee → no multiplier
    const mult = (spendUsd || 0) / framing.plan_monthly_usd;  // == (% of cycle) / 100
    return { label: 'Implied value', value: mult.toFixed(1) + '× plan value' };
  }
  if (mode === 'local') return null;                     // no plan fee to multiply against
  return { label: 'Spend', value: fmtCost(spendUsd) };   // api / unknown → dollars
}

// Positive plan-tier chip(s) from the server `framing` block (#110). Distinct from
// the warning `qualifier` banner — confirms api / subscription / local mode.
function PlanBadge({ framing }) {
  if (!framing || framing.pricing_mode === 'unknown') return null;
  const labels = (framing.plan_labels && framing.plan_labels.length)
    ? framing.plan_labels
    : (framing.plan_label ? [framing.plan_label] : []);
  if (!labels.length) return null;
  return html`${labels.map(l => html`
    <span class="plan-badge" title="Billing mode from your tj config">${l}</span>
  `)}`;
}

// Trend chip: ▲ (up, red) / ▼ (down, green) with a percentage.
function TrendChip({ pct }) {
  if (pct == null) return null;
  const up = pct > 0;
  const arrow = pct === 0 ? '·' : up ? '▲' : '▼';
  const color = pct === 0 ? 'var(--text-dim)' : up ? 'var(--error)' : 'var(--success)';
  return html`<span class="trend-chip" style="color:${color}">${arrow} ${Math.abs(pct).toFixed(1)}% vs prev</span>`;
}

// Signed period-over-period delta chip for KPI tiles (#217). `cost`=true uses
// the spend semantic (up = red/attention, down = green); volume metrics
// (tokens/sessions/events) stay neutral — more isn't inherently "bad".
function DeltaChip({ pct, cost, prevThin }) {
  if (pct == null) return null;
  // Soften a delta computed against a near-empty prior window (#262): a fresh
  // backfill makes the prior period a sliver of data, so the % (e.g. ▲1682%) is
  // arithmetic noise, not a trend. Suppress the alarming number and annotate.
  if (prevThin) {
    return html`<span class="delta-chip" style="color:var(--text-dim)"
      title="The prior window has little data, so a percentage change would be misleading.">vs partial prior window</span>`;
  }
  const up = pct > 0;
  const arrow = pct === 0 ? '·' : up ? '▲' : '▼';
  const color = cost
    ? (pct === 0 ? 'var(--text-dim)' : up ? 'var(--error)' : 'var(--success)')
    : 'var(--text-dim)';
  return html`<span class="delta-chip" style="color:${color}">${arrow} ${Math.abs(pct).toFixed(1)}% vs prev</span>`;
}

// Inline-SVG sparkline (#217) — lightweight + offline; avoids spinning up a
// uPlot instance per KPI tile. `values` is a numeric series (already in the
// plan-tier-appropriate unit chosen by the caller). Draws a normalized polyline
// over a faint area fill.
function Sparkline({ values, color = 'var(--accent)', width = 92, height = 26 }) {
  const vs = (values || []).filter(v => typeof v === 'number' && !isNaN(v));
  if (vs.length < 2) return html`<div class="spark-empty" style=${'width:' + width + 'px;height:' + height + 'px'}></div>`;
  const max = Math.max(...vs), min = Math.min(...vs);
  const span = (max - min) || 1;
  const n = vs.length;
  const px = i => (i / (n - 1)) * width;
  const py = v => height - ((v - min) / span) * (height - 4) - 2;
  const line = vs.map((v, i) => px(i).toFixed(1) + ',' + py(v).toFixed(1)).join(' ');
  const area = 'M0,' + height + ' L' + vs.map((v, i) => px(i).toFixed(1) + ',' + py(v).toFixed(1)).join(' L') + ' L' + width.toFixed(1) + ',' + height + ' Z';
  return html`<svg class="spark" width=${width} height=${height} viewBox=${'0 0 ' + width + ' ' + height} preserveAspectRatio="none">
    <path d=${area} fill=${color} opacity="0.13"></path>
    <polyline points=${line} fill="none" stroke=${color} stroke-width="1.5"></polyline>
  </svg>`;
}

// A trend-aware KPI tile (#217): value + sparkline + signed delta. The caller
// passes series/delta already in the right unit (token-share for a suppressed
// Spend tile), so framing is decided once upstream — never re-derived here.
// `onSelect` makes the tile the metric selector (#247): the kpi-active border
// already implied it was clickable; wiring onClick fulfills that. Falls back to
// a static tile when no handler is given.
function KpiTile({ label, value, active, series, delta, cost, prevThin, onSelect, sub = null }) {
  const cls = 'kpi-tile' + (active ? ' kpi-active' : '') + (onSelect ? ' kpi-clickable' : '');
  const props = onSelect
    ? { class: cls, role: 'button', tabindex: '0', 'aria-pressed': String(!!active),
        onClick: onSelect,
        onKeyDown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelect(); } } }
    : { class: cls };
  // #318: optional secondary line — the breakdown subtotal on the active tile
  // when grouping by a partial dimension (defaults null, so other callers are
  // unaffected).
  return html`<div ...${props}>
    <div class="kpi-top">
      <div class="kpi-num"><div class="kpi-val">${value}</div><div class="kpi-lab">${label}</div>${sub ? html`<div class="kpi-sub"><span class="kpi-sub-val">${sub.value}</span><span class="kpi-sub-lab">${sub.label}</span></div>` : null}</div>
      <${Sparkline} values=${series} />
    </div>
    <${DeltaChip} pct=${delta} cost=${cost} prevThin=${prevThin} />
  </div>`;
}

// Zero-filled per-bucket values for one KPI metric from the analytics
// `kpi_series` (server-computed; the UI never aggregates per-bucket — single
// compute path). Spans the full window via the shared grid so the sparkline
// shape matches the chart's window.
function kpiSparkValues(resp, metric) {
  const grid = _windowGrid({ ...resp, series: resp.kpi_series });
  if (!grid) return (resp.kpi_series || []).map(b => b[metric] || 0);
  const { xs, idx, step } = grid;
  const ys = xs.map(() => 0);
  (resp.kpi_series || []).forEach(b => {
    const t = Math.floor(b.bucket / step) * step;
    if (t in idx) ys[idx[t]] += (b[metric] || 0);
  });
  return ys;
}

// Build a uPlot [xs, ys...] series from day-grouped cost rows. `mode` is
// total | model | agent; `useTokens` swaps cost for token volume (subscription
// / local framing where dollars are suppressed). Splits keep the top-5 keys
// plus an "other" bucket.
function _costVal(r, useTokens) {
  return useTokens ? ((r.input_tokens || 0) + (r.output_tokens || 0)) : (r.cost_usd || 0);
}

// Build a uPlot [xs, ys...] series from a /cost response. The x-axis spans the
// FULL selected window (zero-filled across empty buckets) so 7d/30d/90d look
// distinct and idle periods show as $0 (#133). `resp` carries epoch-second
// `series` buckets, `series_bucket` ('hour'|'day'), and `window_start/end`.
// Upper bound on grid points handed to uPlot. Past this the chart coarsens its
// bucket (hour->day->week) rather than returning null and rendering an empty
// state (#139) — graceful degradation, never silent truncation.
const MAX_BUCKETS = 5000;
const _BUCKET_LADDER = [['hour', 3600], ['day', 86400], ['week', 604800]];

function buildCostSeries(resp, mode, useTokens) {
  const rows = (resp && resp.series) || [];
  const reqBucket = (resp && resp.series_bucket) || 'day';
  let start = resp && resp.window_start;
  let end = resp && resp.window_end;
  if (start == null || end == null) {
    if (!rows.length) return null;  // genuinely no data -> "No spend" empty state
    const bs = rows.map(r => r.bucket);
    start = Math.min(...bs); end = Math.max(...bs);
  }
  if (!(end >= start)) return null;
  // Pick the FINEST bucket (starting from the server-requested one) whose grid
  // stays within MAX_BUCKETS. Long windows (or future finer bucketing) coarsen
  // up the ladder instead of silently emptying the chart (#139). Counting is
  // closed-form so we never build an oversized array just to discard it.
  let reqIdx = _BUCKET_LADDER.findIndex(b => b[0] === reqBucket);
  if (reqIdx < 0) reqIdx = 1;  // unknown bucket name -> treat as daily
  let bucket = _BUCKET_LADDER[reqIdx][0], step = _BUCKET_LADDER[reqIdx][1];
  for (let i = reqIdx; i < _BUCKET_LADDER.length; i++) {
    const s = _BUCKET_LADDER[i][1];
    const count = (Math.floor(end / s) - Math.floor(start / s)) + 1;
    bucket = _BUCKET_LADDER[i][0]; step = s;
    if (count <= MAX_BUCKETS) break;  // fits; coarsest is kept if none do
  }
  const coarsened = bucket !== reqBucket;
  // Align bounds to bucket boundaries and build the full grid.
  start = Math.floor(start / step) * step;
  end = Math.floor(end / step) * step;
  const xs = [];
  for (let t = start; t <= end; t += step) xs.push(t);
  const idx = {}; xs.forEach((t, i) => { idx[t] = i; });
  const bucketOf = r => Math.floor(r.bucket / step) * step;
  if (mode === 'total') {
    const ys = xs.map(() => 0);
    rows.forEach(r => { const b = bucketOf(r); if (b in idx) ys[idx[b]] += _costVal(r, useTokens); });
    return { data: [xs, ys], labels: ['Total'], bucket, coarsened, requestedBucket: reqBucket };
  }
  const keyOf = mode === 'model' ? (r => r.model || '(none)') : (r => r.agent_id || '(none)');
  const totals = {};
  rows.forEach(r => { const k = keyOf(r); totals[k] = (totals[k] || 0) + _costVal(r, useTokens); });
  const top = Object.keys(totals).sort((a, b) => totals[b] - totals[a]).slice(0, 5);
  const topSet = new Set(top);
  const hasOther = Object.keys(totals).length > top.length;
  const labels = hasOther ? [...top, 'other'] : [...top];
  const yss = labels.map(() => xs.map(() => 0));
  rows.forEach(r => {
    const k = keyOf(r); const b = bucketOf(r);
    if (!(b in idx)) return;
    const li = topSet.has(k) ? labels.indexOf(k) : (hasOther ? labels.length - 1 : -1);
    if (li >= 0) yss[li][idx[b]] += _costVal(r, useTokens);
  });
  return { data: [xs, ...yss], labels, bucket, coarsened, requestedBucket: reqBucket };
}

// Shared window grid from a series response (epoch `window_start/end` +
// `series_bucket`). Returns the zero-filled bucket xs + an index map, coarsening
// up the bucket ladder past MAX_BUCKETS (#139). Used by the cache-savings chart
// (#212); buildCostSeries keeps its own inline copy for the stacked cost chart.
function _windowGrid(resp) {
  const rows = (resp && resp.series) || [];
  const reqBucket = (resp && resp.series_bucket) || 'day';
  let start = resp && resp.window_start, end = resp && resp.window_end;
  if (start == null || end == null) {
    if (!rows.length) return null;
    const bs = rows.map(r => r.bucket); start = Math.min(...bs); end = Math.max(...bs);
  }
  if (!(end >= start)) return null;
  let reqIdx = _BUCKET_LADDER.findIndex(b => b[0] === reqBucket); if (reqIdx < 0) reqIdx = 1;
  let bucket = _BUCKET_LADDER[reqIdx][0], step = _BUCKET_LADDER[reqIdx][1];
  for (let i = reqIdx; i < _BUCKET_LADDER.length; i++) {
    const s = _BUCKET_LADDER[i][1];
    const count = (Math.floor(end / s) - Math.floor(start / s)) + 1;
    bucket = _BUCKET_LADDER[i][0]; step = s;
    if (count <= MAX_BUCKETS) break;
  }
  const coarsened = bucket !== reqBucket;
  start = Math.floor(start / step) * step; end = Math.floor(end / step) * step;
  const xs = []; for (let t = start; t <= end; t += step) xs.push(t);
  const idx = {}; xs.forEach((t, i) => { idx[t] = i; });
  return { xs, idx, step, bucket, coarsened, reqBucket };
}

// Build the redesigned cache-savings view (#246) from a /cost/cache response.
// Leads with the answer instead of three overlaid series: PER-PERIOD savings
// bars are the one chart (not a cumulative ramp), the overall hit-rate is a
// headline stat (+ a tiny sparkline for trend, NOT an overlaid axis line), and
// the "recoverable (est.)" overlay is gone (noise here; it lives on Optimize).
// `useTokens` (subscription/local) swaps captured $ for cached-token volume.
function buildCacheSeries(resp, useTokens) {
  const grid = _windowGrid(resp); if (!grid) return null;
  const { xs, idx, step, bucket } = grid;
  const rows = (resp && resp.series) || [];
  const sav = xs.map(() => 0), read = xs.map(() => 0), inp = xs.map(() => 0);
  rows.forEach(r => {
    const b = Math.floor(r.bucket / step) * step; if (!(b in idx)) return;
    const i = idx[b];
    sav[i] += useTokens ? (r.captured_tokens || 0) : (r.captured_usd || 0);
    read[i] += r.cache_read_tokens || 0; inp[i] += r.input_tokens || 0;
  });
  // Per-bucket hit-rate feeds the small sparkline; the headline stat is the
  // overall window ratio (cached reads / all input reads).
  const hitSpark = xs.map((_, i) => { const d = read[i] + inp[i]; return d > 0 ? (100 * read[i] / d) : 0; });
  const totRead = read.reduce((a, b) => a + b, 0), totInp = inp.reduce((a, b) => a + b, 0);
  const hitRate = (totRead + totInp) > 0 ? (100 * totRead / (totRead + totInp)) : 0;
  return { data: [xs, sav], hitSpark, hitRate, bucket, coarsened: grid.coarsened };
}

function CostView({ params }) {
  const DEFAULTS = { since: '7d', group_by: 'total', agent_id: '' };
  const since = readParam(params, 'since', DEFAULTS.since, validSince);
  const groupBy = readParam(params, 'group_by', DEFAULTS.group_by,
    v => ['total', 'model', 'agent'].includes(v));
  const agentId = readParam(params, 'agent_id', DEFAULTS.agent_id);
  const setFilter = (k, v) => navigate('cost', { since, group_by: groupBy, agent_id: agentId, [k]: v }, DEFAULTS);

  const [st, setSt] = useState({ loading: true, error: null, rows: [], total: 0,
    totalTokens: 0, framing: null, costResp: null, compare: null, cacheResp: null });

  const load = useCallback(async () => {
    setSt(s => ({ ...s, loading: s.rows.length === 0, error: null }));
    try {
      const tableGroup = groupBy === 'total' ? 'day' : groupBy;
      // One /cost call returns the grouped table `rows` + the daily `series`
      // (per date+agent+model) the chart needs + framing + totals (#113).
      const d = await api('/cost', { since, group_by: tableGroup, agent_id: agentId || undefined });
      let compare = null;
      try {
        compare = await api('/cost/compare', { since, compare: 'previous', agent_id: agentId || undefined });
      } catch (_) { compare = null; }
      // Cache-savings series (#212). Best-effort: a failure here must not blank
      // the cost screen, so it falls back to null (card renders nothing).
      let cacheResp = null;
      try {
        cacheResp = await api('/cost/cache', { since, agent_id: agentId || undefined });
      } catch (_) { cacheResp = null; }
      const totalTokens = d.total_tokens != null
        ? d.total_tokens
        : (d.rows || []).reduce((s, r) => s + (r.input_tokens || 0) + (r.output_tokens || 0), 0);
      setSt({ loading: false, error: null, rows: d.rows || [], total: d.total_cost_usd || 0,
        totalTokens, framing: d.framing || null, costResp: d, compare, cacheResp });
    } catch (e) {
      setSt(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, [since, groupBy, agentId]);

  useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, [load]);

  const { loading, error, rows, total, totalTokens, framing, costResp, compare, cacheResp } = st;
  const useTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  const series = buildCostSeries(costResp, groupBy, useTokens);
  const fmtY = useTokens ? fmtTokens : fmtCost;
  const cacheSeries = buildCacheSeries(cacheResp, useTokens);

  // Run-rate (total view only): per-day average over the FULL window length
  // (not the data range — #129), projected to the end of the billing cycle
  // (#134/#138), drawn as a dashed line. Single linear figure, no forecasting.
  const cyc = cycleRemaining(costResp && costResp.cycle);
  let runRate = null, projection = null;
  if (groupBy === 'total' && series && series.data[1] && series.data[1].length) {
    const windowTotal = useTokens ? totalTokens : total;
    runRate = runRateProjection(windowTotal, since, 1);  // per-day average (single windowDays source)
    const projected = runRate * cyc.days;
    projection = useTokens ? (fmtTokens(Math.round(projected)) + ' tokens') : fmtFramedDollar(projected, framing);
  }

  const trendPct = compare ? (useTokens ? compare.tokens_delta_pct : compare.cost_delta_pct) : null;
  const totalDisplay = useTokens ? (fmtTokens(totalTokens) + ' tokens') : fmtFramedDollar(total, framing);
  const tableMode = groupBy === 'total' ? 'day' : groupBy;
  const totalIn = rows.reduce((s, r) => s + (r.input_tokens || 0), 0);
  const totalOut = rows.reduce((s, r) => s + (r.output_tokens || 0), 0);

  return html`
    <div class="page-title" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      Cost <${PlanBadge} framing=${framing} />
    </div>
    <div class="filters">
      <select value=${since} onChange=${e => setFilter('since', e.target.value)}>
        <option value="24h">Last 24h</option>
        <option value="7d">Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="90d">Last 90d</option>
      </select>
      <select value=${groupBy} onChange=${e => setFilter('group_by', e.target.value)}>
        <option value="total">Total</option>
        <option value="model">By model</option>
        <option value="agent">By agent</option>
      </select>
      ${agentId ? html`<button class="btn" onClick=${() => setFilter('agent_id', '')}>agent: ${agentId} ✕</button>` : null}
      <button class="btn" onClick=${load}>Refresh</button>
    </div>

    ${error ? html`
      <div class="chart-card" style="border-color:var(--error)">
        <div style="color:var(--error);font-size:13px;margin-bottom:10px">Couldn't load cost data: ${error}</div>
        <button class="btn" onClick=${load}>Retry</button>
      </div>` : null}

    ${!error && framing && framing.qualifier_text ? html`
      <div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${!error ? html`
      <div class="chart-card">
        <div class="chart-head">
          <div class="chart-title">Spend over time ${groupBy === 'model' ? 'by model' : groupBy === 'agent' ? 'by agent' : ''} ${useTokens ? '(tokens)' : ''}</div>
          <div class="chart-meta">
            <span class="chart-total">${totalDisplay}</span>
            <${TrendChip} pct=${trendPct} />
          </div>
        </div>
        ${loading ? html`<div class="shimmer" style="height:160px"></div>`
          : series ? (groupBy === 'total' ? html`
            <${SpendChart} data=${series.data} labels=${series.labels} height=${160}
              fmtY=${fmtY} axisFmtY=${useTokens ? fmtTokens : fmtAxisUsd} runRate=${runRate}
              showLegend=${false} bucket=${series.bucket} />
            ${projection ? html`<div class="chart-foot">At this pace, ~${projection} by ${cyc.label} <span class="dim">(linear run-rate, not a forecast)</span></div>` : null}
            ${series.coarsened ? html`<div class="chart-foot"><span class="dim">Showing ${series.bucket} buckets — this range is too long for ${series.requestedBucket}ly detail.</span></div>` : null}
          ` : html`
            <${StackedBarChart} data=${series.data} labels=${series.labels} height=${200}
              fmtY=${fmtY} axisFmtY=${useTokens ? fmtTokens : fmtAxisUsd} bucket=${series.bucket} />
            ${series.coarsened ? html`<div class="chart-foot"><span class="dim">Showing ${series.bucket} buckets — this range is too long for ${series.requestedBucket}ly detail.</span></div>` : null}
          `) : html`<div class="empty" style="padding:32px 0">No spend in this window.</div>`}
      </div>
    ` : null}

    ${!error && cacheSeries ? html`
      <div class="chart-card">
        <div class="chart-title">Caching</div>
        <!-- Lead with the answer (#246): hit-rate + savings this window, framed.
             Subscription/local show cached-token volume (never raw $). -->
        <div class="cache-headline">
          <span class="cache-stat"><b>${cacheSeries.hitRate.toFixed(0)}%</b> cache hit-rate</span>
          <${Sparkline} values=${cacheSeries.hitSpark} color="var(--chart-2)" width=${72} height=${22} />
          <span class="cache-sep">·</span>
          <span class="cache-stat">${useTokens
            ? html`<b>${fmtTokens(cacheResp.total_captured_tokens || 0)}</b> cached reads this window`
            : html`~<b>${fmtCost(cacheResp.total_captured_usd || 0)}</b> saved this window`}</span>
        </div>
        ${loading ? html`<div class="shimmer" style="height:180px"></div>` : html`
          <${CacheSavingsChart} data=${cacheSeries.data} height=${180}
            fmtY=${useTokens ? fmtTokens : fmtCost} axisFmtY=${useTokens ? fmtTokens : fmtCost}
            bucket=${cacheSeries.bucket} />
          <div class="chart-foot">
            <span class="dim">Per-${cacheSeries.bucket === 'hour' ? 'hour' : 'day'} ${useTokens ? 'cached-token volume' : 'savings'}. Cached input bills at roughly a tenth of the normal input rate — you read these tokens at that discount, ${useTokens ? 'sparing your token budget' : 'saving the difference vs paying full price'}.</span>
            ${cacheSeries.coarsened ? html` <span class="dim">Showing ${cacheSeries.bucket} buckets.</span>` : null}
          </div>
        `}
      </div>
    ` : null}

    ${!error && !loading && rows.length > 0 ? html`
      <div class="table-wrap"><table>
        <thead><tr>
          <th>${tableMode === 'day' ? 'Date' : tableMode === 'agent' ? 'Agent' : 'Model'}</th>
          ${tableMode !== 'agent' ? html`<th>Agent</th>` : null}
          ${tableMode !== 'model' ? html`<th>Model</th>` : null}
          <th>Input</th><th>Output</th><th>Cache R <span class="info-btn">i<span class="info-tip">Cache-read tokens (billed at the discounted cache-read rate).</span></span></th><th>Cache W <span class="info-btn">i<span class="info-tip">Cache-write (creation) tokens — often the dominant cost driver on cache-heavy workloads.</span></span></th><th>Cost ${useTokens ? '(tokens) ' : ''}<span class="info-btn">i<span class="info-tip">Estimated from token usage. If you're on a subscription plan (e.g. Claude Max), your actual spend may differ.</span></span></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => html`
            <tr>
              <td class="mono">${r.group || '-'}</td>
              ${tableMode !== 'agent' ? html`<td class="mono">${r.agent_id || '-'}</td>` : null}
              ${tableMode !== 'model' ? html`<td class="mono">${r.model || '-'}</td>` : null}
              <td>${fmtTokens(r.input_tokens)}</td>
              <td>${fmtTokens(r.output_tokens)}</td>
              <td>${fmtTokens(r.cache_tokens || 0)}</td>
              <td>${fmtTokens(r.cache_write_tokens || 0)}</td>
              <td>${useTokens ? fmtTokens(_costVal(r, true)) : fmtFramedDollar(r.cost_usd, framing)}</td>
            </tr>
          `)}
          <tr style="font-weight:600;border-top:2px solid var(--border)">
            <td colspan=${1 + (tableMode !== 'agent' ? 1 : 0) + (tableMode !== 'model' ? 1 : 0)}></td>
            <td>${fmtTokens(totalIn)}</td>
            <td>${fmtTokens(totalOut)}</td>
            <td>${fmtTokens(rows.reduce((s, r) => s + (r.cache_tokens || 0), 0))}</td>
            <td>${fmtTokens(rows.reduce((s, r) => s + (r.cache_write_tokens || 0), 0))}</td>
            <td>${useTokens ? fmtTokens(totalTokens) : fmtFramedDollar(total, framing)}</td>
          </tr>
        </tbody>
      </table></div>
    ` : null}
  `;
}

  const severity = readParam(params, 'severity', DEFAULTS.severity,
    v => ['critical', 'warning', 'info'].includes(v));

  const [alerts, setAlerts] = useState([]);

function DriftView({ params }) {
  const agentId = readParam(params, 'agent_id', '');
  const [data, setData] = useState(null);

  useEffect(() => {
    const fetchDrift = () => api('/drift', { agent_id: agentId || undefined }).then(d => setData(d));
    fetchDrift();
    const t = setInterval(fetchDrift, 10000);
    return () => clearInterval(t);
  }, [agentId]);

  if (!data) return html`<div class="empty">Loading...</div>`;

  // /drift returns a single-agent shape when agent_id is set; normalize to a list.
  const agents = data.agents || (data.agent_id ? [data] : []);
  if (!agents.length) return html`<div class="empty">No drift baselines built yet. Run at least 10 completed live sessions for a single agent to establish its behavioral baseline (note: drift baselines are computed per-agent, and only from live sessions, so historical backfilled sessions will not build a baseline).</div>`;

  const metrics = [
    ['Input tokens', 'avg_input_tokens', 'stddev_input_tokens', 'input_tokens'],
    ['Output tokens', 'avg_output_tokens', 'stddev_output_tokens', 'output_tokens'],
    ['Session duration', 'avg_session_duration_s', 'stddev_session_duration', 'duration_seconds'],
    ['Tool calls', 'avg_tool_call_count', 'stddev_tool_call_count', 'tool_call_count'],
  ];

  return html`
    <div class="page-title">Drift Detection</div>
    ${agents.map(a => html`
      <div class="drift-section">
        <h3>${a.agent_id}</h3>
        ${!a.baseline ? html`<div style="color:var(--text-dim);font-size:13px">No baseline yet.</div>` : html`
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;font-family:'Geist Mono',monospace">
            Baseline: ${a.baseline.sessions_sampled} sessions sampled${a.baseline.computed_at ? ', computed ' + fmtAgo(a.baseline.computed_at) : ''}
          </div>
          <table>
            <thead><tr><th>Metric</th><th>Baseline</th><th>Latest</th><th>Z-score (threshold: 2.0\u03C3)</th><th></th></tr></thead>
            <tbody>
              ${metrics.map(([label, avgKey, stdKey, latestKey]) => {
                const avg = a.baseline[avgKey];
                const std = a.baseline[stdKey];
                const latest = a.latest_session ? a.latest_session[latestKey] : null;
                let z = null;
                let zDisplay = '-';
                if (avg != null && latest != null) {
                  if (std != null && std > 0) {
                    z = (latest - avg) / std;
                    zDisplay = z.toFixed(2);
                  } else if (std === 0 || std == null) {
                    // Match drift.py z_score: inf when stddev=0 and value != mean
                    if (latest !== avg) {
                      z = Infinity;
                      zDisplay = 'inf';
                    } else {
                      z = 0;
                      zDisplay = '0.00';
                    }
                  }
                }
                const pass = z == null || (Number.isFinite(z) && Math.abs(z) < 2);
                return html`
                  <tr>
                    <td>${label}</td>
                    <td class="mono">${avg != null ? avg.toFixed(1) : '-'}${std != null ? ' +/- ' + std.toFixed(1) : ''}</td>
                    <td class="mono">${latest != null ? (typeof latest === 'number' ? latest.toFixed(1) : latest) : '-'}</td>
                    <td class="mono" style="color:${pass ? 'var(--success)' : 'var(--error)'}">${zDisplay}</td>
                    <td><span class="badge ${pass ? 'badge-ok' : 'badge-critical'}">${pass ? 'pass' : 'drift'}</span></td>
                  </tr>
                `;
              })}
            </tbody>
          </table>
        `}
      </div>
    `)}
  `;
}

function BudgetRow({ scope, label, daily, session, effectiveDaily, effectiveSession, onSave }) {
  const [dailyVal, setDailyVal] = useState(daily != null ? String(daily) : '');
  const [sessionVal, setSessionVal] = useState(session != null ? String(session) : '');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const save = async () => {
    setSaving(true);
    try {
      await onSave(scope, dailyVal, sessionVal);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch (e) {
      alert('Save failed: ' + e.message);
    } finally {
      setSaving(false);
    }
  };

  const dailyPlaceholder = (effectiveDaily != null && daily == null)
    ? `default: $${effectiveDaily}` : 'no limit';
  const sessionPlaceholder = (effectiveSession != null && session == null)
    ? `default: $${effectiveSession}` : 'no limit';

  return html`
    <tr>
      <td class="mono">${label}</td>
      <td>
        <input type="number" min="0" step="0.01" placeholder=${dailyPlaceholder}
          value=${dailyVal} onInput=${e => setDailyVal(e.target.value)}
          style="width:120px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--text);font-size:13px" />
      </td>
      <td>
        <input type="number" min="0" step="0.01" placeholder=${sessionPlaceholder}
          value=${sessionVal} onInput=${e => setSessionVal(e.target.value)}
          style="width:120px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--text);font-size:13px" />
      </td>
      <td>
        <button class="btn" onClick=${save} disabled=${saving}
          style="padding:4px 12px;font-size:12px">
          ${saving ? 'Saving...' : saved ? '\u2713 Saved' : 'Save'}
        </button>
      </td>
    </tr>
  `;
}

function BudgetView({ params }) {
  // `provider` deep-link param (#112). The budget surface is per-agent today, so
  // there's nothing to filter on yet — we preserve the param so the deep-link
  // round-trips and surface it as a clearable chip. Provider-scoped budget
  // content arrives with budget-projection surfacing (#114).
  const provider = readParam(params, 'provider', '');
  const [data, setData] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [error, setError] = useState(null);

  const load = () => Promise.all([
    api('/budget'),
    api('/alerts', { type: 'cost_budget_daily', since: '24h' })
      .then(d => d.alerts || [])
      .catch(() => []),
    api('/alerts', { type: 'cost_budget_session', since: '24h' })
      .then(d => d.alerts || [])
      .catch(() => []),
  ]).then(([budget, daily, session]) => {
    setData(budget);
    setAlerts([...daily, ...session].sort((a, b) => b.fired_at.localeCompare(a.fired_at)));
  }).catch(e => setError(e.message));

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, []);

  const handleSave = async (scope, dailyStr, sessionStr) => {
    // Empty field means "no limit" — send 0 so the server runs validate_budget_value(0) → None.
    const daily = dailyStr !== '' ? parseFloat(dailyStr) : 0;
    const session = sessionStr !== '' ? parseFloat(sessionStr) : 0;
    const updated = await apiPost('/budget', {
      scope,
      daily_usd: daily,
      session_usd: session,
    });
    setData(updated);
  };

  if (error) return html`<div class="empty" style="color:var(--error)">${error}</div>`;
  if (!data) return html`<div class="empty">Loading...</div>`;

  const agentEntries = Object.entries(data.agents || {});

  return html`
    <div class="page-title">Budget</div>
    ${provider ? html`<div class="filters"><button class="btn" onClick=${() => navigate('budget', {}, {})}>provider: ${provider} ✕</button></div>` : null}

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Budget limits</div>
    <div style="color:var(--text-dim);font-size:12px;margin-bottom:12px">
      Clear a field or enter 0 to remove a limit. Changes are written to your config file immediately.
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Scope</th><th>Daily (USD)</th><th>Per-session (USD)</th><th></th></tr></thead>
      <tbody>
        <${BudgetRow}
          scope="defaults"
          label="defaults"
          daily=${data.defaults.daily_usd}
          session=${data.defaults.session_usd}
          onSave=${handleSave}
        />
        ${agentEntries.map(([id, b]) => html`
          <${BudgetRow}
            key=${id}
            scope=${id}
            label=${id}
            daily=${b.configured.daily_usd}
            session=${b.configured.session_usd}
            effectiveDaily=${b.effective.daily_usd}
            effectiveSession=${b.effective.session_usd}
            onSave=${handleSave}
          />
        `)}
        ${agentEntries.length === 0 ? html`
          <tr><td colspan="4" style="color:var(--text-dim);font-size:13px;padding:12px 0">
            No agents configured yet. Run your agent once to register it.
          </td></tr>
        ` : null}
      </tbody>
    </table></div>

    ${alerts.length === 0
      ? html`<div class="empty" style="margin-top:20px">No budget alerts in the last 24h.</div>`
      : html`
        <div style="margin-top:24px">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--error)">
            Budget alerts (last 24h)
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>Time</th><th>Severity</th><th>Type</th><th>Agent</th><th>Detail</th></tr></thead>
            <tbody>
              ${alerts.map(a => html`
                <tr>
                  <td>${fmtAgo(a.fired_at)}</td>
                  <td><span class="badge badge-${a.severity}">${a.severity}</span></td>
                  <td>${friendlyAlertType(a.type)}</td>
                  <td class="mono">${a.agent_id || '-'}</td>
                  <td style="color:var(--text-dim);font-size:12px">${a.detail.message || ''}</td>
                </tr>
              `)}
            </tbody>
          </table></div>
        </div>
      `}
  `;
}

// Per-analyzer display metadata for the recoverable band + Optimize sections.
// cache-recommend / budget-projection are intentionally absent from the savings
// band (no estimated_recoverable_usd); they surface elsewhere.
const ANALYZER_META = {
  downsize: { title: 'Downsize', hint: 'Route candidate sessions to a cheaper model' },
  cache:    { title: 'Cache',    hint: 'Raise cache-read efficacy toward the 80% ceiling' },
  script:   { title: 'Script',   hint: 'Replace a deterministic call-pattern with a script' },
  trim:     { title: 'Trim',     hint: 'Trim low-significance tokens from prompt templates' },
  reuse:    { title: 'Reuse',    hint: 'Reuse a repeated planning skeleton instead of re-planning' },
  'cache-recommend': { title: 'Cache recommend', hint: 'Add cache_control breakpoints (Anthropic)' },
  'budget-projection': { title: 'Budget projection', hint: 'Projected cycle spend vs ceiling' },
};

// The Analytics slice each recoverable-waste analyzer opens into (#229). A
// leaderboard (hbar) on the dimension the analyzer reasons over — so a Downsize
// tile lands on "spend by model", Reuse/Trim on the per-agent view, Script on
// per-tool. Unknown analyzers fall back to spend-by-model. Values are validated
// by the Analytics route against ANALYTICS_METRICS / ANALYTICS_DIMENSIONS.
const ANALYZER_ANALYTICS_SLICE = {
  downsize: { metric: 'spend',    group_by: 'model', chart: 'hbar' },
  cache:    { metric: 'tokens',   group_by: 'model', chart: 'hbar' },
  script:   { metric: 'events',   group_by: 'tool',  chart: 'hbar' },
  reuse:    { metric: 'sessions', group_by: 'agent', chart: 'hbar' },
  trim:     { metric: 'tokens',   group_by: 'agent', chart: 'hbar' },
};
function analyzerSliceHref(name, since, route = 'analytics') {
  const slice = ANALYZER_ANALYTICS_SLICE[name] || { metric: 'spend', group_by: 'model', chart: 'hbar' };
  return analyticsHref({ ...slice, since }, route);
}

// Title-case a registry key for display. Centralizes capitalization so a tile
// for a not-yet-known analyzer still renders title-case instead of the raw
// lowercase key (#162) — registry keys are lowercase by convention.
function capitalize(name) {
  return name ? name.charAt(0).toUpperCase() + name.slice(1) : name;
}

// Mirror core/framing.render_savings: api/unknown → dollars; subscription →
// token-share of the cycle; local → token count. The mode is server-decided.
function fmtFramedSavings(usd, tokens, framing) {
  const mode = framing ? framing.pricing_mode : 'api';
  if (mode === 'subscription') {
    if (tokens == null) return '—';
    if (framing.window_total_tokens > 0) return (100 * tokens / framing.window_total_tokens).toFixed(1) + '% of cycle tokens';
    return fmtTokens(tokens) + ' tokens';
  }
  if (mode === 'local') return tokens == null ? '—' : fmtTokens(tokens) + ' tokens';
  return usd == null ? '—' : fmtCost(usd);
}

// Count agents whose latest session breaches the 2σ drift threshold on any
// tracked metric (mirrors the Drift screen's z-score logic).
function driftSignalCount(drift) {
  const agents = (drift && drift.agents) || (drift && drift.agent_id ? [drift] : []);
  const metrics = [
    ['avg_input_tokens', 'stddev_input_tokens', 'input_tokens'],
    ['avg_output_tokens', 'stddev_output_tokens', 'output_tokens'],
    ['avg_session_duration_s', 'stddev_session_duration', 'duration_seconds'],
    ['avg_tool_call_count', 'stddev_tool_call_count', 'tool_call_count'],
  ];
  let n = 0;
  for (const a of agents) {
    if (!a.baseline || !a.latest_session) continue;
    let breach = false;
    for (const [avgK, stdK, latK] of metrics) {
      const avg = a.baseline[avgK], std = a.baseline[stdK], latest = a.latest_session[latK];
      if (avg == null || latest == null) continue;
      if (std != null && std > 0) { if (Math.abs((latest - avg) / std) >= 2) breach = true; }
      else if (latest !== avg) breach = true;
    }
    if (breach) n++;
  }
  return n;
}

// Flatten the optimize report into recoverable-band tiles. Ready tiles carry a
// number; not-ready ones (capture off, missing dep, or skipped under fast=true)
// render muted with an enablement hint.
// Cache efficacy ceiling — fallback if the response doesn't carry
// `efficacy_ceiling`; mirrors core/optimize cache_efficacy.EFFICACY_CEILING.
const CACHE_EFFICACY_CEILING = 0.80;

// Classify a finding into one of four honest tile states (issue #127):
//   actionable  — ran, found recoverable waste (carries a number)
//   at_ceiling  — ran, already optimized (no waste because at the ceiling)
//   no_findings — ran, nothing actionable in this window
//   not_ready   — couldn't run (capture off / missing dep / skipped on fast)
// Reads richer discriminators from the finding rather than `usd in (None,0)`.
function classifyFinding(name, fd, skipped) {
  if (skipped.has(name)) return { state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' };
  if (fd && fd.enabled === false) {
    return { state: 'not_ready', hint: fd.hint || (ANALYZER_META[name] || {}).hint };
  }
  const usd = fd ? fd.estimated_recoverable_usd : null;
  const tokens = fd ? fd.estimated_recoverable_tokens : null;
  if (usd != null && usd > 0) {
    return { state: 'actionable', usd, tokens, basis: fd.estimate_basis || '' };
  }
  // Ran, nothing to recover. For cache, distinguish "already at the ceiling"
  // (positive) from "nothing here" so we never tell a user to raise efficacy
  // they've already maxed out. A fully-cached model can have tiny *uncached*
  // input (most volume is cache reads), so DON'T gate at_ceiling on input
  // volume — gate on "all rows with usage are at/above the ceiling" (#135).
  if (name === 'cache' && fd) {
    const ceiling = fd.efficacy_ceiling != null ? fd.efficacy_ceiling : CACHE_EFFICACY_CEILING;
    const used = (fd.rows || []).filter(r => (r.input_tokens + r.cache_tokens) > 0);
    if (used.length && used.every(r => r.efficacy >= ceiling)) {
      const best = used.slice().sort((a, b) =>
        (b.input_tokens + b.cache_tokens) - (a.input_tokens + a.cache_tokens))[0];
      return { state: 'at_ceiling', metric: Math.round(best.efficacy * 100) + '% cache efficacy' };
    }
  }
  return { state: 'no_findings' };
}

// Flatten the optimize report into recoverable-band tiles, each carrying a
// state (see classifyFinding). Registry-driven: downsize is a typed slot; any
// wave-2 finding carrying the `estimated_recoverable_usd` contract field becomes
// a tile (so a future `reuse` analyzer appears with no UI change).
// cache-recommend / budget-projection lack the field → excluded by contract.
function recoverableTiles(opt) {
  if (!opt) return [];
  const out = [];
  const skipped = new Set(opt.skipped_analyzers || []);
  const f = opt.findings || {};
  // Downsize always gets a tile — it runs unconditionally; a null typed slot
  // means "ran, no candidates", not "missing" (issue #126).
  out.push({ name: 'downsize', ...classifyFinding('downsize', opt.downgrade, skipped) });
  Object.keys(f).forEach(k => {
    if (f[k] && 'estimated_recoverable_usd' in f[k]) out.push({ name: k, ...classifyFinding(k, f[k], skipped) });
  });
  skipped.forEach(k => {
    if (!(k in f) && k !== 'downsize') {
      out.push({ name: k, state: 'not_ready', hint: 'Not run on Overview — open the Optimize tab.' });
    }
  });
  return out;
}

function HealthTile({ label, value, attention, href, sub }) {
  return html`<a class="health-tile ${attention ? 'attn' : ''}" href=${href}>
    <div class="health-value">${value}</div>
    <div class="health-label">${label}</div>
    ${sub ? html`<div class="health-sub">${sub}</div>` : null}
