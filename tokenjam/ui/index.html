// The self-improve loop's Approve stage (self-improve-loop SPEC.md §12 /
// §8 reuse map): pending relearn fixes the cross-session relearn aggregator
// (core/optimize/analyzers/relearn.py, served from a background-refreshed
// cache at GET /relearn/proposals — see api/routes/relearn.py) land here for
// a human to review. Phase 2 wires Approve to a real write, routed by rung,
// through POST /relearn/apply (core.optimize.relearn_apply — git-commit or
// gzip-backup reversible, disabled-by-default for hook/wrapper/config rungs).
// Dismiss stays a client-side-only hide (localStorage, never sent to the
// server). The chassis (listhead / listbox / addbar / cur-modal) is forked
// from Optimize ▸ Summarize's curate → diff → Apply/Reject screen
// (~6410-7040 above), per Phase A's scaffold.
const RELEARN_DISMISSED_KEY = 'tj_relearn_dismissed_v1';

function loadDismissedRelearns() {
  try {
    const raw = localStorage.getItem(RELEARN_DISMISSED_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch (e) { return new Set(); }
}

function saveDismissedRelearns(set) {
  try { localStorage.setItem(RELEARN_DISMISSED_KEY, JSON.stringify([...set])); } catch (e) { /* best-effort */ }
}

const RUNG_LABELS = {
  1: 'note (CLAUDE.md)',
  2: 'skill / doc',
  3: 'hook',
  4: 'wrapper / script',
  5: 'config / env',
};
const ENFORCEMENT_RUNGS = new Set([3, 4, 5]);

// Verdict/recurrence-since-apply labels and the Compound-ledger summary that
// used to render here were the frontend half of the perpetual verify/receipts
// layer removed for making unsupportable realized-savings claims (see
// relearn_apply.py's AppliedFix.verify docstring) — nothing has populated
// them since, so they always rendered an inert "Not yet checked" placeholder.
// Replaced by the Applied tab's honest `est.` figure (InboxStatTiles /
// AppliedItemRow below), a bounded point-in-time snapshot taken at apply
// time, never a live re-measurement.

// The select-all state transition, kept pure and outside the component so it
// can be exercised directly rather than only asserted against as markup.
// `visibleSigs` is the RENDERED row set: clicking a fully-selected box clears
// exactly those rows from the selection, anything else adds them all. Rows the
// list is not showing are never touched in either direction.
function nextSelectAllSelection(visibleSigs, checkedSigs) {
  const next = new Set(checkedSigs);
  const all = visibleSigs.length > 0 && visibleSigs.every(sig => next.has(sig));
  for (const sig of visibleSigs) {
    if (all) next.delete(sig);
    else next.add(sig);
  }
  return next;
}

// The table's select-all box. `indeterminate` has no HTML attribute and cannot
// be expressed as a checked value, so it is assigned to the DOM node through a
// ref on every render — a two-state header box over a partial selection is a
// well-known source of accidental bulk actions.
function SelectAllCheckbox({ total, selected, onToggle }) {
  const ref = useRef(null);
  const all = total > 0 && selected === total;
  useEffect(() => {
    if (ref.current) ref.current.indeterminate = selected > 0 && selected < total;
  });
  return html`<input type="checkbox" ref=${ref} checked=${all} disabled=${total === 0}
    title=${all ? 'Clear selection' : 'Select all listed'}
    aria-label=${all ? 'Clear selection' : 'Select all listed'}
    onChange=${onToggle} />`;
}

// --- Inbox redesign: sort + long-tail collapse, badges, est./mo formatting
// (behavioral requirements #1-#4). Shared by both the Recurring-mistakes and
// Cost-advisories tabs so the two never drift on what "biggest first" means.

const INBOX_COLLAPSE_THRESHOLD = 8;

// Rank by dollars when ANY item in the list carries one (unpriced items rank
// last, at 0 — reviewing the priced decisions first is the right default);
// otherwise rank by tokens. Never invented for display, only for order.
function sortByEstMonthly(items) {
  const anyUsd = items.some(i => i.estimated_monthly_usd != null);
  const rank = i => anyUsd ? (i.estimated_monthly_usd ?? 0) : (i.estimated_monthly_tokens || 0);
  return [...items].sort((a, b) => rank(b) - rank(a));
}

// Top N normally, the remainder folded into one collapsible row (behavioral
// requirement #3) — a 42-tiny-fixes tail must read as one bundled decision,
// not 42 peers.
function splitTopAndTail(sorted, max = INBOX_COLLAPSE_THRESHOLD) {
  if (sorted.length <= max) return { top: sorted, tail: [] };
  return { top: sorted.slice(0, max), tail: sorted.slice(max) };
}

// A tail item's headline est./mo figure — dollars first when a rate exists
// and the plan tier doesn't suppress dollars, tokens as fallback (requirement
// #2). Works for both relearn clusters and cost proposals: both carry the
// same `estimated_monthly_usd`/`estimated_monthly_tokens` field names.
function estMonthlyLine(item, suppressed) {
  const usd = item.estimated_monthly_usd;
  const toks = item.estimated_monthly_tokens;
  if (!suppressed && usd != null) {
    return { big: fmtUsd(usd), sub: toks ? '~' + fmtTokens(toks) + ' tok' : '' };
  }
  if (toks != null) return { big: '~' + fmtTokens(toks) + ' tok', sub: '' };
  return { big: '—', sub: '' };
}

function combinedEstMonthly(items, suppressed) {
  const anyUsd = !suppressed && items.some(i => i.estimated_monthly_usd != null);
  if (anyUsd) return fmtUsd(items.reduce((s, i) => s + (i.estimated_monthly_usd || 0), 0));
  return '~' + fmtTokens(items.reduce((s, i) => s + (i.estimated_monthly_tokens || 0), 0)) + ' tok';
}

// The collapsed long-tail row: count + combined est./mo, an expand toggle,
// and the bulk Dismiss all / (optional) Mark all applied actions (requirement
// #3). `renderItem` renders one expanded tail row in the caller's own shape
// (a RecurringMistakeRow or a CostProposalCard).
function CollapsedTailRow({ tail, suppressed, itemLabel, onDismissAll, onMarkAllApplied, renderItem }) {
  const [open, setOpen] = useState(false);
  if (tail.length === 0) return null;
  return html`
    <div class="cur-row" style="padding:10px 14px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="sz-link" onClick=${() => setOpen(o => !o)}>
          ${open ? '▾' : '▸'} ${tail.length} smaller ${itemLabel} · ~${combinedEstMonthly(tail, suppressed)} combined est./mo
        </span>
        <span style="margin-left:auto;display:flex;gap:14px">
          ${onMarkAllApplied ? html`<span class="sz-link" onClick=${onMarkAllApplied}>Mark all applied</span>` : null}
          <span class="sz-link" onClick=${onDismissAll}>Dismiss all</span>
        </span>
      </div>
      ${open ? html`<div style="margin-top:6px">${tail.map(renderItem)}</div>` : null}
    </div>`;
}

// Human-readable fix-type badge for a relearn cluster (requirement #4) —
// user vocabulary, never internal jargon ("relearn", "rung 2") as the
// primary label. `family_key`/`rung` stay available in the row's title
// attribute for anyone who wants the internal detail.
const RELEARN_BADGE_BY_RUNG = { 1: 'PROMPT TWEAK', 2: 'SNIPPET', 3: 'GUARDRAIL', 4: 'GUARDRAIL', 5: 'GUARDRAIL' };
function relearnBadge(cluster) {
  if (cluster.advise_only) return 'ADVISE ONLY';
  const fam = (cluster.family_key || '').toLowerCase();
  if (fam.includes('cache')) return 'CACHE BREAKPOINT';
  return RELEARN_BADGE_BY_RUNG[cluster.rung] || 'FIX';
}

// Flat row for the Recurring-mistakes tab (mockup: title + amber fix-type
// badge, a muted recurrence/last-seen line, savings at right). The checkbox
// preserves the existing bulk-dismiss flow (requirement #9) — not in the
// mockup's own sketch, but the bulk action it drives is explicitly required.
function RecurringMistakeRow({ cluster, checked, onToggle, onExpand, suppressed }) {
  const est = estMonthlyLine(cluster, suppressed);
  const lastSeenTs = (cluster.examples || []).map(e => e.ts).filter(Boolean).sort().pop();
  return html`
    <div class="cur-row" style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)" key=${cluster.signature}>
      <input type="checkbox" style="margin-top:3px" checked=${checked} onChange=${onToggle} />
      <div style="flex:1;min-width:0">
        <span class="sz-link" onClick=${onExpand} style="font-weight:500">${cluster.title}</span>
        <span class="badge badge-warning" style="margin-left:6px" title=${(cluster.family_key || '') + ' · rung ' + cluster.rung}>${relearnBadge(cluster)}</span>
        <div class="dim" style="font-size:12px;margin-top:3px">Recurred in ${cluster.sessions} session${cluster.sessions === 1 ? '' : 's'}${lastSeenTs ? ' · last seen ' + lastSeenTs.slice(0, 16).replace('T', ' ') : ''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mono" style="color:var(--accent);font-weight:600">${est.big} <span class="estimated-tag" title=${cluster.monthly_rate_basis || 'occurrences x a conservative per-turn token cost, extrapolated to a 30-day rate — review before applying'}>est.</span></div>
        ${est.sub ? html`<div class="dim" style="font-size:11px">${est.sub}</div>` : null}
        <div class="dim" style="font-size:10px;text-transform:uppercase;letter-spacing:.03em">est. / mo</div>
      </div>
    </div>`;
}

// The card's Approve flow: preview -> (optional active-session warning ->
// "apply anyway") -> write. Scope + target are ALWAYS human-editable before
// Approve (§7 — repo-identity is noisy; never trust the suggestion blindly).
function RelearnApplyModal({ cluster, onClose, onApplied }) {
  const [scope, setScope] = useState('project');
  const [target, setTarget] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [warning, setWarning] = useState(null);   // active-session 409 text — offers "apply anyway"
  const [result, setResult] = useState(null);      // the applied record, once written

  useEffect(() => {
    if (!cluster) return;
    setScope(cluster.scope || 'project');
    setTarget(cluster.suggested_target || '');
    setBusy(false); setError(null); setWarning(null); setResult(null);
  }, [cluster && cluster.signature]);

  if (!cluster) return null;

  const doApprove = async (force) => {
    if (!target.trim()) { setError('enter a target path first'); return; }
    setBusy(true); setError(null);
    try {
      // Only the proposal's ID travels: the server reads the cluster content
      // from its own stored proposals, so the browser can't apply anything the
      // detector didn't produce. Scope + target stay client-supplied because
      // the human edits them here before approving.
      const body = {
        proposal_id: cluster.proposal_id,
        scope, target_path: target.trim(), go: true, force: !!force,
      };
      const r = await apiPostOrDetail('/relearn/apply', body);
      setWarning(null);
      setResult(r.record);
      onApplied && onApplied(r.record);
    } catch (e) {
      // The active-session guard refuses via 409 unless force=true — offer
      // the explicit "apply anyway" the spec calls for, instead of a bare error.
      if (e.status === 409 && /active session/.test(e.message || '')) {
        setWarning(e.message);
      } else {
        setError(e.message || String(e));
      }
    } finally {
      setBusy(false);
    }
  };

  return html`
    <div class="cur-overlay" onClick=${onClose}>
      <div class="cur-modal" onClick=${e => e.stopPropagation()}>
        <div class="cur-modal-head">
          <span class="cur-modal-title">${cluster.title}</span>
          <span class=${'rev-state ' + (result ? 'applied' : 'staged')} style="margin-left:6px">${result ? 'applied' : 'pending'}</span>
          <button class="cur-modal-x" onClick=${onClose} title="Close">✕</button>
        </div>
        <div class="cur-modal-body">
          <div style="font-size:12.5px;margin-bottom:10px">
            <b>${cluster.sessions}</b> distinct sessions · <b>${cluster.occurrences}</b> occurrences ·
            spread across <b>${(cluster.repos || []).length}</b> repo${(cluster.repos || []).length === 1 ? '' : 's'} ·
            rung ${cluster.rung} (${RUNG_LABELS[cluster.rung] || ''})
          </div>
          <div class="opt-section" style="margin:0 0 14px">
            <div class="opt-title" style="font-size:13px">Proposed fix</div>
            <div class="sz-note" style="margin-top:4px">${cluster.proposed_fix}</div>
          </div>
          <div class="opt-section" style="margin:0 0 6px">
            <div class="opt-title" style="font-size:13px">Evidence — repro sessions</div>
            ${(cluster.examples || []).map((ex, i) => html`
              <div class="sz-runrow" key=${i} style="align-items:flex-start">
                ${ex.session_resolvable
                  ? html`<a class="sz-link" href=${'#/sessions/' + ex.session_id} target="_blank" rel="noopener">${(ex.session_id || '').slice(0, 12)}</a>`
                  : html`<span class="dim" style="font-size:12px" title="This session was read from a transcript on disk and has not been ingested, so there is no session page to open.">${(ex.session_id || '').slice(0, 12)}</span>`}
                <span class="dim" style="font-size:12px">${ex.repo}${ex.ts ? ' · ' + ex.ts.slice(0, 16).replace('T', ' ') : ''}</span>
                <pre class="rev-diff" style="margin:4px 0 0;white-space:pre-wrap;font-size:11.5px;flex-basis:100%">${ex.snippet}</pre>
              </div>`)}
            ${(!cluster.examples || cluster.examples.length === 0) ? html`<div class="dim" style="font-size:12.5px">No example sessions captured.</div>` : null}
          </div>

          ${cluster.advise_only ? html`
            <div class="opt-section" style="margin:0 0 6px">
              <div class="opt-title" style="font-size:13px">No apply path <span class="dim" style="font-weight:400">· advise-only</span></div>
              <div class="sz-note" style="margin-top:4px">${cluster.advise_only_reason || 'Every agent in this cluster is a service tokenjam has no workspace for, so there is no file to write a fix into. Apply the recommendation yourself, then measure it with tj relearn verify --otel.'}</div>
            </div>
          ` : !result ? html`
            <div class="opt-section" style="margin:0 0 6px">
              <div class="opt-title" style="font-size:13px">Where to write it <span class="dim" style="font-weight:400">— repo-identity is noisy; confirm before approving</span></div>
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
                <select class="rename-input" style="width:160px" value=${scope} onChange=${e => setScope(e.target.value)}>
                  <option value="project">project</option>
                  <option value="user-global">user-global</option>
                </select>
                <input class="rename-input" style="flex:1;min-width:280px" value=${target}
                  placeholder="/absolute/path/to/target"
                  onInput=${e => setTarget(e.target.value)} />
              </div>
              ${ENFORCEMENT_RUNGS.has(cluster.rung) ? html`<div class="sz-note" style="margin-top:8px;color:var(--warn)">Rung ${cluster.rung} writes a hook, DISABLED by default — it will not run until you separately confirm "Enable enforcement".</div>` : null}
            </div>
          ` : html`
            <div class="opt-section" style="margin:0 0 6px">
              <div class="opt-title" style="font-size:13px">Written to</div>
              <div class="sz-note" style="margin-top:4px"><code>${result.target_path}</code>${result.git_commit ? html` · committed <code>${result.git_commit.slice(0, 8)}</code>` : ' · backed up (not a git repo)'}</div>
            </div>
          `}

          ${warning ? html`<div class="opt-caveat" style="color:var(--warn)">${warning} <span class="sz-link" onClick=${() => doApprove(true)}>Apply anyway →</span></div>` : null}
          ${error ? html`<div class="opt-caveat" style="color:var(--error)">${error}</div>` : null}
        </div>
        <div class="cur-modal-foot">
          ${cluster.advise_only ? html`<span class="dim" style="font-size:12px">Nothing to approve: this recommendation is yours to apply.</span>`
            : !result ? html`
            <button class="cur-btn primary" disabled=${busy} onClick=${() => doApprove(false)}>${busy ? 'Applying…' : 'Approve →'}</button>
          ` : html`<span class="dim" style="font-size:12px">Applied. Manage enforcement/revert from the Applied section below.</span>`}
          <button class="cur-btn" style="margin-left:auto" onClick=${onClose}>Close</button>
        </div>
      </div>
    </div>`;
}

// The days-ago label the Applied tab's mockup uses ("Applied 3 days ago").
function daysAgoLabel(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  if (Number.isNaN(then)) return '';
  const days = Math.floor((Date.now() - then) / 86400000);
  if (days <= 0) return 'today';
  return days === 1 ? '1 day ago' : days + ' days ago';
}

// A merged applied record's (`rec.kind`: 'relearn' | 'cost') own estimate, in
// the same `estimated_monthly_usd`/`estimated_monthly_tokens` shape open
// items carry — a bounded, point-in-time snapshot taken at the moment of
// apply, NEVER a live re-measurement (behavioral requirement #7, REVISED:
// the perpetual verify/receipts layer that would have produced a real
// measured figure was removed in commit c0316aba for making unsupportable
// realized-savings claims; see the note above InboxStatTiles). For relearn,
// `verify.estimated_monthly_usd/tokens` (stamped once by relearn_apply.
// apply_relearn_fix); for a cost marker, the proposal's own estimate, carried
// straight onto the ledger record by cost_apply.mark_applied. Shared by
// AppliedItemRow (per-row) and InboxStatTiles (summed across all applied).
function appliedEstimate(rec) {
  const isRelearn = rec.kind === 'relearn';
  return {
    estimated_monthly_usd: isRelearn ? (rec.verify && rec.verify.estimated_monthly_usd) : rec.estimated_recoverable_usd,
    estimated_monthly_tokens: isRelearn ? (rec.verify && rec.verify.estimated_monthly_tokens) : rec.estimated_recoverable_tokens,
  };
}

// The Applied tab's one row shape for BOTH ledgers (`rec.kind` discriminates
// 'relearn' | 'cost' — stamped by ReviewInboxView when it merges the two
// lists). Mockup: title, "Applied N days ago", a green delta figure — always
// labeled `est.`, NEVER a "verified" claim or chip (behavioral requirement
// #7, REVISED — see the note above `appliedEstimate` and InboxStatTiles).
// Enforcement enable/disable (rung 3-5) only ever applies to relearn fixes.
function AppliedItemRow({ rec, onChanged, suppressed }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [confirming, setConfirming] = useState(false);

  const call = async (fn) => {
    setBusy(true); setError(null);
    try { await fn(); onChanged && onChanged(); }
    catch (e) { setError(e.message || String(e)); }
    finally { setBusy(false); setConfirming(false); }
  };

  const isRelearn = rec.kind === 'relearn';
  const enforcement = rec.enforcement;
  const isEnforcement = isRelearn && ENFORCEMENT_RUNGS.has(rec.rung);
  const est = appliedEstimate(rec);
  const usd = est.estimated_monthly_usd;
  const toks = est.estimated_monthly_tokens;
  const revertUrl = isRelearn ? `/relearn/${rec.id}/revert` : `/relearn/cost-applied/${rec.id}/revert`;

  return html`
    <div class="sz-runrow" style="align-items:flex-start;flex-direction:column;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap">
        <span style="font-weight:500">${rec.title}</span>
        ${!isRelearn ? html`<span class="badge badge-info">${(COST_BADGE_BY_ANALYZER[rec.analyzer] || rec.analyzer || '').toUpperCase()}</span>` : null}
        <span class=${'rev-state ' + (rec.state === 'reverted' ? 'reverted' : 'applied')}>${rec.state}</span>
        ${isEnforcement && rec.state === 'applied' ? html`<span class="dim" style="font-size:11px">· enforcement ${enforcement && enforcement.enabled ? 'ENABLED' : 'disabled'}</span>` : null}
        ${(usd != null || toks != null) ? html`
          <span class="mono" style="margin-left:auto;color:var(--success);font-weight:600">
            +${(!suppressed && usd != null) ? fmtUsd(usd) : (toks != null ? '~' + fmtTokens(toks) + ' tok' : fmtUsd(usd))}
            <span class="estimated-tag" title="a snapshot of the estimate at the moment this was applied — not a live re-measurement of what happened afterward">est.</span>
          </span>` : null}
      </div>
      <div class="dim" style="font-size:12px">Applied ${daysAgoLabel(rec.applied_at)}${rec.target_path ? html` · <code>${rec.target_path}</code>` : ''}${rec.git_commit ? html` · <code>${rec.git_commit.slice(0, 8)}</code>` : ''}</div>
      ${error ? html`<div style="color:var(--error);font-size:12px">${error}</div>` : null}
      <div style="display:flex;gap:10px;align-items:center">
        ${rec.state === 'applied' ? html`<span class="sz-link" onClick=${() => call(() => apiPostOrDetail(revertUrl, {}))}>${busy ? 'working…' : 'Revert'}</span>` : null}
        ${isEnforcement && rec.state === 'applied' && !(enforcement && enforcement.enabled) ? (
          confirming
            ? html`<span style="color:var(--warn);font-size:12px">This intercepts your tool calls on every matching call. <span class="sz-link" onClick=${() => call(() => apiPostOrDetail(`/relearn/${rec.id}/enable`, { confirm: true }))}>Confirm enable →</span> <span class="sz-link" onClick=${() => setConfirming(false)}>cancel</span></span>`
            : html`<span class="sz-link" onClick=${() => setConfirming(true)}>Enable enforcement…</span>`
        ) : null}
        ${isEnforcement && rec.state === 'applied' && enforcement && enforcement.enabled ? html`<span class="sz-link" onClick=${() => call(() => apiPostOrDetail(`/relearn/${rec.id}/disable`, {}))}>Disable enforcement</span>` : null}
      </div>
    </div>`;
}

// ---- Cost proposals (the same inbox, a distinct `kind`) ----
// The downsize/cache/trim analyzers' findings adapted into advise-only
// proposals (core/optimize/cost_proposals.py), served at
// GET /relearn/cost-proposals. They carry NO apply path — the fix lives in the
// user's own application code — so "Mark applied" only drops a marker
// recording what the user approved.
// Human-readable, uppercase analyzer-category badges (requirement #4) — the
// mockup's own vocabulary (DOWNSIZE / CACHE / TRIM / SUBAGENT / DEADWEIGHT /
// SCRIPT / REUSE / VERBOSITY / PLACEMENT). `resend` (context re-send) maps to
// TRIM: its lead fix is the same context-volume-reduction lever (/compact),
// with cache_control as the secondary lever — no dedicated badge exists in
// the mockup's vocabulary for it, and TRIM is the closest honest fit rather
// than inventing a tenth category.
const COST_BADGE_BY_ANALYZER = {
  downsize: 'DOWNSIZE', cache: 'CACHE', 'cache-recommend': 'CACHE', trim: 'TRIM',
  subagent: 'SUBAGENT', deadweight: 'DEADWEIGHT', script: 'SCRIPT', reuse: 'REUSE',
  verbosity: 'VERBOSITY', placement: 'PLACEMENT', resend: 'TRIM',
};

function fmtUsd(v) {
  const n = Number(v || 0);
  return '$' + (Math.abs(n) < 1 ? n.toFixed(4) : n.toFixed(2));
}

// Copy-to-clipboard for a snippet fix, same robust pattern as RestoreButton:
// execCommand first (works inside the click gesture even when the async
// Clipboard API stalls on a permission prompt), then a best-effort
// navigator.clipboard upgrade. Feedback fires synchronously either way.
function CopySnippetButton({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch (_) { /* ignore */ }
    document.body.removeChild(ta);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try { navigator.clipboard.writeText(text).catch(() => {}); } catch (_) { /* ignore */ }
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return html`<button class="cur-btn" style="padding:3px 10px;font-size:11px" onClick=${copy}>${copied ? 'copied ✓' : 'Copy'}</button>`;
}

// One pending cost proposal card. Two equally legitimate fix modalities: a
// workspace fix (tokenjam writes a file it owns) or a snippet fix (the fix
// lives in the user's own code, so the card hands over the exact change and a
// way to mark it done). The badge below says which one this card is; a
// snippet fix gets its own labeled block so the snippet reads as the
// deliverable, not a footnote.
// Per apply_kind, the section title, hint, and primary-button copy for
// CostProposalCard's direct-edit apply flow — the write differs by what's
// actually changing (a config entry removed vs a model id swapped), so the
// card has to say which rather than a one-size "Apply the sizing note".
const APPLY_KIND_COPY = {
  model_swap:  { title: 'Apply the model swap', hint: 'writes the new model id at the registered source path; confirm the target first', button: 'Apply swap' },
  agent_model: { title: "Apply the agent's model change", hint: "sets this subagent's definition-file model key directly; confirm the target first", button: 'Apply change' },
  mcp_remove:  { title: 'Remove this MCP server entry', hint: "deletes the dead server's config entry; confirm the target first", button: 'Remove entry' },
};

function CostProposalCard({ prop, busy, focused, onMark, onDismiss, onChanged, suppressed }) {
  // Headline figure is the MONTHLY basis (requirement #1 — this page always
  // reads "/ mo", never a raw window total), suppressed to tokens-only per
  // the plan-tier framing the same way every dollar figure on this page is.
  const est = estMonthlyLine(prop, suppressed);
  // Two apply-capable shapes, routed through two different endpoints:
  //  - no apply_kind (subagent rubric / script / reuse / verbosity): the fix
  //    is a workspace surface an orchestrator reads, not a value tokenjam can
  //    edit outright -> /relearn/cost-proposals/apply-workspace (unchanged).
  //  - an apply_kind (model_swap / agent_model / mcp_remove): a deterministic
  //    edit of a value already written down -> /relearn/apply, the SAME
  //    endpoint a relearn cluster's Approve uses. relearn_proposals.
  //    cluster_for_apply already projects apply_kind/agent_name/source_path/
  //    current_model/proposed_model off the stored cost proposal, so this
  //    needs no server-side change.
  const hasApplyKind = !!prop.apply_kind;

  // Workspace-apply state (subagent rubric / script / reuse / verbosity): a
  // target path + a dry-run diff before the real, reversible write — routed
  // through the same human-gated relearn apply path.
  const [target, setTarget] = useState('');
  const [wbusy, setWbusy] = useState(false);
  const [werr, setWerr] = useState(null);
  const [preview, setPreview] = useState(null);

  const applyWorkspace = async (go) => {
    if (!target.trim()) { setWerr('enter a CLAUDE.md path to write the note into'); return; }
    setWbusy(true); setWerr(null);
    try {
      const r = await apiPostOrDetail('/relearn/cost-proposals/apply-workspace',
        { proposal_id: prop.proposal_id, target_path: target.trim(), go });
      if (go) { onChanged && onChanged(); }
      else { setPreview((r.applied && r.applied.diff) || '(no changes)'); }
    } catch (e) { setWerr(e.message || String(e)); }
    finally { setWbusy(false); }
  };

  // Apply-kind state: the target pre-fills from the server-resolved
  // prop.target_path (already the exact file the analyzer found) rather than
  // asking the user to type/guess it, unlike the workspace-note flow above
  // where the target genuinely is the human's call.
  const [akTarget, setAkTarget] = useState(prop.target_path || '');
  const [akBusy, setAkBusy] = useState(false);
  const [akErr, setAkErr] = useState(null);
  const [akWarning, setAkWarning] = useState(null);   // active-session 409 — offers "apply anyway"
  const [akPreview, setAkPreview] = useState(null);

  useEffect(() => { setAkTarget(prop.target_path || ''); }, [prop.proposal_id]);

  const applyKindFix = async (go, force) => {
    if (!akTarget.trim()) { setAkErr('enter a target path first'); return; }
    setAkBusy(true); setAkErr(null);
    try {
      const r = await apiPostOrDetail('/relearn/apply', {
        proposal_id: prop.proposal_id, scope: prop.scope || 'project',
        target_path: akTarget.trim(), go, force: !!force,
      });
      if (go) { setAkWarning(null); onChanged && onChanged(); }
      else { setAkPreview(r.diff || '(no changes)'); }
    } catch (e) {
      // Same active-session guard relearn's own Approve modal offers a retry
      // for (SPEC §7: never apply mid-session unless the human insists).
      if (e.status === 409 && /active session/.test(e.message || '')) { setAkWarning(e.message); }
      else { setAkErr(e.message || String(e)); }
    } finally { setAkBusy(false); }
  };

  const akCopy = APPLY_KIND_COPY[prop.apply_kind] || { title: 'Apply this fix', hint: 'confirm the target first', button: 'Apply' };

  // The badge names the fix modality, not a verdict on the proposal: a
  // snippet fix is a complete, concrete deliverable (the user pastes it
  // themselves) — never phrased as a lesser "advise-only" fallback. Plain
  // advise-only survives for the rare proposal with no pasteable snippet at
  // all (prose advice only). An apply_kind fix skips the rung ladder
  // entirely (see relearn_apply's _build_write_plan), so it never carries a
  // rung — "rung 1" would be wrong here, unlike the workspace-note flow.
  const modalityLabel = prop.apply_capable
    ? (hasApplyKind ? 'workspace fix · direct edit' : `workspace fix · rung ${prop.rung || 1}`)
    : (prop.suggestion ? 'snippet fix · apply yourself' : 'advise-only');

  return html`
    <div class=${'opt-section' + (focused ? ' rev-focus' : '')} data-analyzer=${prop.analyzer} style="margin:0 0 10px;padding:12px 14px;border:1px solid var(--border);border-radius:8px" key=${prop.signature}>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-weight:500">${prop.title}</span>
        <span class="badge badge-info">${COST_BADGE_BY_ANALYZER[prop.analyzer] || (prop.analyzer || '').toUpperCase()}</span>
        <span class="dim" style="font-size:11px">${modalityLabel}</span>
        <span style="margin-left:auto;text-align:right">
          <span class="mono" style="color:var(--accent);font-size:14px;font-weight:600">${est.big} <span class="estimated-tag" title=${prop.estimate_basis || 'estimated / correlational'}>est.</span></span>
          <div class="dim" style="font-size:10px;text-transform:uppercase;letter-spacing:.03em">est. / mo${est.sub ? ' · ' + est.sub : ''}</div>
        </span>
      </div>
      <div class="sz-note" style="margin-top:8px">${prop.evidence} <a class="sz-link" style="font-size:11.5px" href=${optimizeFindingHref(prop.analyzer)}>See the evidence →</a></div>
      <div class="opt-title" style="font-size:12.5px;margin-top:10px">Recommendation</div>
      <div class="sz-note" style="margin-top:2px">${prop.advise_text}</div>
      ${prop.suggestion ? html`
        <div style="margin-top:10px">
          <div class="opt-title" style="font-size:12.5px">
            <span>The fix ${prop.apply_capable ? '' : html`<span class="dim" style="font-weight:400">· paste this into your own code</span>`}</span>
            <${CopySnippetButton} text=${prop.suggestion} />
          </div>
          <div class="sz-copybox" style="margin-top:4px">${prop.suggestion}</div>
        </div>
      ` : null}
      <div class="opt-caveat" style="font-size:11.5px;margin-top:8px">${prop.caveat}</div>

      ${prop.apply_capable ? (hasApplyKind ? html`
        <div class="opt-section" style="margin:10px 0 0">
          <div class="opt-title" style="font-size:12.5px">${akCopy.title} <span class="dim" style="font-weight:400">· ${akCopy.hint}</span></div>
          <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
            <input class="rename-input" style="flex:1;min-width:280px" value=${akTarget}
              placeholder="/absolute/path/to/target" onInput=${e => setAkTarget(e.target.value)} />
            <button class="cur-btn" disabled=${akBusy} onClick=${() => applyKindFix(false)}>${akBusy ? 'working…' : 'Preview'}</button>
            <button class="cur-btn primary" disabled=${akBusy} onClick=${() => applyKindFix(true)}>${akCopy.button} →</button>
          </div>
          ${akPreview ? html`<pre class="rev-diff" style="margin:8px 0 0;white-space:pre-wrap;font-size:11.5px">${akPreview}</pre>` : null}
          ${akWarning ? html`<div class="opt-caveat" style="color:var(--warn)">${akWarning} <span class="sz-link" onClick=${() => applyKindFix(true, true)}>Apply anyway →</span></div>` : null}
          ${akErr ? html`<div style="color:var(--error);font-size:12px;margin-top:6px">${akErr}</div>` : null}
          <div class="dim" style="font-size:11.5px;margin-top:6px">Applying also records a checkpoint so the loop measures the realized cost delta after it.</div>
        </div>
      ` : html`
        <div class="opt-section" style="margin:10px 0 0">
          <div class="opt-title" style="font-size:12.5px">Apply the sizing note <span class="dim" style="font-weight:400">· writes a reversible rung-1 note; confirm the target first</span></div>
          <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
            <input class="rename-input" style="flex:1;min-width:280px" value=${target}
              placeholder="/absolute/path/to/CLAUDE.md" onInput=${e => setTarget(e.target.value)} />
            <button class="cur-btn" disabled=${wbusy} onClick=${() => applyWorkspace(false)}>${wbusy ? 'working…' : 'Preview note'}</button>
            <button class="cur-btn primary" disabled=${wbusy} onClick=${() => applyWorkspace(true)}>Apply note →</button>
          </div>
          ${preview ? html`<pre class="rev-diff" style="margin:8px 0 0;white-space:pre-wrap;font-size:11.5px">${preview}</pre>` : null}
          ${werr ? html`<div style="color:var(--error);font-size:12px;margin-top:6px">${werr}</div>` : null}
          <div class="dim" style="font-size:11.5px;margin-top:6px">Applying also records a checkpoint so the loop measures the realized fan-out cost delta after it.</div>
        </div>
      `) : html`
        <div style="display:flex;gap:12px;align-items:center;margin-top:10px">
          <button class="cur-btn primary" disabled=${busy} onClick=${() => onMark(prop)}>${busy ? 'Marking…' : (prop.suggestion ? 'I applied this →' : 'Mark applied →')}</button>
          <span class="sz-link" onClick=${() => onDismiss(prop.signature)}>Dismiss</span>
          <span class="dim" style="font-size:11.5px">${prop.suggestion ? 'Copy the fix above, make the change, then mark it done. It also records a checkpoint; the loop then measures the realized delta over your later calls.' : 'Marking records a checkpoint; the loop then measures the realized delta over your later calls.'}</span>
        </div>
      `}
      ${prop.apply_capable ? html`<div style="margin-top:8px"><span class="sz-link" onClick=${() => onDismiss(prop.signature)}>Dismiss</span></div>` : null}
    </div>`;
}

// The two headline stat tiles (mockup): ESTIMATED RECOVERABLE / mo (blue,
// combined across BOTH open tabs) and FIXES APPLIED (green).
//
// Tile 1's dollars-vs-tokens choice is behavioral requirement #2's rule:
// dollars first, with tokens in the sub-line, when at least half the open
// items are priceable; else tokens (the mockup's own tokens variant).
// `suppressed` (plan-tier framing) forces tokens regardless, same as every
// other dollar figure on this page.
//
// Tile 2 (requirement #7, REVISED — supersedes an earlier "verified saved"
// draft of this tile). This repo deliberately removed its post-hoc verify/
// receipts measurement layer in commit c0316aba ("refactor: remove unbounded
// verify/receipts layer") because it made unsupportable realized-savings
// claims (perpetual ledger, ever-growing window, live re-pricing, no
// confounder control). Do NOT reintroduce any after-the-fact measurement
// here, and never render a "verified" claim or chip — this tile sums each
// applied fix's ORIGINAL estimate (the same `est.` figure AppliedItemRow
// shows per row), never a live re-measurement of what happened afterward. A
// bounded verify redesign is a separate, later product decision — see
// c0316aba before building one.
function InboxStatTiles({ openItems, appliedEstimates, appliedCount, suppressed }) {
  const priceable = openItems.filter(i => i.estimated_monthly_usd != null);
  const leadWithUsd = !suppressed && openItems.length > 0 && priceable.length * 2 >= openItems.length;
  const totalUsd = priceable.reduce((s, i) => s + i.estimated_monthly_usd, 0);
  const totalToks = openItems.reduce((s, i) => s + (i.estimated_monthly_tokens || 0), 0);

  const appliedPriceable = appliedEstimates.filter(i => i.estimated_monthly_usd != null);
  const appliedLeadWithUsd = !suppressed && appliedEstimates.length > 0 && appliedPriceable.length * 2 >= appliedEstimates.length;
  const appliedUsdSum = appliedPriceable.reduce((s, i) => s + i.estimated_monthly_usd, 0);
  const appliedTokSum = appliedEstimates.reduce((s, i) => s + (i.estimated_monthly_tokens || 0), 0);
  // Falls back to the bare count when nothing applied carries an estimate —
  // never a fabricated "$0"/"0 tok" standing in for "no data".
  const appliedBig = appliedLeadWithUsd ? fmtUsd(appliedUsdSum)
    : appliedTokSum > 0 ? '~' + fmtTokens(appliedTokSum) + ' tok'
    : String(appliedCount);

  if (openItems.length === 0 && appliedCount === 0) return null;
  return html`
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 18px">
      ${openItems.length > 0 ? html`
        <div class="opt-section" style="flex:1;min-width:260px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;border-color:rgba(var(--accent-rgb,120,120,255),0.35)">
          <div class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em">Estimated recoverable <span class="dim" style="font-weight:400">/ mo</span></div>
          <div style="font-size:24px;font-weight:600;color:var(--accent);margin-top:4px">
            ${leadWithUsd ? fmtUsd(totalUsd) : '~' + fmtTokens(totalToks) + ' tok'}
            <span class="estimated-tag" title="sum of each open item's est./mo figure — review before applying">est.</span>
          </div>
          <div class="dim" style="font-size:12px;margin-top:2px">across ${openItems.length} open item${openItems.length === 1 ? '' : 's'} · review before applying</div>
        </div>
      ` : null}
      <div class="opt-section" style="flex:1;min-width:260px;padding:12px 14px;border:1px solid var(--border);border-radius:8px">
        <div class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--success)">Fixes applied</div>
        <div style="font-size:24px;font-weight:600;color:var(--success);margin-top:4px">${appliedBig}${appliedCount > 0 ? html` <span class="estimated-tag" title="each fix's own estimate at the moment it was applied — never re-measured afterward">est.</span>` : null}</div>
        <div class="dim" style="font-size:12px;margin-top:2px">${appliedCount} fix${appliedCount === 1 ? '' : 'es'} applied. estimates only, savings are not measured after the fact.</div>
      </div>
    </div>`;
}

function ReviewInboxView({ params }) {
  // Deep-link from an Optimize detail card's "review it" link (reviewProposalHref)
  // — switches to the Cost-advisories tab and highlights the matching card(s).
  const analyzerFocus = readParam(params, 'analyzer', '');
  const [tab, setTab] = useState('mistakes');   // 'mistakes' | 'advisories' | 'applied'
  const [d, setD] = useState({ loading: true, error: null, status: 'never_run', computedAt: null, clusters: [] });
  const [relearnFraming, setRelearnFraming] = useState(null);
  const [dismissed, setDismissed] = useState(() => loadDismissedRelearns());
  const [checked, setChecked] = useState(() => new Set());
  const [modalSig, setModalSig] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [applied, setApplied] = useState([]);
  const [appliedSigs, setAppliedSigs] = useState(() => new Set());   // hide from pending immediately
  const [costProps, setCostProps] = useState([]);          // advise-only cost proposals
  const [costStatus, setCostStatus] = useState('never_run');
  const [costDegraded, setCostDegraded] = useState(false); // a recompute failed even though a good result still renders
  const [costLastError, setCostLastError] = useState(null);
  const [costFraming, setCostFraming] = useState(null);    // plan-tier framing for the cost-advisory dollars
  const [costApplied, setCostApplied] = useState([]);      // marked-applied cost proposals
  const [marking, setMarking] = useState(null);            // signature currently being marked applied

  const load = useCallback(async () => {
    try {
      const r = await api('/relearn/proposals');
      const f = r.finding || {};
      setD({
        loading: false, error: null, status: r.status, computedAt: r.computed_at,
        clusters: f.clusters || [], sessionsScanned: f.sessions_scanned,
        failuresExamined: f.failures_examined,
      });
      setRelearnFraming(r.framing || null);
    } catch (e) {
      setD(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, []);

  const loadApplied = useCallback(async () => {
    try {
      const r = await api('/relearn/applied');
      setApplied(r.applied || []);
    } catch (e) { /* the pending list is the load-bearing view; degrade quietly */ }
  }, []);

  const loadCost = useCallback(async () => {
    try {
      const r = await api('/relearn/cost-proposals');
      setCostProps(r.proposals || []);
      setCostStatus(r.status || 'never_run');
      setCostDegraded(!!r.degraded);
      setCostLastError(r.last_error || null);
      setCostFraming(r.framing || null);
    } catch (e) { /* the relearn list is load-bearing; degrade quietly */ }
    try {
      const r = await api('/relearn/cost-applied');
      setCostApplied(r.applied || []);
    } catch (e) { /* degrade quietly */ }
  }, []);

  useEffect(() => {
    load(); loadApplied(); loadCost();
    // Light poll while a background pass may be computing (or right after a
    // manual refresh) so the empty/computing state resolves without a reload.
    const timer = setInterval(() => {
      if (document.visibilityState === 'visible') { load(); loadCost(); }
    }, 8000);
    return () => clearInterval(timer);
  }, [load, loadApplied, loadCost]);

  // Land on the Cost-advisories tab and scroll the matching card(s) into view
  // once they've loaded (deep-link from an Optimize detail card). Highlighting
  // every match for this analyzer is handled per-card below (rev-focus).
  useEffect(() => {
    if (!analyzerFocus) return;
    setTab('advisories');
    const el = document.querySelector(`[data-analyzer="${CSS.escape(analyzerFocus)}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, [analyzerFocus, costProps]);

  const doRefresh = useCallback(async () => {
    setRefreshing(true);
    try { await apiPost('/relearn/refresh', {}); } catch (e) { /* surfaced via next load()'s status */ }
    // The cost proposals recompute on the same cadence.
    try { await apiPost('/relearn/cost-proposals/refresh', {}); } catch (e) { /* degrade quietly */ }
    setTimeout(() => { setRefreshing(false); load(); loadCost(); }, 1500);
  }, [load, loadCost]);

  const markCostApplied = useCallback(async (prop) => {
    setMarking(prop.signature);
    try {
      // Only the ID: the server resolves the proposal's content (and its
      // estimate) from its own store, so the ledger records what was detected.
      await apiPostOrDetail('/relearn/cost-proposals/apply', { proposal_id: prop.proposal_id });
      await loadCost();
    } catch (e) { /* surfaced on next refresh; keep the card in place */ }
    finally { setMarking(null); }
  }, [loadCost]);

  const visible = (d.clusters || []).filter(c => !dismissed.has(c.signature) && !appliedSigs.has(c.signature));
  const toggle = sig => setChecked(s => { const n = new Set(s); n.has(sig) ? n.delete(sig) : n.add(sig); return n; });
  const dismissChecked = () => {
    // Only the selected rows that are actually listed: a stale signature left in
    // `checked` after its row was approved must not be swept along silently.
    const next = new Set([...dismissed, ...visible.filter(c => checked.has(c.signature)).map(c => c.signature)]);
    setDismissed(next); saveDismissedRelearns(next);
    setChecked(new Set());
  };
  const dismissMany = (sigs) => {
    const next = new Set([...dismissed, ...sigs]);
    setDismissed(next); saveDismissedRelearns(next);
    setChecked(s => { const n = new Set(s); sigs.forEach(sig => n.delete(sig)); return n; });
  };
  // Bulk-mark-applied for a collapsed tail (requirement #3) only ever covers
  // the plain "mark applied" cards (no apply_kind / not workspace apply_capable)
  // — a proposal that needs its own target-path confirmation keeps that
  // per-item human-gated step (requirement #9), so bulk never skips it.
  const markManyApplied = async (props) => {
    for (const p of props.filter(x => !x.apply_capable)) {
      try { await apiPostOrDetail('/relearn/cost-proposals/apply', { proposal_id: p.proposal_id }); }
      catch (e) { /* keep going; surfaced on next refresh */ }
    }
    await loadCost();
  };
  // Selection is scoped to `visible` — the rows actually rendered — never to
  // d.clusters. The list filters out locally-dismissed rows and rows approved
  // in this session, and `checked` is not pruned when a row leaves the list, so
  // counting raw `checked` would both overstate the button's blast radius and
  // let select-all reach a row the user cannot see.
  const selectedVisible = visible.filter(c => checked.has(c.signature));
  const selectedCount = selectedVisible.length;
  // Clicking a fully-selected box clears it; anything else selects the lot.
  const toggleAll = () => setChecked(
    prev => nextSelectAllSelection(visible.map(c => c.signature), prev));
  const modalCluster = modalSig ? (d.clusters || []).find(c => c.signature === modalSig) : null;
  const costAppliedSigs = new Set((costApplied || []).filter(r => r.state !== 'reverted').map(r => r.signature));
  const visibleCost = (costProps || []).filter(p => !dismissed.has(p.signature) && !costAppliedSigs.has(p.signature));

  const onApplied = (record) => {
    setAppliedSigs(s => new Set([...s, record.signature]));
    loadApplied();
  };

  const dismissCost = (sig) => {
    const next = new Set([...dismissed, sig]);
    setDismissed(next); saveDismissedRelearns(next);
  };

  // Plan-tier dollar suppression (requirement #9, core/framing.py): if EITHER
  // surface's framing says suppress, suppress everywhere on this page — the
  // two blocks are computed off the same account and should agree, but this
  // never lets a stale/degraded one leak an un-suppressed dollar through.
  const suppressed = dollarsSuppressed(relearnFraming) || dollarsSuppressed(costFraming);

  // Sort + long-tail collapse (requirement #3), independently per tab. Deep-
  // linking to a specific analyzer skips the collapse on the advisories tab —
  // a highlighted card must never be hidden inside a folded tail.
  const sortedRelearn = sortByEstMonthly(visible);
  const { top: topRelearn, tail: tailRelearn } = splitTopAndTail(sortedRelearn);
  const sortedCost = sortByEstMonthly(visibleCost);
  const { top: topCost, tail: tailCost } = analyzerFocus
    ? { top: sortedCost, tail: [] } : splitTopAndTail(sortedCost);

  const openItems = [...visible, ...visibleCost];
  const combinedApplied = [
    ...(applied || []).map(r => ({ ...r, kind: 'relearn' })),
    ...(costApplied || []).map(r => ({ ...r, kind: 'cost' })),
  ].sort((a, b) => (b.applied_at || '').localeCompare(a.applied_at || ''));
  const appliedOpenCount = combinedApplied.filter(r => r.state !== 'reverted').length;
  // Each non-reverted applied item's own estimate (requirement #7's honest
  // "Fixes applied" tile — never a live re-measurement).
  const appliedEstimates = combinedApplied
    .filter(r => r.state !== 'reverted')
    .map(appliedEstimate);

  return html`
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div class="page-title" style="margin-bottom:0">Inbox</div>
      <span class="sz-link" onClick=${doRefresh}>⟳ ${refreshing || d.status === 'computing' || costStatus === 'computing' ? 'scanning…' : 'Rescan now'}</span>
    </div>
    <div class="sz-note">Waste you're paying for more than once: mistakes your agents keep repeating, and cost fixes ready to apply.</div>

    <${InboxStatTiles} openItems=${openItems} appliedEstimates=${appliedEstimates} appliedCount=${appliedOpenCount} suppressed=${suppressed} />

    <div class="tab-bar" role="tablist">
      <button class="tab ${tab === 'mistakes' ? 'active' : ''}" role="tab" aria-selected=${tab === 'mistakes'} onClick=${() => setTab('mistakes')}>Recurring mistakes (${visible.length})</button>
      <button class="tab ${tab === 'advisories' ? 'active' : ''}" role="tab" aria-selected=${tab === 'advisories'} onClick=${() => setTab('advisories')}>Cost advisories (${visibleCost.length})</button>
      <button class="tab ${tab === 'applied' ? 'active' : ''}" role="tab" aria-selected=${tab === 'applied'} onClick=${() => setTab('applied')}>Applied (${appliedOpenCount})</button>
    </div>

    ${tab === 'mistakes' ? html`
      <div class="cur-listhead">
        <span>
          ${d.computedAt ? html`<span class="dim" style="font-size:12px">last scanned ${d.computedAt.slice(0, 16).replace('T', ' ')} UTC${d.sessionsScanned != null ? ' · ' + d.sessionsScanned + ' sessions scanned' : ''}</span>` : null}
          ${d.status === 'computing' ? html` · <span style="color:var(--warn)">scanning…</span>` : null}
        </span>
        <span style="display:flex;align-items:center;gap:8px">
          <${SelectAllCheckbox} total=${visible.length} selected=${selectedCount} onToggle=${toggleAll} />
          <button class="cur-btn" disabled=${selectedCount === 0} onClick=${dismissChecked}>${selectedCount ? `Dismiss ${selectedCount} checked` : 'Dismiss checked'}</button>
        </span>
      </div>
      <div class="cur-listbox">
        ${d.error ? html`<div class="dim" style="padding:32px 16px;text-align:center;color:var(--error)">Couldn't load proposals: ${d.error}</div>` : null}
        ${!d.error && d.loading ? html`<div class="dim" style="padding:32px 16px;text-align:center">Loading…</div>` : null}
        ${!d.error && !d.loading && d.status === 'never_run' ? html`<div class="dim" style="padding:32px 16px;text-align:center">No scan has run yet. Click <span class="sz-link" onClick=${doRefresh}>Rescan now</span> to kick one off.</div>` : null}
        ${!d.error && !d.loading && d.status !== 'never_run' && visible.length === 0 ? html`<div class="dim" style="padding:32px 16px;text-align:center">No pending fixes. The last scan found nothing recurring enough to propose (or you've dismissed/applied everything).</div>` : null}
        ${!d.error && !d.loading ? topRelearn.map(c => html`<${RecurringMistakeRow} key=${c.signature} cluster=${c} checked=${checked.has(c.signature)} onToggle=${() => toggle(c.signature)} onExpand=${() => setModalSig(c.signature)} suppressed=${suppressed} />`) : null}
        <${CollapsedTailRow} tail=${tailRelearn} suppressed=${suppressed} itemLabel="recurring mistakes"
          onDismissAll=${() => dismissMany(tailRelearn.map(c => c.signature))}
          renderItem=${c => html`<${RecurringMistakeRow} key=${c.signature} cluster=${c} checked=${checked.has(c.signature)} onToggle=${() => toggle(c.signature)} onExpand=${() => setModalSig(c.signature)} suppressed=${suppressed} />`} />
      </div>
      <div class="sz-note" style="margin-top:8px">Click a row for its evidence, proposed fix, and to Approve. <b>Approve</b> writes that fix (git-committed, or backed up if the target is not a git repo) at its rung; you confirm the scope and target first. <b>Dismiss</b> hides a row locally (this browser only; it is not sent to the server).</div>
    ` : null}

    ${tab === 'advisories' ? html`
      ${(costDegraded || costStatus === 'computing') ? html`
        <div class="dim" style="font-size:12px;margin-bottom:8px">
          ${costDegraded ? html`<span style="color:var(--warn)" title=${costLastError || ''}>⚠ the last refresh failed; showing the last good result</span>` : null}
          ${costStatus === 'computing' ? html`<span style="color:var(--warn)">scanning…</span>` : null}
        </div>` : null}
      <div>
        ${costStatus === 'never_run' && visibleCost.length === 0 ? html`<div class="dim" style="padding:32px 16px;text-align:center">No scan has run yet. Click <span class="sz-link" onClick=${doRefresh}>Rescan now</span> to kick one off.</div>` : null}
        ${costStatus === 'error' && visibleCost.length === 0 ? html`<div class="dim" style="padding:32px 16px;text-align:center;color:var(--error)">The last scan failed${costLastError ? ': ' + costLastError : ''}. <span class="sz-link" onClick=${doRefresh}>Try again</span>.</div>` : null}
        ${costStatus === 'ready' && visibleCost.length === 0 ? html`<div class="dim" style="padding:32px 16px;text-align:center">No open cost advisories right now.</div>` : null}
        ${topCost.map(p => html`<${CostProposalCard} key=${p.signature} prop=${p} busy=${marking === p.signature} focused=${p.analyzer === analyzerFocus} onMark=${markCostApplied} onDismiss=${dismissCost} onChanged=${() => { loadCost(); loadApplied(); }} suppressed=${suppressed} />`)}
        <${CollapsedTailRow} tail=${tailCost} suppressed=${suppressed} itemLabel="cost advisories"
          onDismissAll=${() => dismissMany(tailCost.map(p => p.signature))}
          onMarkAllApplied=${() => markManyApplied(tailCost)}
          renderItem=${p => html`<${CostProposalCard} key=${p.signature} prop=${p} busy=${marking === p.signature} focused=${p.analyzer === analyzerFocus} onMark=${markCostApplied} onDismiss=${dismissCost} onChanged=${() => { loadCost(); loadApplied(); }} suppressed=${suppressed} />`} />
      </div>
    ` : null}

    ${tab === 'applied' ? html`
      <div class="cur-listbox">
        ${combinedApplied.length === 0 ? html`<div class="dim" style="padding:32px 16px;text-align:center">Nothing applied yet.</div>` : null}
        ${combinedApplied.map(rec => html`<${AppliedItemRow} key=${rec.kind + ':' + rec.id} rec=${rec} suppressed=${suppressed} onChanged=${() => { loadApplied(); loadCost(); }} />`)}
      </div>
    ` : null}

    <${RelearnApplyModal} cluster=${modalCluster} onClose=${() => setModalSig(null)} onApplied=${onApplied} />
  `;
}

function DashboardView({ params }) {
  const since = readParam(params, 'since', '30d', validSince);
  // Preserve the explorer's params (metric/group_by/stack/chart/filters) when
  // only the window changes, so the hero keeps its slice across window switches.
  const setWin = v => navigate('dashboard', { ...Object.fromEntries(params.entries()), since: v }, { since: '30d' });
  const [d, setD] = useState({ loading: true, empty: false, error: null });

  // Triage fetch — same parallel fast=true pattern as Overview (#124): /cost is
  // load-bearing (no .catch), the rest degrade individually. The Analytics hero
  // fetches independently, so a triage failure never blanks the explorer.
  const load = useCallback(async () => {
    try {
      // Fetch /cost (load-bearing, no .catch) alongside /status and the rest so
      // the empty gate can consider HISTORICAL spend, not just live agents. A DB
      // whose sessions are all >24h old reports 0 active agents but still has a
      // full cost history — that user upgrading to review past spend must NOT
      // see "No data yet" (the front door was gating purely on active agents and
      // returning before /cost was ever fetched — issue: historical-only empty).
      const [cost, status, compare, opt, al, drift, traces, relearn] = await Promise.all([
        api('/cost', { since, group_by: 'day' }),
        api('/status').catch(() => ({ agents: [] })),
        api('/cost/compare', { since, compare: 'previous' }).catch(() => null),
        api('/optimize', { since, fast: 'true' }).catch(() => null),
        api('/alerts', { since, unread: 'true' }).catch(() => ({ alerts: [] })),
        api('/drift').catch(() => ({ agents: [] })),
        api('/traces', { since, limit: 6 }).catch(() => ({ traces: [] })),
        api('/relearn/proposals').catch(() => ({ finding: null })),
      ]);
      // "No data yet" only when there is genuinely NO telemetry: no cost history
      // AND no tokens AND no sessions/agents AND no traces. Historical cost or
      // an optimize finding is enough to render the tiles.
      const hasCost = (cost.total_cost_usd || 0) > 0 || (cost.total_tokens || 0) > 0;
      const hasAgents = !!(status.agents && status.agents.length);
      const hasTraces = !!(traces.traces && traces.traces.length);
      const empty = !hasCost && !hasAgents && !hasTraces;
      setD({ loading: false, empty, error: null, cost, compare, opt,
        alerts: al.alerts || [], drift, traces: traces.traces || [],
        pendingFixes: ((relearn && relearn.finding && relearn.finding.clusters) || []).length });
    } catch (e) {
      setD(s => ({ ...s, loading: false, error: e.message || String(e) }));
    }
  }, [since]);

  useEffect(() => {
    load();
    const timer = setInterval(() => { if (document.visibilityState === 'visible') load(); }, 30000);
    const onVis = () => { if (document.visibilityState === 'visible') load(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { clearInterval(timer); document.removeEventListener('visibilitychange', onVis); };
  }, [load]);

  const winPicker = html`
    <select value=${since} onChange=${e => setWin(e.target.value)}>
      <option value="24h">Last 24h</option>
      <option value="7d">Last 7d</option>
      <option value="30d">Last 30d</option>
      <option value="90d">Last 90d</option>
    </select>`;

  const cost = d.cost || {};
  const framing = cost.framing || null;
  const useTokens = !!framing && (framing.pricing_mode === 'subscription' || framing.pricing_mode === 'local');
  // Series only used to gate the run-rate projection (the chart itself is the
  // explorer's now — spend de-dup); window total drives the run-rate caption.
  const series = (!d.loading && !d.empty && !d.error) ? buildCostSeries(cost, 'total', useTokens) : null;
  const cyc = cycleRemaining(cost.cycle);
  let projection = null;
  if (series && series.data[1] && series.data[1].length) {
    const windowTotal = useTokens ? (cost.total_tokens || 0) : (cost.total_cost_usd || 0);
    const projected = runRateProjection(windowTotal, since, 1) * cyc.days;
    projection = useTokens ? (fmtTokens(Math.round(projected)) + ' tokens') : fmtFramedDollar(projected, framing);
  }

  const tiles = (!d.loading && !d.empty && !d.error) ? recoverableTiles(d.opt) : [];
  const budgets = (d.opt && d.opt.budgets) || [];
  const budgetAttn = budgets.filter(b => b.over_budget || (b.budget_usd > 0 && b.projected_cycle_total / b.budget_usd > 0.8)).length;
  const driftN = driftSignalCount(d.drift);
  const errTraces = (d.traces || []).filter(t => t.status_code === 'error').length;

  // Run-rate projection folded into a one-line caption under the explorer's KPI
  // row — the dashboard's single spend headline lives there, not as a separate
  // chart (de-dup). Framed (tokens for subscription/local), never raw $.
  const kpiCaption = (!d.loading && !d.empty && !d.error && projection && projection !== '—')
    ? ('At this pace, ~' + projection + ' by ' + cyc.label + ' — linear run-rate, not a forecast')
    : null;

  return html`
    <div class="ov-head">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="page-title" style="margin:0">Dashboard</div>
        <${PlanBadge} framing=${framing} />
      </div>
      <div class="filters" style="margin:0">${winPicker}</div>
    </div>
    ${framing && framing.qualifier_text ? html`<div class="qualifier">${framing.qualifier_text}</div>` : null}

    ${d.empty ? html`<div class="card" style="max-width:560px"><div class="card-header">No data yet. TokenJam is listening.</div><p style="color:var(--text-dim);font-size:13px;margin:8px 0 0">Run an agent (or <code>tj demo retry-loop</code>) and the recurring mistakes, spend, and health show up here.</p></div>`
      : html`
        <!-- Triage band: recoverable waste + health. Spend is NOT shown here —
             it lives once, in the explorer's Spend KPI tile + chart below. -->
        ${d.error ? html`<div class="chart-card" style="border-color:var(--error)"><div style="color:var(--error);font-size:13px;margin-bottom:8px">Couldn't load triage: ${d.error}</div><button class="btn" onClick=${load}>Retry</button></div>`
          : d.loading ? html`<div class="shimmer" style="height:90px"></div>`
          : html`
            <div class="dash-triage">
              <div class="dash-col">
                <div class="band-label">Recoverable waste <span class="estimated-tag" title="Heuristic estimates — review before acting">estimated</span></div>
                <div class="tile-grid compact">
                  ${tiles.length === 0 ? html`<div class="empty">No recoverable candidates.</div>`
                    : tiles.map(t => {
                      const meta = ANALYZER_META[t.name] || { title: capitalize(t.name), hint: '' };
                      // Route straight to the analyzer's own detail card on
                      // the Optimize screen — not an Analytics chart slice
                      // (#229). The recoverable number's evidence
                      // and next step live there, not in a chart.
                      const href = optimizeFindingHref(t.name, since);
                      const amount = t.state === 'actionable' ? fmtFramedSavings(t.usd, t.tokens, framing)
                        : t.state === 'at_ceiling' ? ('✓ ' + t.metric)
                        : t.state === 'no_findings' ? 'No candidates' : 'Not ready';
                      const cls = t.state === 'actionable' ? 'rec-tile' : (t.state === 'at_ceiling' ? 'rec-tile ok' : 'rec-tile muted');
                      const amtCls = t.state === 'actionable' ? 'rec-amount' : (t.state === 'at_ceiling' ? 'rec-amount ok' : 'rec-amount dim');
                      // Brief context so the tile says what the number means,
                      // not just how big it is — the specific
                      // not-ready reason when there is one, else what the
                      // analyzer measures.
                      const explain = t.state === 'not_ready' && t.hint ? t.hint : meta.hint;
                      return html`<a class=${cls} href=${href}>
                        <div class="rec-name">${meta.title}</div>
                        <div class=${amtCls}>${amount}</div>
                        ${explain ? html`<div class="rec-hint">${explain}</div>` : null}
                      </a>`;
                    })}
                </div>
              </div>
              <div class="dash-col">
                <div class="band-label">Health at a glance</div>
                <div class="tile-grid compact">
                  <${HealthTile} label="Pending fixes" value=${d.pendingFixes || 0} attention=${(d.pendingFixes || 0) > 0} href="#/review"
                    sub="the loop, review inbox" />
                  <${HealthTile} label="Unread alerts" value=${d.alerts.length} attention=${d.alerts.length > 0}
                    href="#/alerts?unread=true" sub=${d.alerts.length ? d.alerts[0].severity : 'all clear'} />
                  <${HealthTile} label="Agents drifting" value=${driftN} attention=${driftN > 0} href="#/drift"
                    sub=${driftN ? 'review baselines' : 'within baseline'} />
                  <${HealthTile} label="Budgets at risk" value=${budgetAttn} attention=${budgetAttn > 0} href="#/budget"
                    sub=${budgets.length ? (budgetAttn ? 'over / near ceiling' : 'within ceiling') : 'none configured'} />
                  <${HealthTile} label="Recent activity" value=${(d.traces || []).length} attention=${errTraces > 0} href=${tracesHrefForWindow(since)}
                    sub=${errTraces ? (errTraces + ' with errors') : 'last sessions'} />
                </div>
              </div>
            </div>`}

        <!-- The HERO: the embedded Analytics pivot explorer. Spend lives here
             once (Spend KPI tile + chart); the run-rate projection is the caption. -->
        <div class="band-label" style="margin-top:18px">Explore <span class="band-window">· metric × dimension × chart, the full pivot</span></div>
        <${AnalyticsView} params=${params} route="dashboard" embedded=${true} kpiCaption=${kpiCaption} />`}
  `;
}

// Two lenses, one router (self-improve-loop SPEC.md §12): Improve is the
// Claude-Code wedge (review inbox, dashboard, session monitoring), Observe is
// the SDK/observability suite. Views not listed default to 'improve' — every
// existing view still renders, this only decides which nav group frames it.
const VIEW_LENS = {
  review: 'improve', dashboard: 'improve', status: 'improve', sessions: 'improve', runs: 'improve',
  traces: 'observe', cost: 'observe', analytics: 'observe', alerts: 'observe', drift: 'observe',
  optimize: 'observe', budget: 'observe',
};

// ============================
// App Router
// ============================
function App() {
  const [route, setRoute] = useState(getRoute());

  useEffect(() => {
    const handler = () => setRoute(getRoute());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // Reflect the default route in the URL bar without a render-time redirect.
  // getRoute() already defaults to 'review' (Improve lens home), so the first
  // render shows the Review inbox; this just makes the address bar say so
  // (replaceState = no extra history entry, no hashchange race that left the
  // view blank — #132).
  useEffect(() => {
    if (!location.hash || location.hash === '#/') {
      history.replaceState(null, '', '#/review');
    }
  }, []);

  // Update active nav link + reveal nested children of the active section +
  // keep the Improve/Observe lens pill in sync with the current route (self-
  // improve-loop SPEC.md §12 — two lenses, one router; a direct link or
  // back-nav into the other lens's view must flip the pill, not just the page).
  useEffect(() => {
    const view = route.view, param = route.param || '';
    const lens = VIEW_LENS[view] || 'improve';
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) sidebar.dataset.lens = lens;
    document.querySelectorAll('.lens-btn').forEach(b => b.classList.toggle('active', b.dataset.lens === lens));
    document.querySelectorAll('.nav-link').forEach(el => {
      const v = el.dataset.view || '';
      if (el.classList.contains('nav-child')) {
        // "Click Optimize → expand": show a child only while its section is active.
        el.style.display = (v === view) ? 'flex' : 'none';
        el.classList.toggle('active', v === view && (el.dataset.param || '') === param);
      } else {
        // A parent yields the highlight to a child that matches the current param.
        const childActive = v === view && param !== '' &&
          !!document.querySelector('.nav-child[data-view="' + v + '"][data-param="' + param + '"]');
        el.classList.toggle('active', v === view && !childActive);
      }
    });
  }, [route.view, route.param]);

  const p = route.params;
  switch (route.view) {
    // Improve lens home — the self-improve loop's Approve stage (SPEC.md §12).
    case 'review': return html`<${ReviewInboxView} params=${p} />`;
    // Overview retired — the Dashboard's triage band subsumes it. Lingering
    // #/overview bookmarks/links fall through to the Dashboard.
    case 'overview':
    case 'dashboard': return html`<${DashboardView} params=${p} />`;
    case 'status': return html`<${StatusView} params=${p} />`;
    case 'traces':
      if (route.param) return html`<${TraceDetailView} traceId=${route.param} />`;
      return html`<${TracesListView} params=${p} />`;
    case 'sessions':
      if (route.param) return html`<${SessionDetailView} sessionId=${route.param} />`;
      return html`<${StatusView} params=${p} />`;
    case 'runs':
      if (route.param) return html`<${RunDetailView} runId=${route.param} />`;
      return html`<${StatusView} params=${p} />`;
    case 'cost': return html`<${CostView} params=${p} />`;
    case 'analytics': return html`<${AnalyticsView} params=${p} />`;
    case 'alerts': return html`<${AlertsView} params=${p} />`;
    case 'drift': return html`<${DriftView} params=${p} />`;
    case 'optimize':
      if (route.param === 'summarize') return html`<${SummarizeView} params=${p} />`;
      return html`<${OptimizeView} params=${p} />`;
    case 'budget': return html`<${BudgetView} params=${p} />`;
    default: return html`<div class="empty">Page not found.</div>`;
  }
}

render(html`<${App} />`, document.getElementById('app'));

// Footer version — fetched from /api/v1/version (same-origin, offline-safe).
fetch('/api/v1/version')
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    const el = document.getElementById('tj-version');
    if (el && d && d.version) el.textContent = 'v' + d.version;
  })
  .catch(() => {});
</script>
<script>
  // Theme toggle: cycles dark → light → system
  (function () {
    var KEY = 'tj-theme';
    var ICONS = { dark: '☾', light: '☀', system: '⊙' };  // ☾ ☀ ⊙
    var LABELS = { dark: 'Dark', light: 'Light', system: 'System' };
    var btn = document.getElementById('theme-toggle');
    var iconEl = document.getElementById('theme-icon');
    var labelEl = document.getElementById('theme-label');
    var mql = window.matchMedia('(prefers-color-scheme: light)');
    function apply(pref) {
      var isLight = pref === 'light' || (pref === 'system' && mql.matches);
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
      if (iconEl) iconEl.textContent = ICONS[pref];
      if (labelEl) labelEl.textContent = LABELS[pref];
      if (btn) btn.title = 'Theme: ' + pref + ' (click to cycle)';
    }
    var pref = localStorage.getItem(KEY) || 'system';
    apply(pref);
    if (btn) btn.addEventListener('click', function () {
      pref = pref === 'system' ? 'light' : pref === 'light' ? 'dark' : 'system';
      localStorage.setItem(KEY, pref);
      apply(pref);
    });
    mql.addEventListener('change', function () { if (pref === 'system') apply(pref); });
  })();
</script>
<script>
  // Lens pill: clicking switches the sidebar to that lens's default route.
  // App()'s route effect (module script above) is the source of truth for
  // which lens is actually shown — it re-syncs the pill + nav-link visibility
  // on every hashchange, so this handler only needs to navigate.
  (function () {
    var LENS_HOME = { improve: '#/review', observe: '#/traces' };
    document.querySelectorAll('.lens-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var lens = btn.dataset.lens;
        var sidebar = document.querySelector('.sidebar');
        if (sidebar && sidebar.dataset.lens === lens) return;
        location.hash = LENS_HOME[lens] || '#/review';
      });
    });
  })();
</script>
</body>
</html>
