<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 360" width="830" height="360" role="img" aria-label="Where your tokens go: six ways an agent overspends, each with the analyzer that finds it — wrong model (downsize), uncached repeats (cache), bloated prompts (trim), verbose output (verbosity), repeated planning (reuse), not-even-an-LLM (script).">
  <defs>
    <style>
      .t  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .m  { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- frame -->
  <rect x="0.5" y="0.5" width="829" height="359" rx="14" fill="#0d1117" stroke="#3d8eff" stroke-opacity="0.18"/>

  <!-- header -->
  <text x="28" y="36" class="m" font-size="12" letter-spacing="1.5" fill="#6e7681">WHERE YOUR TOKENS GO</text>
  <text x="802" y="36" class="t" font-size="12.5" font-style="italic" fill="#6e7681" text-anchor="end">measured, not modeled</text>

  <!-- ==== card template repeated 6× (3 cols × 2 rows) ==== -->
  <!-- row 1 -->
  <g>
    <rect x="24"  y="58" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="42"  y="92"  class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Wrong model</text>
    <text x="42"  y="120" class="t" font-size="12.5" fill="#8b949e">Opus doing Haiku&#8217;s job</text>
    <rect x="40"  y="150" width="82" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="52"  y="166" class="m" font-size="11.5" fill="#3d8eff">downsize</text>
  </g>
  <g>
    <rect x="289" y="58" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="307" y="92"  class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Uncached repeats</text>
    <text x="307" y="120" class="t" font-size="12.5" fill="#8b949e">the same prompt, paid for 40&#215;</text>
    <rect x="305" y="150" width="58" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="317" y="166" class="m" font-size="11.5" fill="#3d8eff">cache</text>
  </g>
  <g>
    <rect x="554" y="58" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="572" y="92"  class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Bloated prompts</text>
    <text x="572" y="118" class="t" font-size="12.5" fill="#8b949e">10k tokens of dead context</text>
    <text x="572" y="135" class="t" font-size="12.5" fill="#8b949e">every call</text>
    <rect x="570" y="150" width="50" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="582" y="166" class="m" font-size="11.5" fill="#3d8eff">trim</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="24"  y="204" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="42"  y="238" class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Verbose output</text>
    <text x="42"  y="266" class="t" font-size="12.5" fill="#8b949e">500-word answers to yes/no</text>
    <rect x="40"  y="296" width="82" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="52"  y="312" class="m" font-size="11.5" fill="#3d8eff">verbosity</text>
    <text x="132" y="312" class="t" font-size="11" fill="#6e7681">new</text>
  </g>
  <g>
    <rect x="289" y="204" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="307" y="238" class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Repeated planning</text>
    <text x="307" y="266" class="t" font-size="12.5" fill="#8b949e">re-planning the same task daily</text>
    <rect x="305" y="296" width="58" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="317" y="312" class="m" font-size="11.5" fill="#3d8eff">reuse</text>
  </g>
  <g>
    <rect x="554" y="204" width="251" height="132" rx="10" fill="#11161f" stroke="#3d8eff" stroke-opacity="0.20"/>
    <text x="572" y="238" class="t" font-size="15.5" font-weight="650" fill="#e6edf3">Not-even-an-LLM</text>
    <text x="572" y="266" class="t" font-size="12.5" fill="#8b949e">a call that&#8217;s really a regex</text>
    <rect x="570" y="296" width="56" height="24" rx="6" fill="#3d8eff" fill-opacity="0.12" stroke="#3d8eff" stroke-opacity="0.35"/>
    <text x="582" y="312" class="m" font-size="11.5" fill="#3d8eff">script</text>
  </g>
</svg>
