name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-npm:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # sdk-ts/package.json is published as-is with no CI auto-sync (unlike the
      # wrapper job below), so a left-behind version here would otherwise only
      # surface as a mid-publish "version already exists" failure. Fail fast,
      # before installing/building/publishing anything.
      - name: Check version matches release tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./sdk-ts/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::sdk-ts/package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump sdk-ts/package.json (e.g. via ./scripts/release.sh $TAG_VERSION) before cutting this release."
            exit 1
          fi

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: sdk-ts
        run: npm install

      - name: Run tests
        working-directory: sdk-ts
        run: npm test

      - name: Build
        working-directory: sdk-ts
        run: npm run build

      - name: Publish
        working-directory: sdk-ts
        run: npm publish --access public

  # Publishes the zero-install `npx tokenjam` wrapper (npm-wrapper/, issue #6):
  # the unscoped `tokenjam` package that shells out to the Python CLI. Separate
  # job from the SDK publish above so a wrapper failure never blocks @tokenjam/sdk
  # (and vice versa); both fire on the same `v*` release tag.
  publish-npm-wrapper:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Cheap guard — the wrapper has no test suite (no Python in the JS lane),
      # so a syntax error would otherwise only surface after publish.
      - name: Syntax-check launcher
        working-directory: npm-wrapper
        run: node -c bin/tj.js

      # Derive the published version from the release tag (v0.5.3 -> 0.5.3) so the
      # wrapper can never drift from the release being cut — no manual bump needed.
      # --allow-same-version tolerates package.json already matching the tag.
      - name: Sync version to release tag
        working-directory: npm-wrapper
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: npm-wrapper
        run: npm publish --access public
